body:
  text: 清古杭昭慶萬壽戒壇傳律沙門書玉科釋釋此律儀大分為二初標題二釋文初中分三初標法題沙彌律儀要略釋此題以人法為名沙彌人也律儀法也義如後釋蓋如來出現於世所說一代時教必須七部弟子任持資秉佛法得以久住七部者謂出家五衆在家二衆也其間各有大小之不同故如來初成正覺作是念言我得智慧無能信受若我住世於世無益不如入於涅槃爾時大梵天王即白佛言世尊法海已滿法幢已立潤濟開導今正是時云何欲捨一切衆生而不說法爾時世尊受梵天請初於寂滅道場先結波羅提木叉為諸利根菩薩說梵網經此大乘始也次於鹿野苑則呼善來比丘為憍陳如等轉四諦法輪此小乘始也是時三寶具矣沙彌者本於初度羅睺羅出家為始其沙彌尼是帶制律儀者有通有別通則一大藏教總名律儀別則就此十戒及諸威儀也沙彌是能學律儀是所學能所合目故名沙彌律儀要略者大師於毗尼藏中採取日用必行之事故云要對三千八萬而言故云略此乃大師體佛弘慈便於初學欲令人人信受佛語熟讀行持由小進大得入僧寶數故沙彌要略大意如此標題已竟次標人名菩薩戒弟子雲棲寺沙門袾宏輯釋菩薩者梵語具云菩提薩埵菩薩此翻佛道薩埵此翻有情又菩提是智薩埵是悲以智故上求佛道自利也以悲故下化衆生利他也四願彌堅自他俱利故名菩薩或翻開士謂以佛道開化衆生發信心故或翻高士謂高出凡夫二乘故翻既不定故仍留梵語也戒者乃運善之初章却惡之前陳即三聚淨戒也梵名波羅提木叉此云保解脫謂嚴持淨戒行菩薩道如來保任必得解脫煩惱證涅槃故梵名室灑此云弟子謂學在師後曰弟解從師生曰子此是大師學出世法以戒為師願同菩薩悲智化導衆生之稱雲棲者乃大師中興之道場也其地去府治二十餘里山名五雲昔有五色祥雲盤旋頂上已而飛集西塢經久不散時人異之故名雲棲寺者嗣也謂出家弟子於中承事佛法依教修行故沙門者德實之義謂勤修戒定慧息滅貪瞋癡識心達本源故號為沙門非泛常之通稱也袾宏是師之諱字佛慧號蓮池杭之沈氏子也年十七補庠試三十二父母皆喪因悟人世無常投無門洞性天理和尚出家乞昭慶寺無塵玉律師授戒於地湧壇前嗣後遍參知識已旋歸武林梵村乞食見雲棲山水幽寂遂結茅而漸建叢林精修白業道行天下世壽八十有一僧臘已滿五旬生於嘉靖乙未正月二十二日終於萬歷乙卯七月初四輯者集也謂採集成章以傳來學也標人已竟三釋題義分二初題中人義梵語沙彌此云息慈謂息惡行慈息世染而慈濟衆生也亦云勤䇿亦云求寂釋梵語者起世經云世界初成惟一海水由風鼓激漸凝為地梵天光音之衆下視山地見其地肥色香美好以指嘗之味若醍醐食之不已身體粗壯失天光明神足不復上升遂為人祖世居天竺自後人隨地轉音各成異唯天竺存焉故其音是梵音語是梵語也沙彌名有三譯義出耶舍傳中此云息慈者南山宣祖以此方息慈之名翻彼天竺沙彌之號也息止義行作義惡者非梵行事世染者謂此事乃世人之所貪染故然此貪染便是生死之本衆惡之源出家離染修解脫道當鋤其本而塞其源故應息惡也然惡雖能息若不行慈則墮偏小非大乘根器故復當慈濟衆生也又盧舍那翻為淨滿謂惡無不息故淨慈無不行故滿當知此沙彌戒即盧舍那之本因也梵語室利摩那路迦玄奘法師譯為勤䇿勤即不怠䇿乃進修喻如良馬見鞭影而進也故後解文中多舉果報等緣警避諸惡亦即息慈之意也梵語室那末尼義淨律師譯為求寂寂即涅槃而涅槃翻為圓寂以德無不備稱圓即行慈勤善之果也障無不盡名寂俱息惡䇿行之果也沙彌十支無染則具戒得圓比丘五篇清淨則涅槃可證故云求寂也名雖有三義實無別又息是止持即對治悉檀慈是作持即世界悉檀教也勤是勸作䇿是誡止即為人悉檀行也圓是作果寂是止果即第一義悉檀理也果也如上三譯教理行果四悉皆周仔細推之則義顯矣次題中法義律儀者十戒律諸威儀也釋十戒者始從不殺終於捉寶也諸威儀者即後二十四條隨律威儀也又戒者戒律止也謂止諸惡不起故儀者形儀作也謂令衆善奉行故以此戒律能止形上諸惡故名律儀蓋律無形儀則律為虗設形儀無律則持犯無稽有儀有律內外一如沙彌之名體用雙彰矣二釋文分二初戒律二威儀初戒律又二初總標門名復二初標名戒律門釋戒即十戒以制心為本律即法律以守護為宗門者有能通之義雖云沙彌十戒實能通至涅槃十方如來從此超出何以故人分大小人則是一若於此毗尼能聞而思即是入能修而行即是出譬如大宅要因門入誠所謂得其門者等佛一朝失其門者徒勞萬劫若受戒而不習學者則入道無門也故曰戒雖頓受事必漸修因沙彌十戒經中有戒律威儀之文故大師亦分上下二門正顯戒律非威儀無以見戒律之體威儀非戒律無以成威儀之用然用從體發故列於首二釋義分二初總序要略緣起分四初述古佛制出家者五夏以前專精戒律五夏以後方乃聽教參禪是故沙彌剃落先受十戒次則登壇受具釋佛制者猶聖王之節度也如來為三界大師所有言教羣生遵守信受奉行故云佛制出家者謂在家塵勞滾滾猶如奔馬無韁縱有出塵進道之想安可能得故如來預設化城攝歸寶所故經云無有在家能修習無上正覺之道是也然出家有乎二種一辭親割愛剃髮染衣名出世俗家二斷除妄惑證無生果名出三界家古云出家乃大丈夫事非將相之所能為出家功德經云若有為作留難者即斷佛種現在諸病集身死入黑暗地獄經千萬劫不能得出若能放人出家功德無量譬如四天下滿中羅漢四事供養盡於百年不如有人為涅槃故於一日一夜出家受戒五夏者即五年也文出十誦律中謂出家離俗不以生年為計乃數夏臘稱尊故又夏者盛也謂萬物茂盛之時也佛制受戒者至于夏間應當加工用行精進修持亦如萬物茂盛故從四月十六日起至七月十五日九旬行滿一夏功圓計其一臘蓋古稱坐夏者皆謂此也又五者謂初受戒人行持五年戒品堅牢則不為境風搖奪亦猶樹木培植五載枝幹粗壯則不怕霜雪所雹也專者謂專於事相博究開遮精者謂精研義理闡盡幽微又專則不二精則不雜如專而不精律法則不能透徹精而不專修持則不能恆常故須學滿五夏五法成就堪能誦戒羯磨方許離師如或不然當盡形不離依止倘有智慧過人於三四夏能解三藏得證三明亦不聽離依止何以故佛制五夏未滿故所以道宣律祖十席就聽毗尼慧休法師一生隨衆聞律此實後學之榜樣也五夏以後等者謂既知持犯五夏復周則許聽教參禪也耳根發識曰聽教者聖人被下之言參者究也禪者究心之法也教乃禪之階梯禪乃教之骨髓因解起行必須聽教華嚴經云佛法無人說雖慧莫能了悟明心地務必參禪所以古人千里求師參訪知識決擇生死禪是佛心教是佛語戒是佛身如是執之於身聞之於耳觀之於心則本源心地徹矣若參禪不由開導但乃堆堆死坐古人呵為魂不散死人落聖亡外道故知理觀未明必須聽教依教起行必須參禪通教不通宗如蛇鑽竹筒通宗不通教開口便亂道宗教一齊通如日照虗空法法頭頭現山川路有通又教是言詮設使修證未純不免迷惑故楞嚴云雖有多聞若不修行與不聞等所謂有真戒者必有真慧此是如來大慈有權有實先以毗尼收攝初心後以一乘攝歸無作先由事以會理後得理而忘言若初心不守律儀放曠總成邪見後心不達實相勤修終屬有為若參禪不持戒縱有空解未免沉墮故云若無真戒必無真慧也離戒修定慧名魔外因離定慧修戒名人天因三學俱備是成佛因故聽教參禪繼之五年後者本欲增心增慧三學齊修也由戒淨故慧淨由慧淨故戒淨如兩手互洗不分先後所謂只須就路還家不必改途易轍非於五年之外別有離戒修行之法也聽教參禪其理明矣是故者由是之故也乃承上起下之詞沙彌剃落者度人經云凡欲出家者著本俗服先教彼辭別君親已為說偈曰流轉三界中恩愛不能脫棄俗入無為真實報恩者然後剃髮剃者除也斷也謂斷除鬚髮願煩惱亦斷除也落者落䰂古人剃髮稱為落䰂先受十戒者謂重樓四級次第而登婆沙論云先受五戒以自調伏信樂漸增次受十戒善心轉深威儀庠序方受具戒如是次第得佛法分好樂堅固發起大心受菩薩戒如遊大海漸漸深廣入佛法海亦復如是今不言五戒而言十戒者謂五戒通於道俗十戒惟得出家今鬚髮既落故單言十戒也若一時頓受者既失次第又違佛制所謂得之容易則失之不難也復次或有衆生無受五戒而得道果或因受十戒而得道果以是種種因緣是故如來說次第受也登壇受具者從下而上曰登謂比丘是僧寶為人天幢相揀擇人根故律云須臾之間令汝三人至高勝處是也沙彌菩薩惟除遮逆一切普攝故不言也壇者場也此場僧共秉法羯磨而成若非此場戒無由得具是具足謂受二百五十大戒即便具足涅槃妙因故亦名近圓謂受此大戒白羯磨竟於所作事如法成就與涅槃相去不遠矣今授沙彌比丘菩薩戒而總稱壇者猶若世間三場考試也以此推之稱三壇者無足論矣二慨今今名為沙彌而本所受戒愚者茫乎不知狂者忽而不學便擬躐等罔意高遠亦可慨矣釋今者末法時也名者徒有沙彌之名本所受戒者本本分謂沙彌本分所受之十戒也愚者無有慧目茫者昧其志性以是不能學戒甘心下劣與法轉踈矣狂者妄起邪見忽者輕忽毗尼或小有知識自謂多能或勉之習學而反答曰此不過為初學者說爾或師長不能如法教誨弟子不肯請問一字執定狂愚安心鹵莾孤山圓法師云人雖至愚豈不能日記一言積月而三十言積年而三百六十言積之數載自然可成苟耻才智不如廢而不學則亦應耻飲食不如廢而不食也食既當同法寧可緩既不習學受戒何為古云學則庶民之子而為公卿不學則公卿之子而為庶民欲為公卿耶為庶民耶永明壽禪師云得鳥者網之一目不可以一目而廢衆目收功者棋之一著不可以一著而廢衆著月窟禪師云高以下基洪由纖起虞夏至聖尚曾歷試可能二祖猶服勤勞所謂一念因真千生果實因既不真果豈能實耶若飽食終日無所用心則難矣哉涅槃經云凡有心者皆當得阿耨多羅三藐三菩提若無信心徒增黑業所以佛誡羅羅偈曰十方世界諸菩薩念念已證善逝果彼既丈夫我亦爾不應自輕而退屈三昧經云佛法大海不可測度彼執偏愚不達諦理不習三學不從師受非法解法自稱智者非真智也狂慢之害又甚於愚不肖矣經云謙如大海容納百川慢如高山法水不住一味志大言大輕慢佛語忽略毗尼貶學戒為小乘謗行持為瑣屑執定我慢見善不從則難救矣曾不聞鳩摩羅什初學小教頂禮盤頭達多此敬上也盤頭達多晚學大乘復禮鳩摩羅什此尊賢也可見從上佛祖未有不學而成者沙彌才登戒品豈可不學也若以小小知見得少為足下不敬上上不尊賢欲齊先哲無有是處便擬躐等者擬欲也躐跨越之意等級也謂才受十戒便欲與大僧相等也罔意高遠亦可慨者謂昏昧無知曰罔意妄尊太過曰高遠聽其言之狂放雖聖賢猶所不及問其戒相威儀茫然一法不知慨歎辭謂狂愚如是寧不傷歎耶佛藏經云若不先學小乘後學大乘者非佛弟子三出略分四初啓蒙因取十戒略解數語使蒙學知所向方釋因取十戒等者此乃承上文而言謂因是狂愚之故故取十戒解之使狂者不學必誘其學愚者不知必令其知略而非廣故曰數語乍入道者故曰蒙學向者趨向方法也即趨入道門之方法也如楞嚴云因指見月故大論云三惡燒燃駝驢重楚餓鬼饑渴不名為苦癡暗無聞不識方向乃名苦也大師因慨狂愚罔諳戒法故略解於此令初發心人入道有由不致岐路於盲瞶也譬如勾甲方萌要因雨露人事方能長養成熟如初心一失為害匪淺縱有良醫難調重毒誠所謂打頭不遇作家到老終成骨董二勉行好心出家者切意遵行慎勿違犯釋南山云好心出家者怖四怨之多苦厭三界之無常辭六親之至愛捨五欲之深著不為名利所牽不為王力所逼不為邪求活命不為避懶偷安不為負債逃難為生死為菩提持信出家故智者大師以出家分為四種一者心出家身不出家如維摩龐老等二者身出家心不出家謂雖入空門不行佛事故三者身心俱不出家善根未生故四者身心俱出家是為好心也切真切也謂既發心受戒要念頭真切戒是越渡苦海之迅航莊嚴法身之瓔珞毫𨤲失念三途苦因當遵之不違行之不怠謹慎而不狎侮精嚴而不違犯根本清淨動止安詳年甲未滿不妨姑待如若滿足自可登壇三階本然後近為比丘戒之階梯遠為菩薩戒之根本釋然後者由下之上也謂前十戒清淨年限已滿即當登壇受具也遠近二字有事有理事者沙彌鄰次比丘故名曰近尚隔具足一壇故名曰遠理者比丘惟求自利但盡今生形壽故名為近菩薩志願利生盡未來際故名遠也階梯者升進之徑也行遠自邇登高自卑故律云不受具足戒而受菩薩戒者無有是處根本者猶草木之根本也謂此十戒乃比丘菩薩之根本也初階若毀次級難登根本一虧枝葉華果悉皆墮落故律云若破五戒中重戒還欲受五戒乃至菩薩戒無有是處若破十戒中重戒還欲受十戒比丘戒菩薩戒者亦無有是處四聖因因戒生定因定發慧庶幾成就聖道不負出家之志矣釋因戒生定者楞嚴經佛告阿難攝心為戒因戒生定因定發慧蓋心為淨染之本以戒攝之外不放入內不放出打成一片名之為定靜極光通發起妙用名之為慧然戒乃定之本定乃慧之體慧乃定之用故曰因戒生定因定發慧也庶幾者近可也聖道者聖人之道也梵語菩提此云覺道謂此道乃千聖同遊之道也無一聲聞不嚴戒行無一菩薩不修戒度無一如來不滿戒體謂精嚴淨戒定慧發生則不耽世染如是行持近可成就菩提而不辜負剃髮披緇之初念也四指廣若樂廣覽者自當檢閲律藏全書釋樂喜好也廣覽遍觀義檢檢點閲細看藏乃包括函藏之義也如來說法分為三藏所謂經律論也今專為受戒者說故但指律藏而言也全書正顯要略之意大師為初學者略採數語以便行持若有志於毗尼者當遍觀律部則知全藏之義也二重出制戒本源分二初述經其十戒名出沙彌十戒經釋十戒名者即不殺盜等十事也出沙彌十戒經顯非臆說亦見有所據也謂律是如來金口親宣等覺以下菩薩不敢增減一字所以大師引證於此經是通稱蓋一大藏教總稱為經故名從別顯指此沙彌十戒經以別餘經也二舉人佛敕舍利弗為羅睺羅說釋佛敕者猶天子制書命令也說者傳說佛為法王故制戒律命舍利弗為羅睺羅說也梵語舍利弗此云鶖子從母得名謂其母眼明如鶖鳥故父是天竺婆羅門提舍論師亦云身子文句云舍利弗母好形身身之所生故云身子入王舍城路逢馬勝為說偈曰諸法從緣生緣盡法還滅我師釋迦文常作如是說身子聞已即證初果投佛出家梵語羅睺羅此云執日是佛之子也生時值阿修羅以手障日因之為名亦云覆障昔佛為太子時啓父出家父曰無絶吾國嗣汝若有子聽汝出家太子即以手指耶輸陀羅腹便覺有妊在胎六年始生故翻覆障未曾有經云時佛在舍衛國入城乞食耶輸陀羅與羅睺羅在高樓上見佛入城時羅睺羅年方七歲耶輸覺信遂向羅言此來比丘是汝父也如來無量法財汝應得分汝當往彼索其餘財羅即下樓前禮佛足如來觀機逗教手摩羅頂羅從覺醒自念從有生以來未曾得如是柔軟細滑之樂遂悟觸塵證須陀洹佛即問羅睺羅汝能出家否羅答云能世尊即舒一指擕羅同歸僧伽藍中佛告舍利弗汝度羅睺羅出家舍利弗言我云何度佛教作如是言我羅睺羅皈依佛皈依法皈依僧我羅睺羅皈依佛竟皈依法竟皈依僧竟盡形壽不殺生是沙彌戒汝能持否乃至第十不捉持生像金銀寶物是沙彌戒汝能持否如是三問故云佛敕舍利弗為羅睺羅說也如來不為羅睺羅作和尚者有五義故一為平等故謂佛心平等一切無偏不與彼作和尚不與此作和尚也二為止鬬諍故若作和尚則有親疏既有親疏便有鬬諍則佛法難行也三為止誹謗故若作和尚外道當言沙門瞿曇自言慈等一切云何與一作和尚不與一作和尚則與凡人無異也四為成三皈故若作和尚則墮僧數無有佛寶則三皈不成也五為成六念故若作和尚則無念佛又若作和尚弟子有病應當瞻視飲食衣藥種種所須豈是自在法王所應為耶如一比丘應得阿羅漢果昔有餘福當作轉輪聖王福業遮障不得漏盡如來愍之為病比丘一正富羅轉輪王福一時失盡即得無著若作和尚有損無益也復次佛唯一人僧該凡聖僧作和尚弟子受戒遠近皆得不令衆生多受勞苦若佛作和尚有是故也又若作和尚佛在世時佛為和尚佛滅度後誰作和尚以是種種因緣不作和尚也敕舍利弗者有所表故舍利弗乃十大弟子中智慧第一以有智慧故方能代佛說戒也羅睺羅密行第一以能行故方堪受戒然受戒能行是佛子也二別解戒相分十第一殺戒乃至第十捉寶戒第一殺戒分二初標名一曰不殺生釋此如來所制之戒也後九戒同一曰者乃發語宣詞之意殺斷也生命也謂過去已過去未來尚未來現在所有生命一剎那間相續不斷是名為生今斷彼相續故名殺生也圓覺經序云夫血氣之屬必有知凡有知者必同體皆有貪生畏死之心故鴦崛經云佛子無慈孝故肆意殺他物命充我肥甘殊不知而殺而食之物彼之愛命同於我之愛命也人人愛命物物貪生豈可害乎大論云佛言殺生有十種罪一心常懷毒世世不絶二衆生憎惡眼不喜見三常懷惡念思惟惡事四衆生畏之如見蛇虎五睡時心怖寤亦不安六常有惡夢七命終之時狂怖惡死八種短命業因緣九身壞命終墮於地獄十若出為人常當短命如經所說可不深戒沙彌息慈為本故殺戒居先三釋義分三初述律二引證三結勸初中分四初明境解曰上至諸佛聖人師僧父母下至蜎飛蠕動微細昆蟲釋依文析義曰解上至者最上也佛為天中之天聖中之聖世出世間最尊最上故十方三世曰諸三覺具圓曰佛已成正果曰聖靈超萬物曰人模範後學曰師六和清淨曰僧木本水源曰父母也蓋佛能示法師能傳法僧能弘法父母養育劬勞恩同於佛然世間父母生長色身出世父母生長法身律云當念父母及師長恩精勤行道以報其德既云念恩豈有傷害今所論者緣提婆達多推石壓佛傷佛足指故懺悔法中有出佛身血一逆所以大師以七逆最重而列於前也聖人指果位中人師指和尚闍黎僧指羯磨轉法輪者父母生身為重設有犯者即名為逆不通懺悔墮阿鼻獄受無量苦下至者極盡也謂到此微細至極盡故蜎飛空類化生蠕動水類濕生昆者蟲之總名有曰昆蟲蚊也江南有吐蚊之鳥塞北有蚊母之草此方蚊子生於朴樹果中虻蟲生於榆樹莢中微細最小也凡肉眼所能見者俱攝於內謂非但大形衆生不可殺害乃至極微細者亦不可傷也謂蠢動含靈皆有佛性故如來大慈凡有殺境一切俱制境有三品諸佛聖人師僧父母名上一切人天名中四趣衆生名下若有傷者隨事所定二顯戒但有命者不得故殺釋但凡也乃總結上文而言命者謂一切衆生皆以識息暖三色心相連名之為命故者有心故作顯非錯誤也不得遮止之辭謂凡有秉形而具生命者不得故發殺心而奪其命也然誤傷亦有誤傷之報如朝野僉載梁武帝素常敬信榼頭師時遣使召之帝方與人下碁欲殺一段聲曰殺卻使遂斬師帝棊罷喚師使言向者陛下令臣殺卻也帝問師臨死有何言使曰師云貧道前劫為沙彌時以鍬剗地誤傷一曲今帝是也此報固宜誠所謂假使百千劫所作業不忘因緣會遇時果報還自受要知十界同一心體迷之而為蜎飛蠕動悟之而為諸佛聖人故如來大慈一切俱制三明法或自殺或教他殺或見殺隨喜釋或者不定之辭謂殺事雖多略有三種隨所作結罪故言不定自殺者謂自身行殺或以手打或用刀杖或推落坑塹及以毒藥等此身業造罪亦兼於意教他殺者或教彼以手打乃至毒藥等或教彼依如上法而自死此口業造罪亦兼於意殺雖他人罪歸自己見殺隨喜者謂見他人行殺自心隨之而生歡喜雖非身口親作然三業之中意業為主故皆得罪也詳如大律四指廣廣如律中文繁不録釋廣者對略而言謂此但略陳三法其餘種種殺事心分故誤罪有重輕如比丘律藏及沙彌十戒經中所明須者宜檢以文多故不能具録後皆同此二引證分三初護生經載冬月生虱取放竹筒中暖以綿絮養以膩物恐其饑凍而死也乃至濾水覆燈不畜猫狸等皆慈悲之道也釋經載等者此言出世護生之法以顯沙彌息惡行慈之道也文雖出於諸經義實大律詳備虱者本名俗呼半風字丹鴻美稱也冬月生者謂重衣暖服易生蟣虱故膩物即身中垢膩也凍以綿絮暖其身饑以膩物養其命不饑不寒則俟來春放青草葉上化生蚊虻也如春夏月隨放隨化雖經冬至夏時到仍生耳律云若棄蚤虱等不可隨意便輒棄地應於故棉帛上觀時冷暖而安置之若無棉帛應安壁隙柱孔任其自活不得隨處棄擲壁虱當安青草上或凉冷處四分犍度云老病比丘數起棄虱置地疲極佛言聽以器名毳若劫貝若弊物若綿拾著中若虱走聽以竹作筒盛之若出以蓋覆之若無竹若甘蔗草若木若葦皆可為之今時多有不解教法久貯筒內困死雖云依教殊無護命之心又何逃殺生罪耶衛生禁殺録云薛皓性慈戒殺即微蝨亦不害之一夕夢被上虱甚多漸變寸許虱謂皓曰受君之貺非一日今君有難正吾儕救命之秋遂列成行被上有絲血痕橫廣尺許乃死虱也皓惜久之不知其故蓋是夜有刺客來害皓其人有利劍見血立死是夜其人劍下見血以為死報其主歡甚明日瞰之無恙訪得虱事始知其夢此護生之驗也乃至者是舉前繼後以括其中之義謂前明殺害粗相後明護生細行其中粗細非一可以意會難以枚舉故濾水者是持戒之要務謂水有微細蟲故須濾也正法念經云經宿之水若不細觀恐生細蟲若不漉濾不飲不用是名細持不殺戒也又儀則經云乃至草木上塗壇牛糞中如是受用時救護於含識或被牀座內田地糞土中一一仔細觀是名出家行覆燈者用紗羅絹紙等覆燈以護諸蟲蛾故畜謂畜養猫是捕鼠之獸亦名地行羅剎字訓田鼠傷苗猫能食鼠故字從苗狸是狐狸擒物之獸皆是傷生之物故不得畜也古云為鼠常留飯憐蛾不點燈自從青草出便不下階行護生之念至切矣慈悲之道乃菩薩利生之大道也以慈能與樂故暖以綿絮養以膩物也以悲能拔苦故濾水覆燈不畜猫狸也二舉況微類尚然大者可知矣今人不能如是行慈復加傷害可乎釋微類尚然者乃結上文而比況也謂如上最小蟲類尚能如是愛護則大形衆生自然不殺也今人等者乃傷感之辭也謂既不能行如上護生之事已違沙彌之制豈可復加傷害耶可乎者是及徵之語謂深戒不得更作也三行慈故經云施恩濟乏使其得安若見殺者當起慈心釋此十戒解文中凡有經云皆出沙彌戒經後不繁釋菩薩見殺一切衆生即贖其命謂之施恩見貧乏者以財法惠施謂之濟乏良由一切衆生於財法二種多所饉乏故若見衆生為衣食所逼不能稱意者當隨力給與而利濟之若見衆生無法自資不得自在者當隨力為說而救度之然財施以安其身法施以安其心身心無乏故曰使其得安也見殺起慈者惻隱之心也若有力當盡心救度解其苦難若無力當默念寶勝如來或持往生神呪回向令彼聞法超升永離苦趣願當來世不見如是苦惱衆生故曰當起慈心也三結勸噫可不戒歟釋噫傷痛聲歟語盡之辭亦即歎辭謂殺生之罪苦報無量窮劫受殃誠可愍傷不可不為切戒也如輪轉五道經云為人喜殺者後生作水土蜉蝣之蟲朝生暮死賢愚經云戲笑殺他命悲號入地獄臭穢與煬銅灌注連相續奔刀赴火𦦨劈裂碎楚毒億載苦萬端傷心不可録習報經云殺生入四趣受苦三塗畢得生人道中短命多憂疾疫病嬰難苦壽短長沉沒若有智黠人殺心寧放逸八師經云殺者心不仁強弱相傷殘殺生當過去結積纍劫怨受辜短命死驚怛遭暴惡我用畏是故慈心伏魔宮楞嚴經云汝修三昧本出塵勞殺心不除塵不可出縱有多智禪定現前如不斷殺必落神道維摩云人生長壽得不殺報第二盜戒分二初標名二曰不盜釋物各有主不與而取名之為盜盜之為咎其害匪輕良以稟形六趣莫非貪欲為源受質三儀並是戀財為本臨財苟得非謂哲人見利忘義豈成君子蘇子云苟非吾之所有雖一毫而莫取所以憍梵損粟必受牛身比丘嗅香池神呵責罪招有自因果無差是以嚴遮勿令有犯恐一墮落則求出無期故大師於十戒解中皆具息惡行慈之意也二釋義分三初述律二引證三結勸初中分四初明境解曰金銀重物以至一針一草釋梵語蘇伐羅此云金梵語阿路巴此云銀重物者謂物件雖多四法攝盡一體重價重謂金銀七寶等二體輕價重謂紬綾縀帛等三體重價輕謂木石等四體輕價輕謂草葉等今以貴價在前故曰重物以至者是舉前後之重輕以達其中也一針者言其最微一草者言其最輕也如來大慈凡有盜境一切俱制境有三品佛法現前僧四方僧父母師長物名上人天物名中鬼神畜生物名下若有犯者隨事所定二顯戒不得不與而取釋不得者禁止之語不與取者謂前人不與而取奪之也正是業主故律云若物屬他他所守護前人不與舉離本處即成盜罪華嚴云若物屬他起他物想終不於此而生盜心乃至草葉不與不取何況其餘資生之具故知經律皆禁止也三有主若常住物若信施物若僧衆物若官物民物一切物釋常住物者梵語招鬪提奢唐言四方僧物律云常住物有四種一者常住常住謂衆僧厨庫寺舍衆具花果樹林田園僕畜等體局當處不通餘界但得受用不得分賣故二者十方常住如僧家供僧常食一鳴楗椎體通十方四方但局凡僧十方通於賢聖今世凡多聖少故但言四方惟局本處不出外也三者現前常住謂僧得施物唯施此處現前僧得故四者十方現前常住如亡五衆輕物現前羯磨得分如未作羯磨若有盜者從十方僧得罪若已作羯磨從現前僧得罪上二種名四方僧物若有侵損即名犯盜以僧家一粒一絲皆是檀越以清淨心施來今以不清淨心盜取其罪極重莊椿録云盜常住一文錢一日一夜長利三分七𨤲第二夜利上長利來世牛馬償還若一文入常住一日一夜長福倍上觀佛三昧經云盜常住物者過殺八萬四千父母之罪十輪經云盜三寶物者其罪甚重千佛出世不通懺悔若將非理用度私給俗家其罪甚重地藏經云若偷竊常住財物米穀飲食衣服乃至一切不與而取者當墮無間地獄道世法師云若將常住財物與白衣受用者龍天瞋責罪及主事常住司執錢穀無非佛物法物僧物於己何有若此中沾染毫𨤲即是鑊湯爐炭若此中涇渭分明即是青蓮華藏鐵山瓊云凡常住一茶一米一分一𨤲皆是施主為求福德故行布施宜供三寶何得私用罪福因果瞭然指掌慈受深禪師云常住分文不可偷日增萬倍恐難酬猪頭驢腳明明現佛地今生掃未休以此觀之常住之物不可絲毫有犯是以先聖後聖苦口叮嚀也信施物者謂施主信心持物至寺布施而未曾分與僧者是僧衆物者現前大衆受用之物若於四事中或竊其一是名盜現前僧物亦不得私用縱有挪移借用以長就短必須白衆方動後來仍舊補償不名犯盜方等經云菩薩言五逆十惡我所能救盜衆僧物我不能救也官物者即九品宦職之物也普天之下莫非王土縱使地下伏藏以至空地遺物既在王地皆名官物也民物者即工商農庶百姓之物也一是普及之言切乃盡物之語統論世間大小輕重及鬼神禽獸等物也四明法或奪取或竊取或詐取乃至偷稅冒渡等皆為偷盜釋奪取者恃力強暴而取也竊取者伺人不見而偷取也詐取者亦名僞取或詭譎拐騙或假借不還或倚勢冒支等乃至者謂從前至後以明其中所謂圭合銖兩種種欺瞞移標古界私匿寄物過分食用常住等偷稅者賦稅乃國家大典若有物必須向彼化免不得藏匿而過亦不得為他人藏匿稅物冒渡者假稱也謂假稱他名而過關津也等者未盡之辭謂事雖未盡則餘法可知也皆為偷盜者總結如上之法也餘如大律二引證分二初果報經載一沙彌盜常住果七枚一沙彌盜衆僧餅數番一沙彌盜衆僧石蜜少分俱墮地獄釋經載者此引經文作證以戒沙彌不得偷盜致招長夜大苦也盜果者大報恩經云見一衆生有熱鐵丸從身上入從身下出乘虗而行痛苦難忍目連問佛何罪所致佛言彼於迦葉佛時作沙彌守衆僧果園盜取七枚奉師以是因緣故獲斯罪盜餅者雜寶藏經云見一衆生有二熱鐵輪在兩腋下舉身焦爛痛苦難忍目連問佛何罪所致佛言彼於前世為沙彌時與衆作餅盜取二番挾兩腋下以是因緣故獲斯罪盜石蜜者石蜜亦名糖精廣志甘蔗其餳形如冰糖堅硬如石唐書云番胡國出石蜜中國貴之漢武帝內傳西王母謂帝曰太上之藥有中華紫蜜雲山朱蜜天竺國石蜜仙經云蜜為口芝本草云崖蜜食之不飢明目延年律中過午不食開石蜜者以其煎湯無形為藥石故阿含經云見一衆生其舌長廣有熾然利斧以斫其舌乘空而行啼哭號呼苦痛難忍目連問佛何罪所致佛言彼於迦葉佛時作沙彌以斧斫石蜜供僧霑斧刃蜜盜取食之少分者不多也緣斯罪故從地獄出受此餘報俱墮地獄者總舉三法以戒之也地者底也萬物之中地最在下故獄者局也謂拘局罪人不得安樂故已上三事雖不同時然盜因則一故皆感地獄之報一錢一草信不誣矣二立誓故經云寧就斷手不取非財釋寧就斷手不取非財者深畏地獄之苦痛甚於斷手也說之寒心故如來激切勸誡而立誓言決意不取也蓋人有手足方稱全品僧有戒德堪為良祐非財者非義之財也古人云人非善不交物非義不取世律取非義之財受非常之禍藏經食無與之物故感無間之殃也三結勸噫可不戒歟釋楞嚴經云汝修三昧本出塵勞偷心不除塵不可出縱有多智禪定現前如不斷偷必落邪道譬如有人水灌漏巵欲求其滿縱經塵劫終無平復寶梁經云寧自啖身肉不得盜三寶財物洞山價禪師云常住須憑戒力扶莫將妄用恣貪圖掌他三寶門中物惜似雙親兩眼珠暗裏縱能機巧算冥中自有鬼神誅絲毫若也無私取免至來生作馬驢增一阿含經云佛告諸比丘若人偷盜他物為主所執送官究治閉著牢獄或以杖捶或截手足耳鼻及斷其頭種種苦楚命終生地獄中猛火燒身煬銅灌口受種種苦不可稱計百千萬歲脫出無期地獄罪畢生畜生中象馬牛羊駝驢犬等經百千歲以償他力畜生罪畢生餓鬼中飢渴苦惱不可具言經百千歲受如是苦罪畢為人得二種報一者貧窮衣不蓋形食不充口二者常為水火王臣惡賊之所劫奪不得安樂維摩經云如人大富得不盜報第三淫戒分二初標名三曰不淫釋淫者不淨行也謂以染污心行穢惡行故名不淨也世俗尚有男女授受不親之訓出家離染尤宜肅慎今承慈旨諄諄必須銘刻于心不可有違佛制當深觀愛欲猶如毒蛇華嚴經云若被諸女色染醉其心猶如嬰兒無見自性亦如素衣見受染色為欲所溺不能得出如糞中蟲樂著糞處如穢弊猪不淨嚴身四十二章經云出家沙門斷欲去愛澄自心源達佛深理悟無為法乃名佛子梵網經云寧以此身投熾然猛火大坑刀山終不毀犯三世諸佛經律與一切女人作不淨行八歲沙彌開解國王經云阿育王初奉佛時人民疾疫請僧呪願聖衆遣妙顏沙彌年始八歲已得神通飛入王宮夫人彩女見之無不愛敬夫人舉手欲抱妙顏顏即却之夫人曰卿年尚幼猶如吾子近之何妨顏曰事從微起猶一粟之火能燒萬里之野一滴之水能陷堅固之石以少致多以小成大是以智者遠嫌避疑以防未然時沙彌聲徹王殿王聞之來見曰卿尚幼如我子抱之何嫌顏曰古聖制儀豫其未萌亦戒終始女子七歲不戲父几男子八歲不踞母床果下無捫首瓜田無摸足遠嫌避疑杜漸銷萌也今雖等母子當為將來不能者施時王與夫人及宮中五百人臣同得道跡二釋義分三初述律二引證三結勸初中分三初顯戒解曰在家五戒惟制邪淫出家十戒全斷淫欲釋在家五戒者優婆塞優婆夷戒也唯制邪淫者以其洪荒之後有虞垂拱契任司徒教以人倫則曰夫婦有別有夫婦則有父子故人倫以夫婦為首不孝以無後為大上關風化下接宗嗣是故不禁如關睢之詩樂而不淫所以正人倫之綱紀也故居家受戒除夫婦外一切俱制果報地獄經云復有一鬼白目連言我常以物蒙籠其頭畏人來殺心生恐懼何罪所致目連答曰以前世時淫犯外色常畏人見或畏夫主捉縛打殺心常恐怖故獲斯罪此是華報果在地獄華嚴經云菩薩於自妻尚且知足何況邪淫又此五戒在天謂之五星在地謂之五行在人謂之五倫在身謂之五臟在山謂之五嶽在國謂之五刑在儒謂之五常謂仁者不殺等乃修行之徑路也緣於耶輸伽父與五十人求佛受三歸五戒為始故如來開人天教以攝居家二衆也出家十戒者乃渡苦海之浮囊越涅槃之正因也全斷淫欲者謂淫非梵行乃鄙惡不堪之事又出世法中無邪正故然華嚴為在家者說故曰自妻尚且知足楞嚴為出家者說故曰全斷淫欲也二明境但干犯世間一切男女釋干犯者謂干名犯義淫其所尊污其所親行不淨行也一切者總攝也謂人女非人女畜生女人男非人男畜生男乃至黃門二根等皆是境故如來大慈凡有淫境一切盡制境有三品母女姊妹六親名上一切男女并邪淫名中在家己妻非時非處名下若有犯者隨事所定故經云當觀愛欲甚於猛火猛火燒身害此一生欲火燒身殃墮纍劫智者畏之愚人自縛也三結罪悉名破戒釋悉者盡也破者犯也不言犯而言破者謂初受戒時體則圓滿若犯此戒如人斷頭身則破壞如大石破裂無有完全戒身破壞亦復如是當知淫泆非刀劍能斬智慧命愛欲是猛火自焚功德林佛言破戒之人生不能消信施一滴之水足不履伽藍尺寸之地死墮地獄受報無窮然其意地欲根最難除拔極易漸染若此中微塵許不盡便是生死禍胎若淫習難盡者當修不淨觀或住尸林以為對治或以手摩其頂眼盻袈裟作是念言食人信施不應起如是心或禮佛持呪以治其心則貪欲自然殄除也二引證分三初顯報楞嚴載寶蓮香比丘尼私行淫欲自言淫欲非殺非偷無有罪報遂感身出猛火生陷地獄釋楞嚴載者此引經文以顯淫事有如是利害不得犯也寶蓮香者乃比丘尼最初持菩薩戒之美稱也謂戒體本來尊貴故名曰寶戒體本來清淨故名曰蓮由尊貴清淨芬芳一切故名曰香後因一念妄動不守自心犯此淫戒而反不知慚愧謬起邪見撥無因果肆言非殺非偷無有罪報殊不知私行淫欲非偷乎淫事辦而慧命斬非殺乎猛火欲火也謂作是語已遂生猛火節節燒然生陷者謂不待身死而陷入阿鼻也梵名阿鼻此云無間謂墮此地獄中受燒煮苦無有間斷故二舉況世人因欲殺身亡家出俗為僧豈得更犯生死根本欲為第一釋世人者王臣士庶人也殺身亡家者如夏以妹嬉晉由驪姬乃至驪山火起因褒姒蜀道蒙塵為太真亡家敗國皆為此也自古至今受惑非一故曰自天子以至於庶人一是皆以修身為本出俗為僧豈得更犯者謂知五欲過患故捨之出家當不為生死之所流轉豈可復行生死不淨之行耶楞嚴云汝愛我心我憐汝色以是因緣經百千劫常在纏縛當知紅爐白刃壞色身於一時花箭蜜鋒沉慧命於萬劫大論云入道慚愧人持鉢攝衆生云何縱欲塵沉沒於五情已捨五欲樂棄之而不顧如何還欲得如愚自食唾生死根本欲為第一者謂一切衆生所以有身者皆由初念顛倒見他交會自以淫心投托母胎而成身根故名曰生所謂一切衆生皆以淫欲而正性命也有生必有滅故名曰死是知生死根源皆以淫欲為首故云第一欲除生死須斷淫心故經云若諸世界六道衆生其心不淫則不隨其生死相續淫心不除塵不可出必使淫機身心俱斷斷性亦無於佛菩提斯可希冀三立誓故經云淫泆而生不如貞潔而死釋泆淫放也謂恣心放逸而行淫故貞潔守節清白也謂守戒清白雖死猶生恣心放逸雖生若死是故經云淫泆而生不如貞潔而死也如賢愚經云一比丘少欲知足一長者終身供養日日送飯又一長者將一子來求出家比丘觀是子能持淨戒度為沙彌其前長者舉家赴會唯留一女守舍忘却送食比丘念日已過午尚未送食乃遣沙彌取食唯見少女迎門作諸媚態沙彌自念此女將無毀我淨行乃堅攝威儀女即五體投地曰此舍珍寶充滿卿可為主我願充婢給使沙彌心念寧捨身命不毀淨戒即入房閉戶䠒跪合掌發願不捨三寶正戒願生寂靜家盡漏成道即刎頸而死其女欲心尋息悲惱悶絶其父適還女方蘇醒具述所以時國王聞知贊嘆地積衆香闍維供養三結勸噫可不戒歟釋八師經佛告梵志曰淫人婦女或為夫主邊人所知臨時得殃刀杖加刑手足分離禍及門族或為王法收捕著獄酷毒掠治身自當罪死入地獄臥於鐵牀或抱銅柱獄卒然火以燒其身地獄罪畢當受畜生若得為人閨門淫亂遠佛違法不親聖賢常懷恐怖多危少安智度論云破戒之人若著法服則是熱銅鐵鍱以纏其身若持鉢盂則是盛煬銅器若所噉食則是吞熱鐵丸飲熱煬銅若受人供養供給即是地獄牛頭獄卒若入精舍則是入大地獄若坐僧床是為坐熱鐵床上又大乘妙林經云釋迦為太子時五欲厭離而求出家而說偈曰世間不淨衆惑邪無過婦人之體性衣服瓔珞莊嚴故愚癡是邊生欲貪有人能作如是觀如幻如夢非真實速捨無明莫放逸必得解脫功德身第四妄語戒分二初標名四曰不妄語釋妄語者違心故說也佛弟子直心是道場於四威儀一切行中言無虗誑若以不淨心口念相違出言不實者皆名妄語也妄根於心言發於口背真逐妄顛倒是非使正道不明邪詞動衆此乃修道障緣應當杜絶故華嚴經云性不妄語菩薩常作實語真語如語乃至夢中亦不忍作覆藏之語無心欲作何況故犯楞嚴經云如是世界六道衆生雖則身心無殺盜淫三行已圓若大妄語即三摩地不得清淨成愛見魔失如來種二釋義分三初述律二引證三結勸初中分四初小妄語二大妄語三開聽四舉況初中復三初總標解曰妄語有四釋妄語有四者乃初標其名也謂分別妄生則出言虗妄或因喜悅而出者或因引誘而出者或因瞋恚而出者或因嫉妬而出者然境既不一則語有大小罪有重輕故如來大慈凡有妄境一切俱制境有三品父母師僧名上人天名中鬼神畜生名下若有犯者隨事所定今先明四種究其本源皆由妄起所謂一翳在眼千花亂墜一妄在心河沙生滅心王若正則六臣不邪也二別釋分四初妄言一者妄言謂以是為非以非為是見言不見不見言見虗妄不實等釋言者心聲也心正則言正心邪則言邪也又直出為言由己意發而為言故宣述為語由述見聞而為語故如來之語無非利益衆生故有真語實語正語也衆生之語無非損害衆生故有妄語綺語兩舌惡口也以是為非故見言不見也以非為是故不見言見也由虗妄故是以不實然妄語雖有八種不出見聞觸知四法謂見言不見不見言見聞言不聞不聞言聞觸言不觸不觸言觸知言不知不知言知若欲惑彼隨作其一皆名妄語又見言不見誑也不見言見虗也謂以分別識在眼為見在耳為聞在鼻舌身為觸在意為知以見聞知三根性利力用偏多能取遠境故各分為名鼻舌身三根性近力用處少能取鈍境故合為名今但舉見之一法等者總收聞觸知三法也二綺語二者綺語謂粧飾浮言靡語艷曲情詞導欲增悲蕩人心志等釋綺者錦綺喻也靡者美麗也謂粧點粉飾虗浮無稽美麗之語如織錦繡攢花簇錦以眩人心目也又言雖是實說不應時非時而說亦名綺語艷曲者謂巧作艷麗歌曲惑人心聽如靡靡陽阿之曲是也大都古樂府之作聲韻正雅無如漢魏後之效體漸入艷麗至唐玄宗酷愛法曲選妓三百人教於梨園今謳曲稱梨園者本此纂要云齊歌曰謳吳歌曰歈淫歌曰哇楚歌曰艷情詞者言詞華美妖冶之語也謂聲韻宛轉以盡意之所思引誘情欲皆能導人之愛染長人之悲哀也然詞與曲不無移商換徵隨時小異大約漢唐尚樂府宋元尚歌曲此騷人詞客所為非學者之所涉躐也蕩人心志者謂如上情詞艷曲乃宣述入愛之結使能改人常性喪人正念令修學人失如來種故曰蕩人心志等者總攝喜怒哀樂之法也筆餐云李伯時善畫馬秀鐵面呵曰汝士大夫以畫名矧又畫馬期一人誇妙妙入馬腹中亦足懼矣伯遂罷筆師勸畫觀音贖過黃魯直工艷詞師亦詆呵之黃笑曰又當置吾於馬腹中耶師曰艷語動天下人淫心不止馬腹正恐生泥犁耳黃悚然悔謝遂勵精進三惡口三者惡口謂粗惡罵詈人等釋惡口者謂言語抵觸甚於梟鳥不留他人情面粗聲惡氣罵辱毀謗於他也所以瞋火一起衝口燒心傷害前人痛逾刀割實乖菩薩之善心違如來之慈訓也故法苑曰瞋是失善法之根本墮惡道之因緣法樂怨家善心大賊惡口腑臟也罵詈者正斥曰罵傍毀曰詈謂自恃所長背求他短惡口罵詈然罵有七種或以相罵或以根罵或以罪罵或以病罵或伎藝罵或結使罵或種姓罵等者總攝如上罵法也身死魂逝墜墮三途如經所說若墮地獄割舌令自啖食若墮餓鬼口中蛆膿流出若生禽獸食啖糞穢人怪其聲罪畢為人面貌醜陋口氣常臭唇齒皆缺佛言寧以利刀割斷其舌積劫受苦不可以一言罵謗持戒比丘惡報難盡有二種人一向入地獄一若非梵行自稱梵行二若真梵行而以非梵行謗之四兩舌四者兩舌謂向此說彼向彼說此離間恩義挑唆鬬諍等釋兩舌者謂彼此交扇也向此說彼者謂傳彼人之言而向此說傳此人之言而向彼說也皆出忿嫉在心故以閒言冷語疑訕叢生合者使離濃者使淡令師資恩喪朋友義絶縱不傳彼此之言但於二邊說令離散者亦是兩舌也管子云析交離親是為賊矣離別也間隔也君父師長專釋曰恩兄弟朋友善益曰義挑唆者謂前人未說挑發唆起彼此之言令生鬪諍也成實論云善心教化雖為別離亦不得罪若以惡心令他鬪亂即是兩舌得罪深重墮三惡道中世世得敝惡破壞眷屬以今離間破壞他故三類結乃至前譽後毀面是背非證入人罪發宣人短皆妄語之類也釋乃至者相繼之詞謂此四法皆是妄語之等流也前譽後毀者謂現前獎譽退後毀呰愛之欲生惡之欲死也面是背非者謂面從公是背地私非無見聞疑恣心亂說但圖泄自己之忿恨不顧他人之死活也報恩經云佛告阿難人生世間禍從口出當護於口甚於猛火猛火熾然燒世間財惡口熾然燒七聖財也證入人罪者謂無問前人有罪無罪但以惡心硬作證盟置他人罪也發宣人短者謂訐彼陰私宣其短處惟知有己不顧他人欺巧百端令人陷沒故曰皆妄語之類也易云一言之善千里應之一言不善則千里違之古人三緘其口所以為後世之龜鏡也太公曰欲量他人先須自量傷人之語還是自傷含血噴人先污自口漢新息侯馬援以書誡其兄子曰吾欲汝曹聞人之過失如聞父母之名耳可得聞口不得言也好議人長短妄是非正法此吾所大惡也寧死不願聞子孫有此行也輪轉五道經佛言為人喜傳人惡死入地獄煬銅灌口拔出其舌以牛犂耕之後墮惡鳥人聞其聲莫不驚怖呪令其死二大妄語分二初明境若凡夫自言證聖如言已得須陀洹果斯陀含果等釋凡夫自言證聖者此初標其名也前言世諦之事此言出世妄語也謂身居有漏心等庸流故名凡夫明了四諦住最後身故名聖人梵語阿離野此翻云聖昔商太宰問孔子曰夫子聖者與曰丘博聞強記非聖也曰三王聖者與曰三王善用智勇聖非丘所知曰五帝聖者與曰五帝善用仁義聖非丘所知太宰駭然曰然則孰為聖乎孔子有間動容對曰西方有聖者焉不言而自信不治而不亂不化而自行蕩蕩乎人無能名焉然凡聖之別有十法界凡夫由染緣而成謂一切衆生於真性上情想自異故有六凡聖人從淨緣而證謂佛與三乘於無為法中智有高下故有四聖可見凡之與聖懸若天淵今言證者妄之極矣如楞嚴云譬如平人妄號帝王自取誅戮須陀洹者此翻預流謂斷三界八十八使見惑已盡預入聖道法流故又云見道謂見真諦故或名逆流或名入流謂逆生死流入聖法流故又名聖位此小乘初果聖人也斯陀含者此云一來謂欲界九品思惑中已斷前六品盡後三品尚在猶須更來欲界一番受生故此二果聖人也等者謂餘三果四果乃至或云得禪定解脫三昧正受天龍鬼神來歸依我之語未盡故二定罪名大妄語其罪極重釋大妄語者謂如上四果及禪定等法毫無知見妄言已得已證故曰大妄語也以此誑惑世人而邀名利供養者死墮無間地獄故曰其罪極重也三開聽餘妄語為救他急難方便權巧慈悲利濟者不犯釋餘妄語者謂除上妄語之外也救他急難者謂本無謀利之心全以苦為念故如律云有獵者逐兔兔走避佛座下少頃獵至佛所問見兔否佛曰不見獵乃去後弟子問兔見在佛座下云何見言不見佛曰為救兔故又如波斯匿王敕殺厨監末利夫人令人留藏待王酒醒悔恨送至王所王大歡喜夫人雖受八戒為救他難而不犯妄語戒是名方便權巧慈悲利濟者也四舉況古人謂行己之要自不妄語始況學出世之道乎釋古人即司馬溫公要立身之要也通鑑載劉忠定公問司馬溫公曰盡心行己之要可得聞乎公曰其誠乎又問行己之要以何為始公曰自不妄語始二公皆宋之為儒也尚以誠信為本況出世之人豈得言行乖違耶蓋道德之存至誠為首立身之要言行為先所以南容三復白圭將以戒慎其言是故古人戒始慎終自不妄語始也靈源曰舉措不可不審言行不可不稽寡言者未必愚利口者未必智也二引證分二初果報經載沙彌輕笑一老比丘讀經聲如狗吠而者比丘者是阿羅漢因教沙彌急懺僅免地獄猶墮狗身惡言一句為害至此釋此引往事以證妄言之咎也犬鳴曰吠一言而墮狗身者果不昧因也阿羅漢此云無學謂所作已辦梵行已立不受後有無法可學故僅但也大報恩經云波羅奈國大富長者年至八十生一男子名曰均提十歲出家往利提利因陀羅山至如來所佛為說法即得道果阿難心疑白佛佛言均提沙彌非適今也過去毗婆尸佛時有一年少沙彌精通三藏見一老比丘人相不具好讚三寶音聲濁鈍不能歌唄少年罵言音如狗吠老比丘便呼年少汝識我否我梵行已立不受後有年少聞之心驚毛竪即求懺悔我因愚癡不識聖賢願我來世見善知識爾時年少惡罵上座五百生中常作狗身百千大衆聞佛所說咸立誓言假使熱鐵輪在我頂上旋終不為此苦而發於惡言假使熱鐵輪在我頂上旋終不為此苦毀謗聖賢人爾時舍利弗晝夜六時以道眼觀諸衆生有應度者而度脫之爾時摩竭提二國中間五百賈客將一白狗初夜煮肉作食於後夜時狗偷食之次日賈客饑渴作瞋持刀刖其四足投身糞坑宛轉腹行受苦不盡舍利弗入城乞食經過彼路至此狗所持食與之說法利喜却後一七罪畢得出生於人中佛告阿難爾時白狗豈異人乎今均提沙彌是也由過去世毀罵賢聖墮在惡道由初願懺悔罪畢得出生於人道遇佛世尊即得漏盡二華報故經云夫士處世斧在口中所以斬身由其惡言釋此文雖出本經然法句阿含大律皆同法苑云口者關也舌者兵也出言不當反自傷也高僧傳云兵者不祥之器不得已而用之言者不真之物不得已而陳之又斧喻其舌惡言喻斧發也如人擲斧斬天斧落還傷自體世人欲以惡言害彼而反目害於己也如大律云昔調達罵舍利弗為惡欲比丘應時熱血從鼻孔出即以生身墮大地獄中佛因而說偈曰夫士處世斧在口中所以斬身由其惡言應毀反譽應譽反毀自受其殃終無有樂諸經集要云甘露及毒藥皆在人口中甘露謂實語妄語則為毒毒不決定死妄語則決定妄語自不利亦不利他人自他俱不利云何妄語說若與身不利慎口也何妨三結勸噫可不戒歟釋地持論云妄語之罪能令衆生墮三惡道若生人中得二種果報一者多被誹謗二者為人所誑何故妄語墮三惡道謂緣其妄語不實使人虗生苦惱是以死受地獄苦以其欺妄乖人誠信故受畜生報緣其妄語皆自貪欺貪欺罪故復為餓鬼以其妄語不誠實故被人誹謗以其妄語欺誘人故為人所誑既知妄語有此四大苦報可不戒歟第五飲酒戒分三初標名五曰不飲酒釋酒者禍泉也飲之令人惛迷神智顛倒是非爛菩提芽壞正覺果應當杜絶梵網經云菩薩應生一切衆生明達之慧不應生一切衆生顛倒之心也昔元鑒禪師數興造工匠繁多或送酒者輒曰我所造者必令如法寧使罷工無容飲酒時清化寺修營佛殿州豪孫義致酒兩輿與鑒鑒即破酒器流溢地上義大怒明將加惱夜夢神人以刀擬之既窹躬詣懺悔薩遮尼乾子經云飲酒多放逸現世常愚癡忘失一切事常被智者呵來世常暗鈍多失諸功德是故黠慧人離諸飲酒失二釋義分三初述律二引證三結勸初中分四初明境解曰飲酒者謂飲一切能醉人酒西域酒有多種甘蔗蒲萄及與百花皆可造酒此方止有米造釋飲酒者乃總標之詞酒非一種故曰一切西域即天竺也多種者知神仙服食經云採南燭草煮汁為酒碧映五色之神光扶桑記云頓遜國有樹形似安石榴取其花汁貯盆內數日成美酒洞冥記云瑤現去王門九萬里有草割之釀酒飲一合三日不醒飲日溪水則醒南史載拘樓國有水仙樹腹中有水謂之仙漿飲者七日醉古今注云烏孫國有青田核得水成酒味醇飲盡更生名青田酒孚異物志云文草作酒味甚美人以金買不以為貴然酒雖有多種大略不出其二一者穀酒謂以五穀和而釀成之二者木酒謂唐相莖花果雜諸藥而醞成之即甘蔗蒲萄百花藕根糖蜜等是也此方即震旦也謂震旦惟未造故二顯戒俱不可飲釋俱不可飲者謂如上等酒但有色香美味能醉人者一切俱不得飲也若不改者現世為人所耻死墮惡道亦不得以草頭著酒滴入口中謂涓滴不除漸成河海乃至啖槽食和酒煮食皆不可也是故佛言若以我為師者不得飲酒亦不得貯畜三開權除有重病非酒莫療者白衆方服無故一滴不可沾唇釋重病者言非輕小之疾也千鈞之弩豈獨為鼷鼠所發非酒莫療者若醫言別物所不能救唯酒可療者准律白衆方服始無自私之咎也但不得未病先病以此為由之心而飲若假以病緣而圖貪飲者即名破戒雖為病故有效則服病愈即止飲時不得入衆應在佛殿下風遙禮亦不聽誦經持呪七日之外沐浴更衣方許作也無故者無病緣之故不得飲也律中佛言酒有多失開放逸門飲如葶藶犯罪已積若消病苦非先所斷又薩遮尼乾子經云酒為放逸根不飲閉惡道寧捨百千身不毀犯法教寧使身乾枯終不飲此酒假使毀犯戒壽命滿百年不如護禁戒即時身磨滅決能定使差我猶故不飲況今不定知為差為不差作是決定心心生大歡喜即獲見真諦所患即消除毗尼母經云莎提比丘自小因酒長養身命後出家已不得酒故四大不調諸比丘白佛佛言病者聽甕上嗅之嗅不差者聽用酒和麵作餅食之若差者不聽復嗅食四護譏乃至不得嗅酒不得止酒舍不得以酒飲人釋嗅鼻嗅也暫停曰止酒舍即酒肆也乃惡律儀之一嗅酒止酒舍雖不飲有大患者二一令人生疑二漸薰成性亦防微杜漸之法也梵網經云以酒飲人者五百世無手戒之甚嚴謂自破酒戒不過罪及一身若與人飲為害不止故二引證分二初外典二內經初外典分三初禹禁儀狄造酒禹因痛絶釋人物考云儀狄禹妃弟善造酒禹飲而甘之曰後世必有以酒亡其國者遂疏儀狄而絶旨酒昔漢邴原絶酒不飲人或問之原曰本自能飲但以荒思廢業故斷之耳世儒尚畏廢業況學出世之道乎又晉中興書元帝性嗜酒王導深以為誡左右進觴覆之晉書凡民不得私釀酒沽其有婚姻及疾者聽之餘犯者罰金八兩又枚乘七發云酒為腐腸之藥自古聖君賢臣恐以纍民故禁之也二紂亡紂作酒池國以滅亡釋人物考云紂名辛帝乙少子兄弟三人長曰微子啓次曰中衍皆庶出三曰辛嫡出即紂也資辨捷疾力格猛獸智足以拒諫言足以飾非以肉為林以酒為池使男女裸逐其間一鼓而牛飲者三千人宮中九市為長夜之飲作炮烙之刑剖孕婦斫人脛王子比干諫之怒曰吾聞聖人心有七竅遂殺比干刳視其心於是武王告諸侯曰殷有重罪不可不伐乃東伐紂紂走登鹿臺衣其珠玉自燔而死禹謂後世以酒亡國者此也所以詩書淫亂之戒其原皆在於酒故微子以紂沉𨠯於酒遂作誥以告箕子比干而去穆公因周厲王沉湎於酒故作大雅嗟嘆而泣涕流連後秦主符生飲無晝夜乘醉多所殺戮臣民畏之海東王符堅將兵伐生生猶醉𥧌兵殺之堅遂稱帝唐敬宗年十八夜與宦官酣飲擊毬俄燭滅遇弒是以亡身喪國皆由酒也三僧過僧而飲酒可耻猶甚釋僧者謂禁戒守真威儀出俗紹隆聖種震懾魔軍為人天之標幟法門之梁棟也若飲酒者則言多不根過失無量謂狀如狂象之無鉤似戲猿之在樹故曰可耻猶甚也二內經分三初明因昔有優婆塞因破酒戒遂併餘戒俱破三十六失一飲備焉過非小矣釋梵語優婆塞此云近事男謂受持三歸五戒可以親近三寶而住故婆沙論云昔有一近事稟性仁賢受持五戒專精不犯後於異時遠行歸家家人赴會彼為渴所逼見器有酒如水遂取飲之便犯酒戒時有鄰雞來入其舍盜殺而食復犯盜殺二戒鄰女尋雞入舍強逼交通復犯淫戒鄰家告官拒諱不陳復犯妄語故云遂併餘戒俱破三十六失者謂不孝父母輕慢師長不信三寶不敬經法誹謗沙門訐露人短常說妄語誣人惡事傳言兩舌惡口傷人生病之根鬪諍之本惡名流布人所譏嫌貶斥聖賢怨黷天地廢忘事業破散家財恆無慚愧不知羞耻捶打奴婢橫殺衆生姦淫他婦偷人財物疏遠善人狎近惡友常懷恚怒日夜憂愁牽東引西持南著北倒街臥巷墮車墜馬逢河落水持燈失火暑月熱亡寒冬凍死此三十六失皆由一飲而備故云過非小矣二感果貪飲之人死墮沸屎地獄生生愚癡失智慧種迷魂狂藥烈於砒鴆釋貪飲者謂貪其香味飲之快意也殊不知快意即生顛倒顛倒便失正念失正念則失佛種矣輪轉五道經云為人喜飲酒者死入沸屎泥犁中後墮猩猩獸中後生為人愚癡暗鈍故無所知教化地獄經云信相菩薩白佛言復有衆生或顛或狂或癡或騃不別好醜何罪所致佛言以前世時坐飲酒醉亂犯三十六失後得癡身如似醉人不識尊卑不識好醜故獲此罪然善惡無爽有因必果貪飲故墮沸屎醉亂故失智慧迷魂狂藥者以酒能使人顛倒錯亂外失威儀內喪真性故烈於砒鴆者砒是砒霜服之心神撓亂而死鴆是鴆鳥大如班鳩食蛇之物凡飲食中反毛攪之服者即死烈者謂酒之酷更甚於砒鴆之毒也然砒鴆之毒不過毀其色身未來又得人身飲酒之毒能壞戒身戒身一壞則難復矣三立誓故經云寧飲煬銅慎無犯酒釋寧飲煬銅者想酒之過利害如是故作誓言寧飲煬銅腐爛我身而終不飲酒也以上經論及諸書史種種言辭譬喻總之勸勉離諸酒過也蓋天下毒之猛烈無甚於砒鴆諸毒及以煬銅故舉喻以戒之為佛弟子能不醒乎三結勸噫可不戒歟釋舍利弗問經云迦蘭陀竹園精舍一比丘疾篤將死優波離問汝須何藥曰須酒實違毗尼寧盡身命無容犯酒優波離言若為病開如來所許於是服酒差病比丘懷慚猶謂犯酒往至佛所殷勤悔過佛為說法得羅漢道粱高僧傳云法遇在江陵長沙寺一僧飲酒廢夕燒香遇但罰不遣師道安以筒盛荊寄遇遇向筒致敬伏地令維那行杖垂淚自責第六著香花鬘戒分二初標名六曰不著香花鬘不香塗身釋不著香花等者斷其貪愛也貪愛若斷即同佛身依正莊嚴自然具足欲得莊嚴具足先當離香觸二塵也蓋世人皆知如來依正莊嚴世無能比而不知如來依正從曠劫苦行修成斷滅貪愛所感今人苦行不修貪愛不斷而欲倣佛如來依正者譬如貧人服帝王服其禍速至矣二釋義分三初述律二引證三結勸初中分二初明境解曰華鬘者西域人貫華作鬘以嚴其首此土則繒絨金寶製飾巾冠之類是也香塗身者西域貴人用名香為末令青衣摩身此土則佩香熏香脂粉之類是也釋梵語磨羅此去華鬘或云瓔珞天竺人多用蘇摩那等花行列貫串以嚴其首名之為鬘無論男女皆以此而莊嚴之繒是細絹絨即刮絨練熟絲也製飾者謂以金銀七寶等物裝飾瓔珞環釧并製造巾冠之類也其巾冠之製始於黃帝之時古禮二十始冠其士人用冠庶人用巾自後子雲東坡各製其式名不一定名香者謂沉檀速麝龍腦酥合薰陸白膠等貴重之香也塗身者天竺國法貴勝男女皆用好香為末或洗浴之後令童子以塗其身如此方香肥皂之類青衣侍童也如玄真子命樵青竹裏煎茶是也此方有佩帶香囊或用香筒以熏衣被乃至塗抹胭脂膩粉等皆攝此戒二儀録云胭脂起自紂以紅藍花汁作脂為桃花籹燕國所出也銀粉古今注云三代以鉛為粉此皆俗態也二顯戒出家之人豈宜用此釋謂出家人若用繒絨金寶等製飾帽笠者即如天竺貫花作鬘以嚴其首也若佩香熏香者即是以香塗身也此皆俗士所為非僧所用既然出俗當遠離飾好修出世道壞色為服莊嚴法身戒定為香薰無漏體詎可同俗行事恣心貪愛耶故云豈宜用此若貪愛心著是物者非佛弟子何也以貪愛心是發欲之本欲念若除則諸惡不生也大菩薩藏經云若有味著花鬘塗香即是味著熱鐵花鬘亦是味著屎尿塗身也二引證分五初思古佛制三衣俱用粗疏麻而獸毛蠶口害物傷慈非所應也釋佛制如上三衣者安陀會多羅僧僧伽黎也粗者不精疏者不緻此引智度論文而語之以誡不得貪好故獸毛裘褐之類蠶口紬絹之類此皆從殺生而成故曰害物有虧慈濟之心故曰傷慈既違佛制復傷仁慈故曰非所應也大智照律師云智度論明昔日迦葉如來授我釋迦本師衣者十三條粗布僧伽黎是也洎至垂滅親付飲光尊者於雞足山以待彌勒可見佛佛所持粗布衣也二開權除年及七十衰頺之甚非綿不暖者或可為之餘俱不可釋氣弱日衰力少曰頽甚者不堪極也謂七十已後血氣衰微神力不堪粗重衣服不能行動故權許之此大師以世間服而垂慈故非三衣也或者不定也謂衰頽不甚則不許也感通傳云唐乾封二年二月四天王白宣律師曰釋迦如來初成道時乃至涅槃唯服粗布僧伽黎及白㲲三衣未曾著其蠶衣繒帛也三俗儉夏禹惡衣公孫布被王臣之貴宜為不為釋惡者敞衣頌禹之德也通鑑載伯禹夏后氏名文命字高密諡法受禪成功曰禹祖顓頊父乃黃帝玄孫也孕歲有二月堯戊戌五十八載六月六日生於道之石紐鄉長於西羌以土德王正建寅百有六歲崩於會稽堯時洪水滔天治水無功舜乃舉禹續父業居外十三年以開九州三過其門不入水害遂息受舜禪位都於安邑國號曰夏禹為人敏給克勤其德不違其仁可親其言可信其聲應鐘律身有法度故孔子稱曰菲飲食而致孝乎鬼神惡衣服而致美乎蔽冕卑宮室而盡力乎溝洫禹吾無間然矣昔帝堯布衣掩形鹿裘禦寒衣履不敝不更換漢文帝亦身衣弋綈幃帳無文晉武帝焚雉頭裘猶敕不許貢獻奇技異服斯等聖君非一不能盡舉也公孫姓也名弘漢武帝徵為博士天子察其敦厚遂以為御史大夫食不重肉脫粟之飯而為布被俸祿皆給與仰食之賓家無所餘時汲黯奏曰弘位在三公然為布被此詐也帝問弘弘謝曰有之誠中弘病夫以三公為布被實飾詐以釣名且無汲黯之忠陛下安得聞此言天子以為謙讓愈益厚之以弘為丞相封平津侯年八十而終四僧節豈得道人反貪華飾壞色為服糞掃蔽形固其宜矣釋道人者學道之人也華花繅飾裝飾出家受戒期得道果而反貪花繅服飾則於道行無益矣壞色者凡檀越所施衣財用草根樹皮染成青黑木蘭三種壞色一壞其貪愛之心與道相應故二壞其五大上色以別俗服故亦名緇色即壞色也糞掃衣者律有十種謂世人所棄不用之物視同糞掃故比丘拾來浣染成袈裟色縫補三衣以蔽形體知足進道息馳求心斷憍恣念故曰固其宜矣昔比丘持糞掃衣就河而洗諸天取汁用洗自身而不辭穢次外道持淨㲲將洗諸天遙遮勿污池水是知重其德不重其物也五舉況古有高僧三十年著一䩫鞋況凡輩乎釋高僧者謂居塵不染道高德重之稱也雙履曰䩫唐高僧傳云慧休法師十六歲出家學通經論尤善華嚴唯有律部未遑精閲意以為戒可事求按讀即曉未勞師授後披一卷性遮茫然方悔前議乃請律提瓶從洪律師聽四分律三十餘遍而顧諸學徒曰余往聽經論一遍入神今聽律部逾增逾暗豈非理可虗求事難通會是以嘗聽礪公講律礪曰法師大德暮年如何猶勤律部休曰余憶出家之始從虎口中來豈以老朽而可斯須離耶吾恨不得常聞耳今之後學薄知文句宗致渺然即預師範所以終夜長嘆矣休敬慎三業懷課六時奉禁守道逾衰逾篤衣服趣得蓋體襆懸壁上著一麻鞋經三十餘年遇軟地則赤腳人問之故答曰信施難消帝屢召入京固以疾辭春秋八十有八又唐通慧禪師大悟後布衲重縫冬夏不易晚年唯一裙一被一麻鞋二十餘載遇砂地則穿之恐傷父母遺體故遇軟地則赤腳行恐損他信施故三結勸噫可不戒歟釋優多羅母經云優多羅比丘尊佛樂法酒不歷口過午不食香花脂粉未嘗附身母為餓鬼優多羅以瓶盛水楊枝著中法服覆上飯比丘僧舉名呪願母免重咎阿育王經云南天竺有一男子於佛法中出家少欲知足不樂榮顯不以酥油摩身不以湯水洗浴不食酥油不願華飾常畏生死詣摩偷羅國禮敬優波笈多一聞說法精進思惟得羅漢果第七歌舞觀聽戒分二初標名七曰不歌舞倡伎不往觀聽釋不歌舞者身口無過不觀聽者眼耳清淨也學道以修身為本當守口如瓶防意如城惟務一心精勤辦道然三界之中舉足動步無非罪苦古人說暫時不在如同死人道業未成有何樂處初心一失後悔難追故曰不得歌舞倡伎及往觀聽也嘗論耳目之於聲色極易惛人神智亦能發人悟機故仙人緣之而神足頓失樓子因之而心地豁開推其惛智之源謂被聲色流轉故名順流順者下也究其發悟之本不被聲色流轉故名逆流逆者上也今之博地凡夫不被聲色流轉者少故於道日遠矣是以初學者當避聲色如刀劍觀戲笑猶如哭歌舞如狂外境不耽則內心自寂也昔佛在世時大權菩薩感佛恩德現天人身常以梵唄歌讚於佛或演無常苦空無我之音令諸衆生感悟真常使水鳥樹林咸宣妙法豈可同於世間歌舞倡伎而比喻耶二釋義分三初述律二引證三結勸初中分二初明境解曰歌者口出歌曲舞者身為戲舞倡伎者謂琴瑟簫管之類是也釋歌曲者謂引聲揚韻唱和曲調也樂書云樂有歌歌有曲曲有詞所以詩言志歌詠言爾雅云長引其聲比於琴瑟曰歌歌聲遠聞曰謠故善歌者有含商吐角之音也戲舞者如霓裳芰飾窈窕翩翻及身首變現手足跳躑等倡伎者即伶人也謂能鼓吹琴瑟簫管之類以娛樂也又琴瑟是絲樂簫管是竹樂琴者爾雅疏曰伏羲斫桐為琴又云神農氏作別名曰離大者絃二十七未詳長短廣雅曰琴長三尺六寸六分表朞之三百六十日合天人之和廣六寸表六合腰濶四寸亦表四時前廣後狹表尊卑面圓背方表天地五絃表五行十三徽表十二律餘一徽表閏後文王加少宮少商二絃或七或云加文武二絃字彚云大者長八尺一寸中長三尺六寸六分詩義云鳳池四寸表四時龍池八寸表八風又有說云琴有三十三絃絙桑為之以修身理性反其天真今人用之為戲樂誤矣瑟者爾雅疏曰伏羲作五十絃黃帝破為二十五絃禮圖舊云雅瑟長八尺一寸二十三絃其常用者十九絃餘四絃頌瑟長七尺二寸二十五絃盡用之鄭注云大瑟別名曰灑又呂氏春秋云朱襄氏之世天下多風陽氣不積果實不成故斌王建五絃之瑟瞽瞍作十五絃舜益八絃漢武帝歌兒作二十五絃白虎通云琴者禁也所以禁止邪想以正人心志也瑟者嗇也間也所以懲忿窒欲正人之德也簫者風俗通云舜作簫編小竹管為之參差不齊象鳳之翼博雅云大者二十三管長尺四寸小者十六管長尺二寸爾雅云大者名言小者名筊釋名簫肅也其聲肅肅而清也又禮記曰女媧作笙說文云笙者象鳳之巢大者名巢十九簧小者名和十三簧管者長一尺圍寸漆竹為之如笛六孔十二月之音大者名簥小者名𥰚豎吹如簫形如篪籥周禮曰篪竹為之長尺四寸七孔橫吹毛傳曰籥竹為之如笛三孔橫吹文王之樂風俗通云笛者武帝時丘仲作長尺四寸六孔或七孔笛者滌也所以蕩滌邪穢納之雅正也樂書云剪雲夢之霜筠法龍吟之異韻今時簫體似笛只在橫竪以別也謂竪者為簫橫者為笛其餘琵琶箜篌等皆技樂之類也二顯戒不得自作亦不得他人作時故往觀聽釋不得自作者謂不得自己口唱歌曲及歌咏誦經如婆羅門吟詩讀書等聲也亦不得身為戲舞如霓裳窈窕登場假粧故事乃至掉臂叉手執刀揮戟等皆不得也故往者有心故往步步招愆無心而遇住則成罪也二引證分四初欲害古有仙人因聽女歌音聲微妙遽失神足觀聽之害如是況自作乎釋遽即也神足者謂神仙有五通一天耳通謂一切苦樂音聲悉能聞故二天眼通謂一切形色及諸衆生死此生彼苦樂之相悉能見故三宿命通謂自他多生所行之事悉能知故四他心通謂他人心中思惟善惡之事悉能知故五神足通謂隨意變現飛行自在一切所為無有障礙故大毗婆沙論云昔有隲陀衍那王將諸宮女詣水迹山除去男子純與女人燒衆名香奏五妓樂露形而舞樂音清妙香氣芬馥時有五百仙人乘神通上過或見色或聞聲或嗅香皆退神通一時墮下如折翼鳥不復能飛王見問曰汝等是誰諸仙答言我是仙人王言汝得非非想定否仙言未得乃至問言汝得初禪否仙言曾得今失時王瞋言不離欲人如何觀我宮人婇女便利劍斷截五百仙人手足彼諸仙人有從眼根而退有從耳根而退有從鼻根而退是故一時墮落故云觀聽之害如是況自作乎所謂才生一念欲便失五神通是也二闢妄今世愚人因法華有琵琶鐃鈸之句恣學音樂然法華乃供養諸佛非自娛也釋今世末法時也愚人不諳教法者法華乃一乘之妙法琵琶是胡琴長三尺五寸象三才五行四絃象四時也鐃閙也謂鳴時則樂音喧閙也古以金造之又鐃止也凡秉軍法卒常執鐃金鐃一響鼓聲即止也鈸助也謂鳴時以助樂聲也娛樂也謂初出家人無向上志乃不知出家之體最尊而流俗之風甚下但聞法華有琵琶鐃鈸之句輒便恣心肆作以取其樂乃不知樂是苦因然法華是使人作供養諸佛種未來成佛之因受戒之人果能戒行精嚴豈無諸天護佑設或誦經禮懺猶可名為法施若耽粗細音樂則恐情生愛染故不許也甚至蒙昧愚人不學毗尼謬解聖意借言法華之句恣意習學吹簫打鈸以為娛樂抑何異於優伎人耶則僧寶淪失地獄因深律云舍利弗目犍連般涅槃已時諸比丘自作伎樂吹唄供養佛言不應爾諸比丘畏慎不敢令白衣作伎佛乃聽許則佛制可知矣問如來說法無有二言法華律儀皆是佛說云何法華則許律儀不許耶然要知律儀中人若以音樂為功德即律儀轉為法華矣若法華中人以音樂自娛即法華律儀俱不成矣三撫正應院作人間法事道場猶可為之今為生死捨俗出家豈宜不修正務而求工伎樂釋應院者謂應供檀門作佛事之院也人間法事者顯非出世間真實佛事也間晏修道之處名為道場緣佛初坐菩提樹下成等正覺故以此處為得道之場今以人間法事而為道場者亦由檀信䖍誠奉請三寶以求福利是故凡供佛轉法之處稱為道場非第一菩提道場也猶可為之者乃少允之詞非大許也謂瑜伽佛事古來皆是行德兼優大法師作但今非昔比也割愛辭親是曰捨俗出煩惱家故曰為生死持戒禪誦禮拜勤修福慧名為正務正務不修而反專於技樂者重增生死之纍也信施難消光陰虗度將何以敵生死也四革弊乃至圍碁陸博骰擲摴蒱等事皆亂道心增長過惡釋圍棊博物志云堯作以教丹朱也子三百六十一縱橫十九路方言云自關以東謂之奕象棋有三十二子以象牙飾之故云象棋世傳堯作圍棋武士作象棋以象戰鬬故有云昔神農以日月星辰為像唐相國牛僧孺用車馬將士卒加炮代之為機矣陸博漢書注云行棋也鮑宏博經云二棋分黑白各半擲之骰即骰子是陸博采具又陸博即雙陸棋亦名博塞戲魏曹植製雙陸局以五木為骰子有梟盧雉犢塞五者為勝負之采故人刻一骰為梟鳥形得之為上勝又骰六箸行六棋謂之六博也擲者投也拋也如擲石投壺拋毬跳錢也投壺古用石今用矢以中者為勝摴蒱即博籌也今謂之呼盧取純色為勝用六子為馬今人擲之為戲亦博奕之總名所謂摴蒱一擲百萬是也等者總結一切戲具也如上所說皆非佛子所為徒亂修道之心增長愚癡惡業沉淪苦海無解脫時有志之人寧守愚朴甘坐蒲團三衣一鉢專精戒學如求工末技而犯佛戒者豈好心出家之所為耶大都善惡對待如箭鋒相柱究竟為惡則易為善則難為惡如放無韁之馬為善如撑逆水之舟逆水之舟漸有上進無韁之馬一去難收矣此又為同志者之所語也晉陶侃為荊州刺史見吏博奕戲具謂曰圍棋堯舜以教愚子博奕殷紂所造諸君並國器何以此為又云大禹聖人乃惜寸陰至於衆人當惜分陰諸參佐毋以戲廢事遂取摴蒱投之於江曰摴蒱乃牧猪奴戲耳三結勸噫可不戒歟釋高僧傳云唐玄奘法師年十一出家觀諸沙彌劇談掉戲謂曰夫出家者為無為法豈復更為兒戲可謂徒喪百年矣大論云聲相不停暫聞即滅愚癡之人不解聲相無常變失故於音聲中妄生好樂於已過之聲念而生染著有智之人觀聲生滅前後不俱無相及者作如是知則不染著若斯人者諸天音樂尚不能亂何況人聲如是等種種因緣訶聲過失則不著矣如夫迦葉等聞天王彈琴尚起作舞不能自安況凡夫輩可不自警耶遠祖云苟以亂意皆為非法第八坐高廣大牀戒分二初標名八曰不坐高廣大牀釋不坐者身離觸塵故謂佛弟子依戒修行於四儀中應當事事知足不得愛好床褥生長憍恣懶修禪誦有所好樂則不得其正也戒經云常求三昧為牀智慧為座一心志道不得同俗行事貪好受用也一息不還便同灰壤愛好何用中阿含經云生聞梵志問佛出家以何為苦佛言出家以自在為苦謂隨順貪欲嗔恚愚癡不守禁戒因此憂惑故以自在為苦也又問以何為樂佛曰出家以不自在為樂謂學道不隨貪欲瞋恚愚癡以戒自制則無鬪諍無鬪諍則無怨憎憂苦有此義利故以不自在為樂也二釋義分三初述律二引證三結勸初中分二初明制解曰佛制繩牀高不過如來八指過此則犯釋繩牀十八種物之一也謂以繩穿繫於林中樹下棲宿以避卑濕故如來者謂乘如實道來度衆生也律中因瓶沙王以迦藍陀竹園供佛及僧諸大長者作種種房舍鋪設地敷天雨之時地多潮濕有病比丘不堪坐臥佛言聽作牀時有蛇蝎蜈蚣入內未離欲者見皆驚恐佛言聽安腳高一尺六寸即如來八指也牀有二種一繩牀為行腳者設二木牀為坐禪者設今言坐者木牀也毗婆沙論云佛八指約高一尺六寸如中人一肘坐時腳不掛空過此量者曰高但可容身轉側過此量者曰廣既高且廣故名為大大師恐初機學者放逸身心增長過惡故如大僧所制而說也二戒餝乃至漆彩雕刻及紗絹帳褥之類亦不宜用釋漆者灰漆也彩者莊彩也雕刳其內刻斫其外紗絹者皆殺生之財也如上等物乃王臣俗士所貴非出家者之所行為違佛明制損德招愆故不宜用也若檀越施來但宜藏護不應受用若大衆長連牀上坐臥不論困學紀聞云舜作食器流漆墨其上國之不服者十三人禹作祭器墨漆其外朱畫其內國之不服者三十三人然舜禹聖君也用漆為器不為過分而有賢臣諫諍者蓋恐百官庶民靡費不節故今之出家者華其私室精其器皿制度失佛祖之針受用等王侯之供忠言逆耳直諫者乃違脅肩諂笑曲奉者是趣此其所以叢林日弊法門衰替矣初學記云蒿宮茆柱實興國之清猷玉席珠衣乃危之弊化也二引證分三初舉況古人用草為座宿於樹下今有牀榻亦既勝矣何更高廣縱恣幻軀釋此引古以鑒今正明持戒止貪之益也可坐可臥名之曰牀狹而長者故名為榻物原云神農始作牀席已前尚無然最尊最貴莫過於王至上至聖莫過於佛世尊出王宮冢間露坐樹下棲身及成佛時用草為坐而作是言我若不成正覺終不起跏趺此如來出世之榜樣也今有牀榻已勝於樹居草座何更高廣雕刻縱此身形那肯還想修道耶幻軀者謂此身乃四大和合而成緣聚則生緣散則滅猶如夢幻空花虗妄不實故曰幻軀愚夫不了執之為實恣情縱欲增長漏根所以長淪三有往還無際矣東林混融禪師示衆云避萬乘尊榮受六年飢凍不離草座成等正覺度無量衆此黃面老爺出家樣子後輩忘本反為口體如佛言曰為沙門者去世資財乞食取足日中一食樹下一宿慎勿再矣二苦益脅尊者一生脅不著席高峰妙禪師三年立願不沾牀釋西域記云尊者中天竺人本名難生由在胎六十年始生故至八十歲投九祖伏馱尊者出家時年少比丘誚曰出家之業一則習禪二則誦經汝今衰老何所取進尊者聞之誓曰我若不通三藏不斷三惑得六神通具八解脫終不以脅至席於九祖處執侍左右未嘗睡眠日則披閲三藏夜則坐禪三年之內悉證所誓為第十祖時人敬仰號脅尊者一生者從出家敘起也元高峰禪師諱原妙吳江徐氏子母夢僧乘舟來乃孕至離襁褓喜趺坐遇僧入門輒欲從之年十五出家於嘉禾密印寺十六剃髮十七習天台教二十更衣入淨慈立三年死限不澡身不剃髮不沾床口體俱忘後於天目師子巖西石洞營小室如舟榜曰死關絶給侍洞非梯莫登撒梯斷緣雖弟子罕得瞻視示寂偈云來不入死關去不出死關鐵蛇鑽入海撞倒須彌山三樂愆悟達受沉香之座尚損福而招報釋唐知玄法師俗姓陳三學洞貫名冠一時異跡猶多故世號為陳菩薩五歲即便能詩十四講涅槃經李商隱贈詩云十四沙彌能講經似師年紀秪携瓶沙彌說法沙門聽不在年高在性靈懿宗賜沉香寶座高二丈餘僖宗賜號曰悟達國師二帝供養隆厚非常後忽定中見菩薩降手摩玄頂演深妙法而安慰之言訖即隱俄見一珠入玄左股隆起痛甚上有朝錯二字遂成人面瘡而玄前身是漢袁盎也害朝錯斬於東市玄十世為高僧錯求報不得因過受人主寵遇一念名利心起於德有損故能害之幸遇西蜀迦諾迦尊者洗以三昧水解之故不為患矣詳如本傳三結勸噫可不戒歟釋此牀座帳褥乃四聖種之一也於此知足則能進修道業證三菩提故名聖種若不知足則道果無分聖種失矣如悟達國師見解超時行位未測由不知足一念心起德損禍至我輩何人不以為戒哀哉雜阿含經云一沙門在河邊樹下學道十二年貪想不除身靜意遊曾無寧息不能得道佛化作沙門至其所有龜從河中出來至樹下復有水狗飢行求食便欲啖龜龜縮其頭尾四足藏於甲中不能得啖佛曰吾念世人不如此龜放恣六情外魔得便形壞神去生死無端輪轉五道苦惱百千即說偈言藏六如龜防意如城慧與魔戰勝則無患沙門聞之即得道果第九非時食戒分二初標名九曰不非時食釋不非時食者謂同如來正中而食口不犯過也離此便名非時前八後一名戒此非時食名齊齊者齊也謂齊過中不食也如來處於五中謂降生中國中夜踰城日中一食中夜成佛所談中道律云如來性離非時食從誕王宮乃至涅槃中間未嘗非時食也毗羅三昧經云非時不食得五種利益一離諸貪欲二神氣清爽三能却睡魔四道業易辦五增長福壽舍利弗問經云檀越造僧伽藍厚置資給供出家人非時就典食者索食與者食者得何等罪檀越得何等福佛言非時食者是破戒人是犯盜人非時與者亦破戒人亦犯盜人盜檀越物非施主意施主無福如失物故但有發心置立之善也西陽雜爼云貞元中荊州天崇寺僧智燈常持金剛經遇疾死弟子啓手足猶熱未敢殮經七日却活云初見冥王合掌下階訊曰因公持經功德更延壽十年免脫生死又問人間衆僧中晚以藥為食食薏苡仁大違本教燈曰律有開遮故王曰此後人加之非佛意也今荊州僧衆中後無飲藥者二釋義分三初迷律二引證三結勸初中分二初定時解曰非時者過日午非僧食之時分也諸天早食佛午食畜生午後食鬼夜食僧宜學佛不過午食釋日午者乃順此方之言約依經律應云日中若日過中及明相未出是名非時故曰非僧食之時分也良以午分八刻前四名時後四非時恐人渾濫故不言午而言中也諸天早食者早以清勝為義天者天然謂因修五戒十善感受天然清勝之福故其人間清勝至誠亦在於早天開以子故齊天在於早晨而諸天喜人清勝至誠自然受供也佛午食者以午食為法食故毗羅三昧經瓶沙王問佛言何故佛日中食佛言早起諸天食日中三世諸佛食中後畜生食日暮鬼神食如來欲斷六趣因令入中道故同三世諸佛食也畜生午後食者梵語底栗車此云畜生即六畜也謂因中所作逆天悖理之事故感此道負天而行中後而食也鬼神夜食者鬼畏也謂虗怯多畏故神者能也大力者能移山填海小力者能隱顯變化由諂誑心所作之事恐令人知故感此道黑暗而食也僧宜學佛等者謂佛為出世聖人久斷六道因今發心受戒志願成佛若欲成佛出六道果者當先斷入六道因令同三世諸佛常餐法喜禪悅過午則不食也處處經中佛言中後不食有五福一少淫二少睡三得一心四無有下風五身得安隱亦不作病夫戒者猶人之衣食也苟無衣食則人奚存故大律云毗尼藏者是佛法壽命毗尼住世則佛法久住也故如來將涅槃時諄諄教誡云我滅度後汝等以戒為師若我住世無異此也所以大迦葉等終身奉行祖祖傳持咸遵佛敕未嘗違也二興慈餓鬼聞碗鉢聲則咽中火起故午食尚宜寂靜況過午乎釋餓鬼者飢渴所逼曰餓希求名鬼謂彼餓鬼恆從他人希求飲食以活性命由昔慳貪不行布施故墮餓鬼中咽小如針腹大如鼓常為飢渴所逼也世尊在祗桓精舍定中遙見地獄餓鬼咽中火起遍鐵圍城問知其故謂人間碗鉢作聲故佛大慈誡諸弟子凡於食時應當寂靜不得碗鉢作聲也然午前尚宜寂靜況午後正當鬼食之時豈忍碗鉢作聲而令彼等聞聲火起受燒然之苦邪蓋餓鬼因中侵奪衆食以自活命令衆飢惱謂在碗鉢上造業故即於碗鉢上受報也二引證分四初昔有高僧聞鄰房僧午後舉爨不覺涕泣悲佛法之衰殘也釋高僧者以佛法為己任故爨燃火煮食也鼻出為涕哭而無聲曰泣昔法慧禪師住鄴寺聞鄰房比丘午後炊爨慨佛法垂秋傷殘悲嘆不覺涕下沾襟今人既無古德護法之心而反生毀謗而言修行不在於此安然無愧可乎宋徽宗惑於道士林靈素妖言改佛為道法師永道上疏陳諫帝大怒收道付開封獄舂陵守謂師曰道人蔬食且不過中甚非自全之計宜茹葷血師囅然曰死則死耳佛禁不可犯也二治病今人體弱多病欲數數食者或不能持此戒故古人稱晚食為藥石取療病之意也釋今人者但指病人非言一槩多有病也多病者謂身體飢餒氣力衰微非一種病也數數者展轉食也或者疑也謂疑不能持此戒故藥石者古來針灸以石為針今多用鐵五分律云時諸比丘服吐下藥不及時食腹中空悶醫教令食諸比丘白佛佛令以稻殼煮水聽非時食不能得差佛聽以囊盛穀煮汁令服又不能差佛聽以囊盛米煮汁服之稍有起色但不能愈佛乃慈聽以米煮粥畫不成字令屏處服之病愈即當懺悔古人稱晚食為藥石者謂病比丘食粥如同服藥如石針針體為救病故非徒滋養口腹而食也又石頭是不可食物以喻晚食不可食也若假病緣而恣意食噉者大違佛教也喻如世間王令誰敢當鋒如來制戒亦復如是天台云為病故毀戒如破浮囊惜膿血臭身破清淨戒體罪莫大焉故律云比丘有病先斷飲食以瘥為度名為天醫有病無病常當觀察此身為生老病死之本衆苦之源深自剋責制其情欲古云人常想病日則塵心頓息人常想死日則道念自生而反縱彼愛根自增苦本不懼纍劫之殃但憂一生之命飽食安眠破齊夜食者施主失應時之福衆僧損良田之德且非時湯藥及種種果漿皆非佛制好心出家者當依法不依人方名正見佛子三感愧必也知違佛制生大慚愧念餓鬼苦常行悲濟不多食不美食不安意食庶幾可耳釋必也知違佛制者此承上文而言也謂晚食雖為病開畢竟是違佛制既知違制而食則不可執權迷實以為常途軌則必須生大慚愧慚者懼違佛教愧者耻食非時由慚愧故自當念餓鬼飢渴之苦不安意非時食不令碗鉢作聲便是慈悲利濟之心也以悲濟故則不恣意多食亦不為美貪好而食所食不多不美是為不安意而食也庶幾者方可之詞謂人有如上慚愧之心方可開聽也四結罪如或不然得罪彌重釋如或不然者謂無上慚愧心忽略毗尼叨餮飲食滋養色身也彌甚也得罪甚重也或言佛有開緣有病不犯者此乃不知律法然四分律中七種開除在別衆戒中非時食戒毫髮無許謂因檀越所請如來故開別衆此在午前非是午後當知凡語無憑聖言有據不可妄談律典何獨不言比丘有病先斷飲食耶昔傅大士是彌勒菩薩化身每行清齊竟日不食減食以施貧餒今者二時飽餐猶不知愧故違佛制不觀祖德不念他乏焉得名為發心受戒者耶三結勸噫可不戒歟釋大律云沙門釋子寧自破腹不應夜食沙彌尼戒經云若國王長者過日中施亦不得食終死不犯也舍利弗問經云時受時食時不盡者非時復食或有時受至非時食復得福否佛言時食淨者是即福田是即出家是即僧伽是即人天良友是即天人導師其不淨者猶為破戒劫盜餓鬼為罪窟非時索者非時輒與者是名退道惡魔是名惡道破器癩病人壞善果故諸婆羅門不非時食外道梵志亦不邪食況我弟子當知法行法若盜與盜受一團一撮片鹽片酢皆死墮焦腸地獄高僧傳云梁山陰雲門寺釋智順疾甚不食多日一日中竟弟子曇和以順絶穀日久密以半合米雜煮以進順咽而還吐索水洗澡語和云汝永出雲門不得還住如上所說令人毛骨悚然何為一餐之食遺纍至此其有智者可不深戒歟第十捉金銀寶物戒分二初標名十曰不捉持生像金銀寶物釋不捉持者無有貪欲心也謂非但不捉金銀即金銀所造一切器皿叉釧等亦不可捉也出家修無為法向清淨道當遠離愛染斷貪畜心以成清白梵行若捉持者則藏畜藏畜則生貪著貪世間財物則損失出世間法財慧命戕殘惡名流布世所賤之而善神亦不護佑矣如僧祇律云有比丘將一沙彌歸看親里路經曠野有非人化作龍形右繞沙彌以華散上讚言善哉大得善利捨家出家不捉金銀及錢比丘到親里家問訊已欲還時親里婦語沙彌言汝今還可持錢去市易所須沙彌受取繫著衣領中道非人見沙彌持錢在比丘後行非人復化作龍形左繞沙彌以土坌上乃言汝失善利出家修道而捉銀錢沙彌便啼比丘顧問沙彌泣言我不意有過無故得惱師問汝有所捉耶答曰持是錢來師言捨棄其非人復如前供養可見利害如此二釋義分三初述律二引證三結勸今初解曰生即金也像似也似金者銀也謂金色生本自黃銀可染黃似金也寶七寶之類也皆長貪心妨廢道業釋南山云梵語生像此云金銀故曰生即金也善見云生色似色似即是像故曰似金者銀也謂金則生來黃色故曰金色生本是黃銀則可染似黃故曰銀可染黃似金也又生者生成金銀像者煎像金銀如以金銀煬成錠餅或打成首飾人物等皆名曰像然金是本名銀從色別又金銀銅鐵錫通名為金蓋取尊貴故也五金之中黃金為上如真諦雜記云有四德故一顏色不變二體性無染三轉作無礙四能富貧窮以喻法身常樂我淨之四德也寶者七寶一金大智度論云出山石沙赤銅中二銀出燒石中世名白金三琉璃華言青色寶四玻瓈華言水玉即蒼玉也謂色體瑩潤故五硨磲體堅色明六瑪瑙其色赤白如馬之腦因以名焉七赤真珠大智度論云此寶出魚腹蛇腦之中其色明瑩最為殊勝此七種皆尊貴之物世所希有總名為寶又寶即是生物即是像如以寶琢成禽獸花草等其餘珊瑚琥珀及摩尼珠等皆寶之類也謂此等物捉之則被他所轉故曰皆長貪心持之則不能修道故曰妨廢道業所謂寶物捉而慧命除煩惱增而正念喪矣是故制之二引證分五初引古故佛在世時僧皆乞食不立烟爨衣服房室悉任外緣置金銀於無用之地捉持尚禁清可知矣釋乞食者乃沙門之正制佛令諸比丘平等教化也謂一鉢千家孤身萬里隨緣而受以資形命故此有三義一折伏自己貢高我慢故二利益檀那故三要知物力之艱難不致坐消信施故是以不結淨厨無有烟㸑也蓋學道之人必須勞其筋骨餓其體膚方能上道若欲豐衣足食而修行者則如來不必出王宮矣衣服房室者總名四聖種也謂既分衛諸方隨緣化度有益便停故云悉任外緣也縱有檀越布施金銀令淨人掌之供養三寶若不為三寶不施衆生救苦難藏之何用故曰置金銀於無用之地也昔者世尊下耆闍崛山阿難見一坑伏藏阿難言世尊毒蛇佛言毒蛇如來去後樵夫聞之便來觀看見坑金銀而作是言此蛇但願毒我一生即取回造作樓閣一年之內種種現成時王遊獵見之告羣臣言去歲觀見本是荒郊今日云何如此茂盛即喚樵夫問知其故樵夫具白上事王言普天之下莫非王土所有伏藏皆是官物汝何盜取即付有司問成死罪將赴刑時口便喚言世尊阿難有司具奏王言汝盜官物念佛何用樵夫具白毒蛇之事王言既於佛邊所得伏藏放汝生命財物入官可見金銀有如此之利害也故如來禁止捉持以修清淨之道故曰清可知矣大師解此讀之不覺令人引入佛境矣二舉況鋤金不顧世儒尚然釋子稱貧蓄財奚用釋不顧者世說新語云漢管幼安諱寧與華歆園中鋤菜見地上有片金管揮鋤與瓦石無異歆捉而擲之時人以此定管華之優劣故曰世儒尚然又樂羊子嘗行路得遺金一餅持還與妻妻曰妾聞志士不飲盜泉之水廉者不受嗟來之食況拾金求利以污其行乎羊大慚乃捐金於野高士傳披裘公者吳人也延陵季子出遊見道中遺金時當五月見披裘負薪顧令彼取金公投鐮瞋目拂手而言曰何子居之高視人之卑耶五月披裘而負薪豈取遺金哉季子大驚而問其姓公曰吾子皮相之士何足語姓名哉釋子者古來出家隨師姓稱晉道安法師受業於佛圖澄白曰師莫過佛捨俗出家宜稱釋子後涅槃經來東土方知佛世皆稱釋子也稱貧者乃負歉之詞謂我道慚先哲於七聖法財多所貧乏故奚何也既曰於道貧乏若蓄積錢財則言行相違而道去遠矣故曰蓄財奚用也然儒尚不顧我蓄何為古人憂道不憂貧故迦葉尊者偈云所食無過一升飯眠臥惟須一小牀兩張氎布足遮身此外並是愚癡物昔慧滿禪師奉頭陀行惟蓄二針冬則乞補夏則捨之心無怖畏睡無夢行乞食所至伽藍則破薪制屣住無再宿後無疾坐陶冶中自化古云若愛一文則不值一文此千古之名言也三鑑今今人不能俱行乞食或入叢林或住庵院或出遠方亦未免有金銀之費釋今人不能者謂末法時中人多少信難比佛世時也況閻浮提人以財活命故難乞食也梵語貧婆此云叢林聚草為叢聚木為林乃龍象奔投之處衆僧棲心修道之所譬如大樹叢叢清蔭遠覆故僧聚處名曰叢林也又草不亂生曰叢木不亂長曰林言其內有法度也庵者安也古人心地開明把茅蓋頭以蔽風雨清貧樂道身心俱安故曰安也西域僧俗修行於蘭若處多結草居之院者禪室也凡庭館有垣墻者皆名曰院亦是叢林之別名也遠方者謂尋師訪道遠涉他方則非錢不行故曰亦未免有金銀之費也四餘濟必也知違佛制生大慚愧念他窮乏常行布施不營求不畜積不販賣不以七寶粧飾衣器等物庶幾可耳釋布施者恩澤於人曰布惠及於彼曰施謂見他貧乏則有餘當捨不得多畜也營是經營求是謀求謂不得經營施主抄緣惡化謀求利養故古云僧雛猶鳳雛也當惜其羽毛聽其自然若哀求苦索則失袈裟之體也畜積者畜是貪畜積是積聚謂有檀越布施即將供養三寶自獲善果復令施福轉增不可畜之箱囊積之高閣生他貪念自禍禍人況才登戒品固當專致學道恐其恣長貪心金銀不經其手豈受畜積耶故經云無得藏積穢寶人與不受受則不留轉濟窮乏常為人說不貪之德是也販賣者賤買貴賣曰販以貨求利曰賣謂不得賤買貴賣虧損淨行以利求利壞佛形儀故業疏云但以邪心有涉貪染為利賣法禮佛讀經斷食等所獲贓賄皆曰邪命物也不以七寶粧飾衣器等物者謂非釋子之所宜也此乃增長愛根成有漏業故可爾者謂無上諸事方可捉持此亦勉強而說非佛言也五定罪如或不然得罪彌重釋不然者反可之詞謂無上布施之念及不生大慚愧若行貪愛之心捉持者得罪甚重也受戒之人應當隨緣進道知足修行三毒息則戒行全十惡清則三塗免若飲食四事俱已備足則錢財外物均亂道心若以誑言小乘惟知自利不利他人或言受戒已後聽許執捉律無此說也要知菩薩以度生為主錢財以十方為重積若無由不為己有故不遮執捉但遮畜貯也故死心禪師曰道與利不相為謀求利者不可與道求道者不可與利蓋二種非不能兼之則其勢不可並也若利與道兼行則商賣屠沽閭閻負販之徒皆能求之矣古人何必棄富貴忘功名灰心泯智於空山大澤之中㵎飲木食而終其身哉三結勸噫可不戒歟釋此生像寶物等極易惛人神智喪失道念故如來喻如毒蛇若捉持者則有喪身失命之患也可不戒歟譬如古鏡本來明淨著一點塵埃不得若著一點塵埃光明即為障蔽矣戒體即復如是著一點貪心不得若著一點貪心戒體即為乖戾矣故晦堂曰一塵飛而翳天一芥墮而覆地秪者一點貪心無量法門即時掩閉從此錯過豈止一生兩生耶古德云不愁劍戟如星下只怕藕絲絆殺人大莊嚴論云財寶令人起惱總不應畜縱令安樂要必有離如蜂作蜜他得自不得財寶亦如是佛告諸比丘我若不持戒當墮三惡道中尚不得為下賤人身況能成熟衆生淨佛國土具一切種智耶故知寧捨身命碎如微塵不可毀犯禁戒墜墮三塗永失菩提種子也以上十戒前四是性罪性者實也謂縱不受佛戒世間法爾有罪也酒戒是半性半遮半性者謂能斷佛慧命故半遮者謂王法所不禁故謂世人但知亡家敗國而不知苦報三途也後五是遮罪由佛遮禁不聽毀犯也故有違犯不得覆藏即須深生慚愧向師發露悔過斷後作心還得清淨如論云是中四是實惡酒是衆禍之門餘者是放逸因緣若犯前四名破戒第九名破齊餘者名破威儀又此沙彌十戒與菩薩戒大同小異菩薩十重以殺戒為首此沙彌戒亦以殺戒居先菩薩四十八輕以敬師友戒為首此沙彌二十四門威儀亦以敬大沙門為第一故經云是戒能為比丘戒之階梯菩薩戒之根本直至成無上菩提故須清淨守持勿令絲毫有失也釋相已竟音釋鑽音劗䰂音采髻也躐亷入聲揣吹上聲聵音會聾也蜎音淵蠕音軟壓音鴨𧊈音文蠢春上聲榼堪入聲鍬悄平聲剗音産蜉音浮蝣音由黠音轄詭音癸詳也譎音決戾也拐乖上聲騙音片銖音殊餳夕平聲契音屑褒保平聲哇音蛙泆音逸眩音衒謳音鷗歈音于孋音離姬音雞婦美稱也驪音離騷音搔矧申上聲蛆音疽唆音梭泄音屑駭音蟹域音欲醇音純鼷音奚嗅休去聲燔音煩酣音蚶貶音匾黷音讀砒音批鴆音鴆騃音涯上聲鯀音袞黻冕上音拂下音勉黠音轄繅音早緉音兩霓音倪窈音杳窕音調斫音捉瞽音古瞍音漱梟音囂樗音樞侃刊上聲朝音潮盎惡去聲㸑音竄囅嗔上聲叨音滔餮音鐵繪音會翳音醫刳音枯音匐逼也事義一代時教謂如來說法從始至終名為一代時者佛與弟子說聽和合之時教者如來所說之法也如來初成正覺謂乘如實道來成正覺故曰如來初成正覺三七日說大化之始故曰初成離邪曰正背妄曰覺寂滅道場謂寂五住煩惱滅二種生死得道之場即摩竭提國阿蘭若處然處隨法轉故名寂滅道場鹿野苑謂羣鹿所居故名鹿苑乃如來昔生垂化之地也從樹為名亦名奈苑二仙所居亦名仙苑善來比丘謂如來觀彼根機成熟呼云善來鬚髮自落袈裟著身威儀庠序即成僧相故憍陳如等此云最初解謂此五人先見諦故等者總收頞跋提俱利十力也轉四諦法輪轉有三一示轉二勸轉三證轉四諦者謂苦集滅道也輪者摧碾之義謂如來以此苦集滅道四諦之法摧碾衆生之惑業也耶舍傳具云佛䭾耶舍此云覺明罽賓國人操行貞白戒節堅固儀止祥淑視瞻不凡世出世間典章流辨無滯以姚秦弘始年達于姑臧什先師之勸興往邀興即敕迎并有贈遺笑而不受重使敦喻方至長安興自出迎居逍遙園四事供養並皆不受時至分衛一食而已耶舍赤髭時人號為赤髭毗婆沙翻譯經論并四分律傳者後人所記尊者之事也玄奘河南洛陽人頴川陳仲弓之後鳩車之齡落䰂竹馬之齒通玄戒具云畢偏肆毗尼常慨教缺傳匠理翳譯人遂使如意之寶不全雪山之偈猶半於是杖錫西遊法師討論一十七周遊覽百有餘國一切經書畢究其妙於貞觀十九年回靶上京敕弘福寺翻譯廣如譯經圖記義淨齊州張氏子字文明髫齓之年辭榮落䰂內外經書無不通曉年十五志遊西域遍師名匠學大小乘事周還歸故里凡所遊歷三十餘國往來問道出二十年天后證聖河洛翻譯虞夏尚曾歷試帝舜姓姚有虞氏黃帝八代孫瞽瞍之子瞍與後妻少子常欲殺舜舜盡孝悌之道堯求可以代己位者四嶽羣臣皆舉於舜堯召舜歷試諸艱舜盡能應之不負所舉夏即禹王也事蹟如第六戒中所明可能猶服勤勞可即二祖也生時祥光照室故名神光後詣初祖求法立雪齊腰斷臂安心祖為更名慧可授以心宗能即六祖慧能大師也詣黃梅求法服勞於杵臼機緣相合五祖傳衣四怨生老病死憍梵損粟必受牛身無量壽經云憍梵波提過去世作比丘於他粟田邊摘一莖粟觀其生熟數粒墮地五百世作牛償之後得人身餘習尚存牛蹄䶗食如來愍度出家得羅漢果比丘嗅香池神呵責雜阿含經云有比丘患眼至鉢曇摩華池側迎香風而坐池神謂比丘為盜香賊比丘言不壞不奪云何名賊神曰不求而取何言非賊時有士夫取彼藕根重負而去比丘曰何故不遮而謂我是賊耶神曰袈裟黑衣墨污不現彼凶惡人何足與語蠅腳污素墨點珂貝雖小悉現唯明者有小過如毛髮許他人見之大如泰山故當從彼常求其淨比丘聞已專精靜坐斷諸煩惱得羅漢果夏以妹嬉桀王伐有施氏施以妹嬉女之桀寵其嬉所言皆從殫百姓之財為瓊宮瑤臺肉山酒海與嬉為樂商湯伐之放於南巢而死晉由驪姬驪姬妃名晉獻公伐驪戎而得故名驪姬公欲以姬為夫人卜之不吉筮之吉公曰從筮卜人曰筮短龜長不如從長弗聽立之因寵其妃妃行謀儲欲立其子奚齊太子縊死遂致國亡驪山火起因褒姒褒姒褒人所獻也周幽王嬖而愛之廢后而立姒姒不喜笑國令有寇舉烽火召兵王欲姒笑舉烽火引之兵至無寇褒姒大笑後犬戎寇至舉烽火而兵不援遂殺王於驪山之下蜀道蒙塵為太真唐明皇因武惠妃薨後宮無當意者或言壽王妃楊氏之美上見而悅之乃令妃乞為女官號太真潛內於宮尋冊為貴妃令安祿山拜貴妃為母宮中出入無忌上竟不以為疑後祿山反上幸蜀至馬嵬驛而兵將皆不悅上遂使力士引貴妃而縊殺之三緘其口孔子入周后稷廟見一金人三緘其口而銘於背曰天機不密四時何行地機不密萬物何生人機不密百事何成孔子歎曰古之慎言如此乃誡人慎言也秀鐵面圓通法秀禪師為人耿直故云鐵面得法於天衣義懷禪師青原下十一世黃魯直諱廷堅號山谷金華府人得法於黃龍祖心禪師太公望姓姜名尚字子牙東海人西伯將出獵卜之曰畋至渭陽所獲者非熊非罷霸王之輔既出果見呂尚於渭之陽昌大悅曰太公望子久矣故號太公望遂立為師封呂侯佐武王伐紂有功封齊國以康兆民塗炭之苦者非熊之兆夢也波斯匿王唐言勝軍末利夫人此云鬘匿王之后司馬溫公姓司馬名光字君實宋陝州人贈溫國公劉忠定公名安世號元城先生南容三復白圭孔子弟子名縚字子容居南宮經云白圭之玷尚可磨也斯言之玷不可為也南容一日三誦此言故曰三復玄真子唐張志和字玄真子隱居不仕住湖中號烟波釣徒肅宗賜奴婢二人名曰漁童樵青人問其故和曰漁童使捧鈎收綸蘆中鼓枻樵青刈蘭薪桂竹裏煎茶露源諱惟清得法於祀心禪師尼乾子此云不繫自餓外道黃帝姓公孫諱軒轅有熊國君之子長于姬水故又以姬為姓代神農氏為天子始作冕旒為玄衣黃裳以象天地之正色也子雲姓楊名雄東坡姓蘇名軾字子瞻眉山人也宋仁宗大寵每詔談論一日不至由翰院遠帝遂遷院建金鑾殿東坡上時人不敢觸名故稱內翰東坡學士文超名哲官居兵部尚書國臣無出其上得法於常聰禪師南下十三世阿育王此云無憂樓子和尚一日偶行街市聞樓上唱云你若無心我便休忽然大悟故名樓子六王之樂黃帝之樂名雲門堯之樂名大章舜之樂名大韶禹之樂名大夏湯之樂名大濩武之樂名大武瓶沙王此云模實謂身模充實也傅大士金華義烏縣人名翕彌勒應身號善慧大士嗟來之食齊大饑黔敖為食于路以待饑者而食之有餓者蒙袂輯履貿貿狀來黔敖左奉食右執飲曰嗟來食揚其目而視之曰子唯不食嗟來食以至於斯也從而謝之終不食而死死心諱悟新韶州黃氏子也得法於黃龍祖心禪師南下十三世晦堂諱祖心南雄塢氏子得法於黃龍慧南禪師南下十二世
