body:
  text: 清古杭昭慶萬壽戒壇傳律沙門書玉科釋二威儀分二初標名二釋義今初威儀門威儀者威以德顯非勢力之威也儀以行表非詐現之儀也故如來處世深達物機凡所施行必以威儀為主內懷獅子之德外現象王之威人天敬仰神龍欽伏實攝物利生之要務也又威者謂有威可畏折伏衆生此由嚴持戒行衆德威嚴故令人可畏也儀者謂有儀可敬攝受衆生此由動靜合轍進退安詳故令人可敬也所謂淨行成于道儀清白圓于戒品如馬勝雍容行道感菜菽以信樂出家鶖子安詳乞食攝外道而反邪歸正故曰威儀乃無言之教堪發有情之信也又威儀名為調御謂調身不妄動口不妄言心不妄想如是三業調善則六根自攝矣蓋一身威儀即是出家相狀內軌範僧徒外利益檀護表後進前修之方法也不惟受戒時習學要終身行持方稱為善故律云云何名為威儀隨順行者是名威儀不隨順者犯非威儀白雲端禪師曰夫一切佛法操之則存捨之則亡然非道去人乃人去道也雪嶠大師曰學道如登山一步不可住換得草鞋繩前人過嶺去華嚴經云具足守持威儀教法能令三寶不斷是也門者乃一切凡聖所共出入之門也大師仍恐初受戒人有志于毗尼者不知云何習學故於經律諸書採取要文列為二十四門始從敬大沙門終於衣鉢等事令各門各事皆不離威儀軌則庶使熟讀行持臨事調善不負披緇受戒也二釋義分二初總序緣起二別列條章初中分五初遵制問揀分三初不應佛制沙彌年滿二十欲受具足戒時若問不能具對沙彌事者不應與具足戒本佛制如上沙彌年滿二十者謂年限既滿是丈夫位則堪忍寒苦辦比丘事猶若世間男子二十加冠成人立業之時也欲者將也領納曰受具足戒者謂五戒八戒十戒未是具足惟是比丘比丘尼戒乃名具足此謂進受之人以圓滿心希求善法於羯磨言下得比丘性故准汝定論中有四分義攝一受具足謂受戒之人乞詞無錯名號不忘心境相應運想周遍先受十戒今求具戒耳聽羯磨念不餘覺故二隨具足謂隨受二百五十戒相中皆無毀失故三護他心具足謂具足四義中有一分威儀具足能長他人之信樂故四具足守持謂得戒已後盡形壽持始終無犯故有此四義故言具足戒也凡為師者應當詳問沙彌本所受持十支戒相及二十四門威儀可曾熟讀行持否如茫乎不知忽而不學不能應對者則不應為授何也謂比丘僧寶最尊最重非僥幸可得也二勉學本當云卿作沙彌乃不知沙彌所施行沙門事大難作卿且去熟學當悉聞知乃應具足戒卿者以上慰下而言乃貴重之稱也謂沙彌雖是小衆皆能紹隆三寶利益羣生故又如父呼其子謂沙彌是比丘之後裔也不知沙彌所施行者當云子作沙彌尚不諳沙彌所應施為之事安望行持比丘律耶沙門事大難作者謂比丘戒法律制森嚴最難行持故法華云又見具戒威儀無缺淨如寶珠以求佛道莫看容易卿且去熟學者謂汝且去精研戒相熟練威儀將沙彌所應為事盡情習學著實留心果然純熟方可與汝受具故曰當悉聞知乃應受具足戒也三珍重本今授卿具足戒人謂佛法易行沙門易作故當先問今授卿具足戒者乃反結遮止之語也謂比丘是七衆綱領三乘正因非是等閒汝今沙彌之事尚不曉得行持如何進具若先不詰問便儱侗為汝授具足戒者則顢頇後學過在師承抑顯律法不尊重矣而世人不知佛道至妙罪福運行便謂佛法不難比丘易作反令人不信矣故當先問二採集來源本以下條則於沙彌威儀諸經及古清規今沙彌成範中節出又宣律師行護律儀雖誡新學比丘有可通用者亦節出以下條則者乃大師序述要略之來源顯非臆說也條是條章則乃法則威儀諸經者謂沙彌威儀并十戒經儀則經等清規者乃叢林之綱紀攝僧之法度也以此法度清理叢林故曰清規如世間不以規矩不能成方圓出世間不以法度則不能攝大衆故如來說法不離折攝二門成範者謂此書從十戒經等輯出披閲行持能成模範感發後昆故然清規乃百丈大智禪師所著弘法在唐年代經久故稱為古成範是笑嵓月心禪師所集同在於明相去不遠故稱今也節略取義謂此威儀從諸部中略出故宣律師者南山律祖也事蹟如香乳記明蓋佛滅度後百年之中西土傳法者皆具禪法律三藏因四祖塢波毱多尊者弟子五人各執己見開張毗尼分為五部宗者殊難自後傳法惟授禪宗及與經論也從是以後律燈漸晦慧命懸絲盛唐宣祖撰行事鈔建南山宗中興律法恐新受戒人不諳行持又出行護律儀教誡初學守護毗尼其間凡有與沙彌相符者雲棲大師皆採於此以補不足故曰雖誡新學比丘沙彌有可通用者亦節出也三隨機取要本良以末法人情多諸懈怠聞繁則厭由是刪繁取要仍分類以便讀學良以等者慨歎之辭也如來滅後法有三時所謂正法像法末法也正法千年此時人根淳厚聞法即證像法千年此時雖似正法而聞法者多修證者少末法萬年此時鬪諍堅固邪見增長人多於此見上生情因循懈怠於世間法厭簡思繁於出世間法厭繁思簡由是之故大師於威儀經律清規成範中刪去繁文撮為要略以逗時機分為二十四類令其各不相參何也若以理論戒體是一若以事推相有差殊故須分類便於初心習學者得其頭緒故曰仍分類以便讀學也四義該補入本間有未備從義補入一二間中也未備等句正見大師為人之切也謂此二十四門威儀之中凡有事不具足法不周備處檢討琅函從義補入則理通決例事法無差初學行持盡善盡美庶使馬勝之威儀復見而波離之軌範猶存靈山一會儼然未散也五復指全書本其有樂廣覽者自當檢閲全書樂者欲也廣覽者謂非以此而止也蓋由律海弘深探之莫窮其底義山高廣仰之難覩其巔是以取要刪繁隨情便用勿使初機望洋而退也果能有殊勝念頭願弘律學者當檢閲沙彌威儀十戒諸經及清規成範等全部自悉其詳不可得少為足也二別列條章二十四則敬大沙門第一凡五事分三初敬遮四法不得喚大沙門字不得盜聽大沙門說戒不得轉行說大沙門過不得坐見大沙門過不起敬者敬信是尊重義謂有言必信有教必從不敢輕侮也沙門者肇師云出家之都名也此云功勞謂修道有多功勞故秦言勤行謂勤修善法行趣涅槃故辨正論云行超俗表心遊塵外謂之沙門今言大者對小而言謂沙彌是小衆受具足戒者名為大僧故曰大沙門也不得者遮止之辭喚是呼喚字是名字謂不得直呼其名而呌之也應云某師律云沙彌應以生年為次第若生年等者應以出家為次第比丘體是僧寶故論戒臘沙彌未入僧數但論生年縱是百歲沙彌亦當禮新戒比丘足應恭敬住不得我慢貢高有違佛制古人親近師家不敢稱其名字以所住之山稱之蓋謂尊重故也況沙彌小衆者乎盜聽說戒者謂黑白半月誦戒羯磨及尋常所作一切僧法佛制沙彌不得預聞若私往竊聽則與五逆同科名為賊住之人不得受具足戒謂此具足戒乃是諸大尊者大權示現請佛為末世比丘所制然旃檀林中曾無雜木靈山會上豈有凡夫惟恐未受具戒者聞之不解佛慈反為不善而破內外道也或畏戒法森嚴或輕緣起等事因此而退失善心者如以利劒斬截信根則失將來佛命故曰與五逆同科也深宜慎之轉行說過者謂展轉相傳而說也以此告彼曰說越分之事曰過謂比丘有過自有大僧舉罰沙彌不得背後說其長短亦不得屏處罵大沙門及在前戲笑效其言語形相行步等成範云設有說者當善遮護永嘉云或是或非人不識逆行順行天莫測如志公噉鴿羅什吞針不可以小見而窺大用也善恭敬經云謗師毀師法中大魔大律云出家之人所有言說皆為利益不應私忿道說於他論云若向白衣說比丘罪惡則使人於佛法中無信敬心寧破塔壞像不可向外人說比丘過惡也若說過罪則壞法身坐見大沙門過不起者謂大沙門乃佛祖後裔輕慢沙門即輕慢佛祖也然尋常見尊長過尚應起立問訊起居況見大沙門過豈可肆坐不起也此句重在見字孝名為戒先後當尊坐視不起長己傲心動他瞋念大悲經云如來往昔行菩薩道時凡見三寶舍利塔像師僧父母耆年善友無不側身讓之故感成佛以來山林人畜皆共欽仰皈敬於佛也禮云傲不可長欲不可縱志不可滿也行護云見須起立坐須讓位若路相逢即當下道側立於旁待過方行凡有教益當叉手立聽作禮謝之若被叱責不得張目怒視當軟語悔過莊嚴寶王經云若輕慢衆僧者是人當墮貧賤家生隨所生處根相不具背傴矬陋捨是身已而復生處多病痟瘦手足攣躄而有膿血盈流其身零落身肉經百千萬歲受斯苦報二坐開五緣除讀經時病時剃髮時飯時作衆事時讀經時者以法為重故謂對經典如對佛口讀心思深入其義故不須起也病時者謂四大不調身嬰重苦故不須起也剃髮時者謂受持偈呪利刀在首動則恐防失錯故不須起也飯時者謂三匙五觀如法受食故不須起也又佛制一坐食故作衆事時者謂以常住正務為重起則妨廢工夫故不須起也若非如上諸緣則不開聽三預知師位行護云五夏以上即闍黎位十夏以上即和尚位雖比丘事沙彌當預知之夏即夏臘謂受具已後專精戒律修持已經爾所夏臘戒品堅牢開遮明了堪任為師接物利生非謂一槩而言也若不諳如上法者尚須依止於人況能為師者耶和尚正名塢波遮迦傳至于闐翻為和尚到此土什師翻為力生舍利弗問經云夫出家者捨其父母生死之家入佛門中受微妙法蓋師之力也生長法身出功德財養智慧命功莫大焉或云塢波陀耶義淨律師譯為親教師由能親教出離世業故又云異姓同居曰和常向佛日安住曰尚謂傳法利生不絶戒德清淨普聞也阿闍黎正名阿遮梨耶此云傳授唐言軌範謂能軌範後學故隋言正行南山事鈔云謂能紏正弟子行故大論云和尚如父阿闍黎如母以棄本生父母當求出世父母若捨和尚阿闍黎即名捨戒也即就也尊顯道德曰位謂受戒學律五載堪為軌範故曰即闍黎位十年嚴淨毗尼律准度人故曰即和尚位也又四分律明五種阿闍黎一剃度所依得出家者二受戒受戒作羯磨者三教授教誡威儀者四受經所從受經若說義乃至四句偈者五依止乃至依住一宿者和尚及依止多以十夏者為之上四師皆多以五夏者為之如上所明之法皆是大僧境界故曰比丘事沙彌不久登壇受具漸次行持亦入其位故曰當預知之問前大僧說戒不許預聞今反令預知者何答半月說戒是宣其罪相恐生邪見故不許聞今言師法是其名位謂比丘專修五年十載即能為人天師範沙彌尚是小衆不可輕慢大僧也事師第二二十七事分二初正儀分八初省誡敬作法當早起欲入戶當先三彈指若有過和尚阿闍黎教誡之不得還逆語視和尚阿闍黎當如視佛若使出不淨器不得唾不得怒恚言事師者謂承奉無怠曰事誨人不倦曰師太平御覽云師者發蒙之基學者有師亦如樹之有根也然大智既成復能成就小智猶樹根生子子復生根展轉相生種類不絶故作持云師以開導友以切磋世出世間法器全賴師友所當敬重倘存憍慢一生福慧消滅是故誡之如常啼賣心肝而學般若世尊為求半偈而捨全身華嚴云凡夫無智執著於我并執我見憍慢貢高不愧無智妄自尊大見善不從罔受教誨於賢不親故去道甚遠律云弟子看和尚當具四心一親愛二敬順三畏難四尊重侍養承接如臣子之事君父如是展轉互相敬重瞻視能令正法久住增益廣大也當早起者凡事早起事事次第不至慌忙卒暴也古云一朝才起晏百事盡皆違穿著衣裳亂開門恨手遲供佛茶湯冷燒香火似灰低頭忙禮拜廚下板聲催為僧若起早事事得便宜律中夜分分三初夜後夜精勤佛道中夜聽其歇息若過中夜即當起身自盥漱已然後具楊枝澡水等候師所須又早者先也為弟子者理宜先起也欲入戶當先三彈指者謂弟子凡入師門應在門外聽其動靜恐驚禪觀先彈指三聲令師覺已然後方入不可造次也若有過等句者失於中道謂之過若自有過師長呵責教誡之時當低頭納受若還逆語者過而又過不可教也去後猶當思念常懷慚愧念報四恩傍資三有若不順師言即同逆論故曰不得還逆語也經云謗師毀師憎師嫉師法中大魔地獄種子視和尚阿闍黎當如視佛者謂諸佛已過去未來尚未來現在說法代佛宣化者惟和尚阿闍黎故曰當如視佛也成範云若弟子衆多當各盡其職次第奉事不可有失若使出不淨器者謂大小便器及痰唾壺等怒者心恨也恚者氣憤也謂心中有恨而氣不憤故唾之然此穢氣人皆畏避事師孝行義無此理既為師除不得起厭惡心現嗔恚相而吐痰涎當念此身衆苦所集一切皆是不淨師長如是弟子亦然除此不淨即除我三毒煩惱若能如是諦思則自他皆淨是為真正出不淨器也二依時禮拜法若禮拜師坐禪不應作禮師經行不應作禮師食師說經師梳齒師澡浴師眠息等俱不應作禮師閉戶不應戶外作禮欲入戶作禮應彈指三遍師不應應去禮拜者天台云四儀法則名禮身業恭敬名拜白虎通曰人之相拜者何所以表情見意屈節卑禮尊事者也師坐禪者恐亂定功故不應禮師經行者恐妨正念故不應禮師受食者恐雜於觀故不應禮師說經者恐斷法義故不應禮師梳齒者恐廢偈呪故不應禮師澡浴者形儀不整故不應禮師眠息者恐驚覺故不應禮也等者師剃髮洗足或有事不暇及對賓客等師閉戶不應戶外作禮者謂閉戶作禮不成恭敬也欲入戶者先當彈指三遍不可急遽擅入如不應者當默然而回不可勉強故知禮拜不如從命也三奉食侍立法持師飲食皆當兩手捧食畢斂器當徐徐侍師不得對面立不得高處立不得太遠立當令師小語得聞不費尊力兩手捧食恭敬之至也奉師飲食如同供佛當過其眉不得以粗氣觸其淨食斂收也徐徐從容貌謂收碗之時當從容細行不得粗糙今碗鉢作聲也律云凡通飲食當適寒溫成範云為師作食無論粗細俱要精潔適師性格凡奉茶湯不得將指插入盞內當兩手平舉授師茶畢接盞如前行護云若進鹽茶并藥及一切食物量當食盡逐時授之若授鮮果先須作淨或以火觸或以刀剖或用指剝若不堪為種者則不須淨也侍師者近承曰侍對面立則尊卑不別長其傲慢高處立則法度全無失其敬意太遠立則意不相接語不投機行護云亦不得上風立亦不得太近立須離師額角七尺許則小語得聞不費尊力也成範云不得轉身低頭小語輕笑當身心肅敬不得現疲倦相亦不得如俗人垂手而立在師前不得說無益之語不得抓癢爪頭捋面不得對師著襪及洗足等四請益白事法若請問佛法因緣當整衣禮拜合掌䠒跪師有語澄心諦聽思惟深入若問家常事不須拜跪但端立師側據實申白師若身心倦教去應去不得心情不喜見於顏色請問者請求也夫欲求法當折我心思惟聖道屈節卑禮敬事師長所謂尊師重道也永嘉云正道寂寥雖有修而難會邪途喧雜乃無習而易親屈膝博問先知曉夜凝神方寸才能解會也佛法因緣者是經律中所說發起之事或古德公案機緣等善恭敬經云若有所疑先應咨白若見師許然後請問整衣禮拜合掌䠒跪者謂手本左右合而為一表其專致一心也右膝著地名曰䠒跪涅槃疏明右膝著地有其三義一右膝有力跪能安久二右膝有力起止便易三右膝躁動著地令安若兩膝著地則名長跪也然弟子咨決于師未有坐而問者故須菩提舍利弗等凡有請問必從座起褊袒右肩頂禮佛足長跪合掌諦聽所說也妄念不起故曰澄心諦聽是聞慧思惟是思慧深入是修慧所謂因聞會理執理會心也若師獨坐時適行時顏色悅時即應問須立在一面舒容平氣至誠伸問字字明朗虗心聽受自能深入也家常事者即僧家尋常日用之事不須拜跪者家無常禮也端立師側者典型不失也按其事而直言故曰據實申白若不據實恐誤大衆之事有失常住之規也身心倦者謂禪思過則心疲起止繁則身倦凡問經問話當候師意不應自取其便師若身心疲勞無神應答者教去且出若即便內心不悅形于外貌者一則招愆二則諸事不成古云讀書以變化氣質為先學道以承順師命為上五十頌云常慕于師德不應窺小過隨順獲成就求過還自損止觀云求師必在于盡善事師必忘于師過善恭敬經云佛言弟子于師所不得粗言師所訶責不應反報師不發問不得輒言凡有所使勿得違命若於師所不起恭敬說於師僧長短者彼愚癡人應如法治師實有過尚不得說況當無也若於師邊不恭敬者別有一小地獄名為椎撲當墮是中一身四頭身體俱然狀如火聚出大猛炎熾然不息於彼獄處復有鉤觜毒蟲常咂舌根從地獄出生畜生中恆食尿屎捨彼身已雖生人間常生邊地皮不似人不能具足人之形色常被輕賤誹謗陵辱離佛世尊恆無智慧從彼死已還墮地獄更得無量無邊苦患之法五詣師求懺法凡有犯戒等事不得覆藏速詣師前哀乞懺悔師許則盡情發露精誠悔改還得清淨師語未了不得語覆藏者覆是隱覆藏謂包藏經云包藏瑕玭佛不許可說悔先罪淨名所尚故知有犯戒事不得包藏隱覆也速詣急往義謂急往師前乞告哀求懺悔免得覆藏展轉罪也懺名披陳衆失發露過咎不敢隱諱悔名斷相續心厭悔捨離能作所作合棄故名懺悔也師許則盡情發露者謂師長既然慈允當徹底掀翻如雲開月現日照霜消不得絲毫黏滯也精誠悔改者精是專精純一誠乃至誠無欺悔謂悔其所犯改是改革前非更不再作故曰還得清淨也行護云若被呵罵當須自責軟語懺謝念修戒定以報師恩成範云凡有誤失過咎師或示怒種種呵責不得巧辭飾非才見師怒即當畏懼斂容䠒跪師前心懷愧耻受責有過則改無過默然師語未了不得語者謂尋常與人說話必待彼說竟方進何況師家訓誨若師語未了即自述己言夾雜師誨者則自失利益復失尊敬倫次既失典型何在律云亦不得以理爭勝六敬座馳書法不得戲坐師坐及臥師床著師衣帽等為師馳達書信不得私自拆看亦不得與人看到彼有問應答則實對不應答則善辭却之彼留不得便住當一心思師望歸師座者乃受學弟子所尊之位也若以戲心而坐則罪過不少敬師之位即敬其師毋輕忽也其床榻衣帽亦不可也凡親近師家要常懷尊敬背面一如適涉輕心終無實際又何益於事耶馳達書信者馳達送往義傳事告彼曰書以表信也故馳書於千里之外讀之恍如覿面也大都道人家所作書札不過應酬常住問答往來無不可與人看者然專使馳達必有要事私自開函及與人看僧俗所忌大非所宜然既奉師命必須任重其事至誠送到彼處若中途拆看及與人觀一則稽遲時日二則恐有浮沉故須慎密也然他人所附書信亦要交代分明終人之事不可負其所託若私拆及與人看破露他事損德招愆行護云即外來書信亦不得與師同閲余丁未春在華山侍寮和尚看書余傍遠盼本師回顧斥曰去跪香今日之規訓他日之模範也至今膝痛未止遠盼尚且不許況私看者耶昔富弼使契丹得家書不發而焚之曰徒亂人意耳家書尚且不發況他書乎到彼有問者大凡弟子受差出門師長必有言教應答不應答者要在臨時轉變若不應答而答之則與書相違徒勞往返矣然在彼處亦不可看人文字簿籍擅動器皿筆硯及翻看衣帽等犯人苗稼彼留不得便住者有三義一量事二量時三量路思師望歸者如孝子之念慈母須臾不可忘膝下也經云當直往直還當識師所語亦當識人報語不可忽也七客來侍立法師對賓或立常處或於師側或於師後必使耳目相接候師所須尋常侍師當至恭至敬以盡孝道賓客在座猶宜恭敬也慈受深禪師曰廊下逢僧須問訊門前遇客要相呼出家體態宜謙讓莫學愚人禮數無常處者非遠非近立得恰好故得耳目相接身心照應無失其時皆為候師所須也如問仙陀婆即應之耳成範云凡見客至當生恭敬勿起厭慢須滌盞煎茶以候應點若師以尊客前高聲呼喚者則有費神氣抑見家教不嚴事師之道安在哉八師疾給侍法師疾病一一用心調治房室被褥藥餌粥食等持衣授履洗浣烘晒等具於律中茲不繁録師者乃法身之父母也世間稚子不可一日無父母而出世釋子不可一日無師法也故敬順師法如事父母若有疾病當用心調治或師病中瞋罵亦當恬忍始終奉事勿生厭倦當念身為苦本有形難免也房室被褥調其外藥餌粥食治其內等者謂所有應病藥食及所宜器具一一當備辦也月堂昌禪師曰黃龍居積翠因病三月不出真淨文為監院宵夜懇禱以至燃頂煉臂仰祈陰相黃龍聞之責曰生死固我分也爾參禪不達理若是真淨從容對曰叢林可無克文不可無和尚也識者謂真淨敬師重法其誠至此他日必成大器成範云安設嚴室忌風陰處須床褥厚軟察師顏色出入扶䇿如法調煮羮湯藥餌少瘥即生歡喜常當以孝心和容奉事客來瞻問善代師語不應譁聚當肅然晏靜病若重不得哭泣師圓寂不得違師誠囑應一一如教遵行八福田中看病第一師乃敬田更宜加意持師衣者當徐徐一手排上一手捉下正立著師左肩上師著已復視上下文理如法否褶時不得以口銜當視上下不使著地還安常處以淨物覆上不得以餘衣物覆上授履當先抖擻刷垢不得大聲視次比之澡手已方持衣物凡洗浣務令淨用水亦不得太費烘晒法衣當待乾燥有急事行不得忘去當付餘人事畢即宜復餘洗鉢器等備載戒經文多故不繁録然律中事師名相雖廣約言惟誠惟孝若事師時時以誠孝存心則一切奉事自然如法師資之間水乳相合而道在其中矣二補儀分二初三業恭敬法附凡侍師不命之坐不敢坐不問不敢對除自有事欲問凡侍立不得倚壁靠桌宜端身齊足側立欲禮拜若師止之宜順師命勿拜凡師與客談論涉道話有益身心者皆當記取師有所使令宜及時作辦不得違慢凡睡眠不得先師凡人問師諱當云上某下某附託也謂託事以足文也此大師婆心切處故凡經律中有益於沙彌事者皆擇取而補足之以律文不敢參雜故提清也不命之坐不敢坐者謂弟子侍立師前周旋左右固其分也而師或愍其久立勤勞乃命坐者慈也弟子敬順師命即坐禮也若不命而坐慢也不問不敢對者謂師資問答不知語脉則言世無根無根之談則如亂麻無緒除己事外不可擅問也然古人悟後問答如電影穿針絲來線去亦如水面回紋飛花點綴雖是家常語言須知泥裏有刺也倚壁靠桌者謂偏側曰倚邪憑曰靠側立者不對面也五十頌云又不應師前身現疲倦相屈指節作聲倚柱及牆壁亦不踏門限所謂恭而無禮則勞肇法師云恭己順命給侍之者名曰侍者菩薩下生經云侍者具八法一信心堅固二其心覓進三身無諸病四精進五具念心六心不憍慢七能成定慧八具足聞智欲禮拜若師止之者即當從命也若逆師命強拜雖拜猶勿拜也若順師命不拜勝於拜也凡師與客談論無非佛法機緣欲知其中深妙當觀尋常日用道話者是有道之話即法語也然執勞服役是長自福基聞法記取乃潤澤心地故曰有益身心也侍師之義誠在斯矣成範云或師詢客答或彼問師酬不得聞異驚怪不得見笑隨笑當識語意宗猷切心研味倘有見處當復呈師昔雲門偃說法如雲如雨不許記録見録之者必罵逐曰汝口不用反記吾語他時必然販吾去也今室中語皆香林以紙為衣隨所聞書之古人如是留心後來掀天揭地以此觀之凡事未有不學而能成也師有所使令宜及時作辦者謂聞師所命事當乘時作為惟恐更有命聞辦是備辦不順曰違不敬曰慢又即怠也成範云凡聞師喚當隨應而至若有所需即依法授之少有所懈得違慢罪凡睡眠不得先師者謂坐寐曰睡翕目曰眠五蓋煩惱此為第一由此覆蔽身心故令善法不生長淪三界當漸制之既為弟子宜起在師前臥在師後先字當讀去聲本來在前曰先不當在前而在前者故曰先也律云多睡有五種過一多惡夢二諸天不喜三心不入法四不思惟明相五夢失不淨凡人問師諱者諱避忌也隱也生曰名死曰諱今俗問人諱者是隱法名二字謂不敢問名而云諱也雖是謬稱是尊重義故大師補文于此因弟子不得直呼師名故加上下二字若問師號當答某甲和尚或云某甲本師不須上下二字今授戒時宣上下者為弟子之稱也若問師長號應云某甲師傅五十頌云又復於師名不應輒稱舉設有固問者當示之一字若問師年臘及與州縣名一一皆須答鶴林玉露云古人稱字最不輕孔門諸子稱夫子為仲尼今世平交稱字稍尊貴者便不敢稱字與古異也法苑云諸佛名號稱揚敬禮而獲福利大都出於口意耳若出於尊敬之口則為福若出於輕薄之口則為禍矣二求師擇處法凡弟子當擇明師久久親近不得離師太早如師實不明當別求良導設離師當憶師誨不得縱情自用隨世俗流行不正事亦不得住市井閙處不得住神廟不得住民房不得住近尼寺處不得以與師各住而行世法中一切惡事當擇明師者謂道眼開明之師也如是之師當久久親近不得擅離以佛法無多子久長難得故昔斷崖禪師示衆云我親近高峯三二十年常常打徹骨髓未曾起一念遠離心古人心行如是律中親近師家有四種一有法有食名為樂住二有法無食名為苦住三有食無法懺謝而去四無法無食不辭而去古云鳥之將息必擇其林人之求道必選其師以師是人之模範也模範端正必出良器故須擇也如或不然則宜別參謂吞舟之魚不隱卑流合抱之木不生丹丘大鵬展翅九萬里豈若鷦鷯息一枝然沙彌本無離師之法為實不明故也良導者謂善能引人達於至道故如法華云隨順是師學得見恆沙佛是也若不別求恐敬獼猴為帝釋宗瓦礫為明珠宗瓦礫是不識法敬獼猴是不識人不識法則慧眼失不識人則墮邪途故云汝師既墮汝亦隨墮此之謂歟設離師當憶師誨者謂雖然離師常當憶師平日教誡之語如耳提面命終身不敢違也中心經云佛言知師恩者見師則當承事供養不見則當思惟教誡是也若縱情自用是不憶師誨故行不正事是隨世俗流也不得住市井閙處者謂積貨交易人煙輳聚之所名之為市古來多於汲水之處為市故曰市井市中喧雜故曰閙處若非大力量人入廛垂手和而不流則不得住恐境亂則身心亂也不得住神廟者神以酒肉為禋祀則僧儀偃蹇人所輕忽故出家者佛在世時依佛而住佛滅度後則依佛像而住是故持戒者不禮鬼神且為鬼神欽敬若住神廟則為鬼神所輕也古云僧住城隍佛祖呵先賢都是隱嵓阿山泉流出人閒去清水依然成濁波不得住民房者緇素有分也謂多近閙處恐纍道故阿蘭若頌云欲精進一乘先當擇其處闤闠不遠離煩惱如刀鋸未到無學門於學有所慮林下及水邊自然絶滓濾依結茅三閒蒲團敷一具呆呆著眼看觸處皆道地我今多懊悔未曾依此句不得住近尼寺處者謂男女有別也瓜田李下須避嫌疑不得以與師各住者謂師資聚散理所常然但依佛教行持莫隨世諦流布則不礙也惡事者謂脅肩諂笑邀譽紳襟交結往來豪強勢族學習奇藝受雇俳優通使四方為利販賣及近尼寺住神廟民房等皆非佛子所為故曰世法中一切惡事也隨師出行第三凡九事分二初正儀分四初在路不得過歷人家不得止住道邊共人語不得左右顧視當低頭隨師後隨師者隨是追隨謂師長出行弟子當追隨杖履也不得過歷人家者歷行也謂不得師在一家弟子又行一家有失相隨之道也縱過父母檀護家若師不聽亦不得入律云不得去遠使不相見當相去一舒手若前有惡象牛馬當向師言先避一處不得言遲誤事不得止住道邊共人語者道路也若路逢親朋知識當善辭卻若共談論便失隨侍之儀則置師于何地耶不得左右顧視者顧回看也謂尋常出入當平視直前威儀如法無失僧規隨師後行尤宜整肅聽其動靜若東望西張則為俗所譏未免論師無有家法然弟子不能以道行慰師而反以俗譏纍師者則于心何安行護云三千威儀行為第一左右觀看為俗所訕便非正器書云意誠而後心正心正則無所不正也二到家到檀越家當住一面師教坐應坐到他寺院師禮佛或自禮不得擅自鳴磬名義云檀是梵度貧翻云施謂彼能行布施供養三寶則當來越語此窮苦海故亦名檀那此云施主大乘論云謂能引福德資糧故當住一面者謂當不離左右也教坐應坐者尊法尊師也成範云或事緣令坐勿舒於雙足常具諸威儀師起速當起禮記云長者賜坐應告坐而坐師禮佛者佛是先覺之人師乃後覺之者因先覺而覺後覺故見佛即當禮也或自禮者近朱則赤故不得擅自鳴磬者擅自專也鐘磬乃人天之耳目叢林之號令各有執事所司入寺須當遵其法度客儀莫失方見賓主之規輒便舉動者則起大衆致師𧹞顏隨之何益耶三登山若山行當持坐具隨之若遠行不得相離太遠若山行當持坐具者謂山步艱難恐師行疲倦欲暫歇息故當持坐具或蒲團及所坐之物而備辦鋪設師坐也不得相離太遠者謂太近則踏師影或步揚塵太遠則不聞師喚一失所在兩不相照恐誤其事是故凡所作為必須顧盼不致兩處懸念也四渡水若過渡當持杖徐試淺深持瓶𢹂錫等具如律中文繁不録律云有二因緣佛聽畜杖一為老瘦無力故二為打路探水故徐試則無驚險之怖也若淺則扶師過渡若深則倩人肩輿事師頌云若於險路中自已作前導若過溪㵎水以杖試淺深所謂深則厲淺則揭也持瓶擕錫等者梵語軍持此云瓶有其二種一淨瓶二澡瓶此乃澡瓶也謂貯水隨身以淨手故磁瓦作者名淨用銅鐵作者名觸用錫是錫杖為師持行必宜聲響俱寂具如律中者十戒經中持師澡瓶有十五事𢹂錫有七事文多所以不録欲廣學者當自檢閲經文則盡知也二補義分二初約期附若偶分行約於某處會不得後時偶分行者偶適或也謂適或有緣而欲暫往者必須請示約於某處等候縱有他緣羈阻必來復命再去不得後時者謂當先到約處候師不得縱情逞意故爾延挨令師先到懸望也二齊法師受齊當侍立出生齊畢復侍立收䞋出生者謂念供養畢奉如來教先出食一分施諸鬼神衆生也義如香乳記明侍者送食須著淨器安於淨處持呪觀想皆要至誠䞋者乃檀越所施之物也成範云候師齊畢收師檀䞋若十戒沙彌侍師當令餘人收䞋梵語達䞋那此云施在法則曰法施在財則曰財施在家人應行財施出家人應行法施也一覽云財法二施始成功福慧兩全方作佛成範云師飯已畢請鉢收䞋弟子之禮盡矣行護云聞師外歸當出迎接捧其衣鉢具茶湯并洗足水等一一盡心勿令動念入衆第四三十二事分二初正儀分七初謙德不得爭坐處不得於座上遙相呼語笑衆中有失儀當隱惡揚善不得伐勞顯己之功律云凡欲入衆當具五法一應以慈心二應自卑下如拭塵巾謂巾能攬垢歸己令物潔淨故三應知坐起法謂若見上座不應安坐若見下座不應起立沙彌小衆見受具者盡應起立四在彼僧中不為彼雜謂在僧中不隨人談說世事故五若見僧中有不可忍事應作默然智度論云佛聖弟子住和合故有二種法一賢聖語二賢聖默然依止陶鎔固須給侍爐韛煅煉宜先入衆同塵之用一如濟物之功自普也沙彌雖未到此田地因佛制食隨僧分法從僧得故列此儀不得爭坐處者謂不遜而坐尚且不宜何況爭耶然叢林坐位各有次序沙彌以戒次而坐若有爭者則失叢林之法度也遙相呼語笑者遙呼是遠呌語笑乃帶說帶笑也此如婆羅門聚會無殊不成僧體若有要事當彈指使覺輕語令知若笑語遙呼傍若無人失儀動衆者過非小矣衆中有失儀者即如上遙相呼語笑等事也當隱惡揚善者謂宜隱人之惡揚人之善也隱惡則自長其德揚善則令衆增輝演祖云古人樂聞己過喜於為善長於包荒厚於隱惡謙以交友勤以濟衆不以得喪二其心所以光明碩大照映今昔矣靈源曰聖人有言當世聰明深察而近於死者好議人之過也博辨宏大而危其身者好發人之惡也出家人莫強知他事莫空腹高心莫以強陵弱莫利己損人毋以長而慢後生毋以少而輕老宿毋以片能而稱我是毋以少解即道他非好向佛法中用意多於塵境上除情袈裟下失卻人身實為苦也故當隱惡揚善不得伐勞顯己之功者伐誇也作事有功曰勞自稱己功曰伐謂不得矜誇自能以顯己功也然有功者衆口自推何伐之有惟其不伐而功愈顯矣古德云自是者不彰自矜者不長自伐者無功也二䇿己凡在處睡不在人前起不在人後睡不在人前起不在人後者謂行道精進也然惺寂相照則事事行在人前著著不落他後一則自離懈怠二則無動他念故本師見月老和尚示衆曰精進為修道之寶佛祖由此而成煩惱因茲而斷為釋子者豈可怠惰耶清規云五更鐘將鳴輕輕先起端坐不得扇風令人動念三惜福凡洗面不得多使水擦牙吐水須低頭引水下不得噴水濺人不得高聲鼻洟嘔吐不得於殿塔及淨室淨地淨水中洟唾當於僻處喫茶湯時不得隻手揖人不得向塔洗齒及向和尚阿闍黎等洗面不得多使水者一防後人二當惜福古云在山不可多燒柴近河不可多使水學道修行如不解當來受用終不美又云冷水要人挑熱水要人燒雖是俚言當為龜鑑律云有慚愧者可名為人清規云不得洗頭有四件事自他不利一污盆二膩中三枯髮四損眼昔湛堂和尚平生律身以約雖領衆弘法不異在衆晨興後架秪取小杓湯洗面復濯足後受水溉灌蔬果惜福如此不肯虗廢不得噴水濺人者由低頭引水下故不濺人也若噴水濺人令彼生瞋縱使牙齒漱淨不能滌彼口業故須細行也清規云右手蘸牙藥揩左邊左手蘸藥揩右邊不可再蘸恐牙宣口氣過人不得高聲鼻洟嘔吐者謂從鼻而出曰洟從口而出曰嘔唾若不得已而嘔之亦不可逞意高聲動衆人念不得于殿塔等處洟唾者殿塔供佛像舍利之處若唾則護法神瞋淨室淨地坐禪經行之處若唾則刺人眼動他心念淨水供佛供僧之用洟唾污穢折福招愆僻處非當道淨所唾則不犯昔有僧夜坐佛塔偶爾洟唾燈下見護法神舒手承接其僧悚懼終身斂戢喫茶湯時不得隻手揖人者說文云謂手著胸曰揖喫茶湯揖人非時隻手非禮難逃不恭之咎也不得向塔洗齒等者謂塔則兼聖像矣等者謂和尚闍黎長老上座及尊客也然口齒之閒有穢氣且不可對於常人況對佛塔及和尚阿闍黎耶若有向者褻慢聖賢不可不慎三千威儀云不得向佛亦莫背佛不得向和尚阿闍黎諸師亦莫有背四弘願凡聞鐘聲合掌默念云聞鐘聲煩惱輕智慧長菩提生離地獄出火坑願成佛度衆生唵伽囉帝耶娑訶三遍合掌表其誠敬謂內心既誠外儀必敬也默念者不必高聲也凡聞鐘聲即當至誠誦此偈呪阿含經云若聞鐘聲誦此偈呪得除五百億劫生死重罪言聞鐘聲者託事以明理也華嚴疏云菩薩大義要於事上見理事理雙彰方得入事事無礙也煩惱輕者止觀云昏煩之法惱亂心神不能顯發無上菩提今得聞鐘誦偈善法增勝故得輕也智慧長菩提生者審理曰智分別曰慧菩提覺體也向因無明覆蔽而成不覺今由煩惱輕清智慧增長而菩提生也離地獄者涅槃經云居家逼迫猶如牢獄一切煩惱因之生長故出火坑者法華云三界無安猶如火宅衆生薄福受此煎燒然覺體既現故當出離也上為自利向下利他阿含經云衆生若不發願終不能成佛道故曰願成佛既得成佛決要度生故曰度衆生也呪是破地獄真言祕密故不翻至誠誦之自得如願廣如香乳記明五慎儀不得多笑若大笑及呵缺當以衣袖掩口不得急行多笑大笑非癡即狂失其正念犯非威儀也呵缺者亦曰缺法是懈怠之貌謂神氣散漫沒意致也衣袖掩口謂遮其濁氣醜形以護念故昔法雲禪師平居作止直視不瞬三十年來未嘗輕發一笑凡所在處見有聖像即立不坐毗尼母經云氣有兩種一上二下若上氣欲出時莫當人張口令出要回面向無人處出若下氣欲出時不聽衆中出要作方便出外至無人處出然後入內莫使衆人譏嫌惡賤入佛殿塔中不應放下氣和尚闍黎上座前亦不得放下風出聲若腹中有病急者應出外放大律云若在禪房中嚏者不得放恣大嚏若嚏來時當忍以手拖鼻而嚏勿令洟唾噴出不得急行者凡所動靜當護威儀舉步即應視地勿傷蟲蟻古云急行無好步威儀全不顧識者在傍觀為之生恐怖萬一失跌毀體裂膚抱恨終身所關非輕故當徐行也六敬慈不得將佛燈私就己用若燃燈當好以密覆勿令飛蟲投入供佛花取開圓者不得先嗅除萎者方供新者萎者不得棄地踐踏宜置屏處佛燈即第二戒中佛物也既是佛物不得私用若離佛前即成盜業智度論云盜佛前燈油者當墮黑暗地獄後為人盲阿那律陀往昔盜佛前供器因燈黑暗前揚光耀覩佛威嚴相好偷心即歇懺謝而去以此功德感報天眼第一燃燈當以密覆者即第一戒中護生之法以繼慈悲之道也覆如前釋若點燈時驀拈一莖草默念偈云波離瑟叱護生草救度衆生除煩惱七遍放於燈下一切飛蟲不投燈上也供佛花取開圓者謂花正開時精神飽足顏色鮮明也不先嗅者表誠敬之至也萎者是隔宿殘敗之花供則無有敬心也方供新者如法華云香風吹萎花更用新好者以表道念日新故當及時採供若未開者花瓣未舒顏色尚淺造化之工未全若已開者香氣稍減色力淡薄葉將飄零芬馥之神已去皆非時也要用最勝經云鼻嗅香者由減香氣無其福德正報墮波頭摩地獄世世鼻無有香氣屏處者是無人行處非污穢處也若撒道中往來踐踏是失恭敬心日雲經云香煙未盡放地得越棄罪墮糞尿地獄盡五百歲諸經集要云散供之花不得踐踏佛告文殊此花者若四衆能信修行應當早起清淨澡潄口齒念佛功德恭敬此花不以足踏不跨花上如法執取安置淨器治種種病宗鏡録云菩薩親近燃燈佛時因獻五莖蓮花乃得授釋迦之號是故佛佛說法十方如來菩薩天神散花供養今時懺壇亦散花供佛也七誠潔不得聞呼不應凡呼俱宜以念佛應之凡拾遺物即當白主事僧應答辭若聞呼不應推啞裝聾非弟子之禮也惡性難調參學何益然道人家心量如同空谷有呼即應何胸中煩悶之若是耶當念佛應之者乃不忘本也又異於俗人故謂父母生身不能令我出於苦海惟如來大慈度我出家得成僧相是故時時刻刻當念佛恩德也又念彌陀而不念釋迦者表無我故然釋迦是我本師本師稱讚西方而弟子亦當效也又佛無我相念彌陀佛即念釋迦佛也凡拾遺物即當白主事僧者謂大凡有拾遺物不可停留或白知事人或白本師或置常住庫中或送知事標於拾遺牌上以待失主來問若與物相應者與之不得自匿餘人亦不得冒取取者犯盜過三日後若無認者當入常住二補儀分六初自重附不得與年少沙彌結友年少沙彌者謂年紀尚幼不省人事也若與為友有損無益故經云非賢不友非聖不宗不孝之子嗜酒之徒志趣邪僻履行凶險不得交遊往來之藝濁虧損道行如玄沙雪峯之輩則可也古云戒品才登初地急須學道立身莫要狎近惡少戲論三五成羣流蕩放逸無度向後不得為人從上英賢知識皆依尊宿咨詢機緣啐喙相契禪律一句主賓十方菩薩作伴千古賢聖為親四恩以此總報不負出家之因要須守分自重起倒不得隨人二遵制不得三衣苟簡不得多作衣服若有餘當捨不得辦精緻絛拂玩器等裝點江湖取笑識者不得著色服及類俗人衣飾等不得不淨手搭衣凡上殿須束縛褲襪不得放意自便不得三衣苟簡者然沙彌縵條是服比丘割截三依沙彌應畜者有其二義一令知福田之相解脫之衣生難遭想二以便進具免使馳求非謂使其披著也今在戒期方便許著亦有二意一則不久登壇二則臨時難得若借若無並名非法反成戒障因緣也不得多作衣服者謂令知足修行也古云進道嚴身三常不足方名少欲道人若多作衣服則有多纍縱恣幻軀妨廢道業又好衣因緣多招賊難故佛鑒禪師曰先師節儉一鉢囊鞋袋百綴千補猶不忍棄置常曰此二物相隨出關五十年矣詎可中道棄置有南泉悟上座送褐布裰自言得之海外冬服則溫夏服則涼先師曰老僧寒則有柴炭紙衾夏則有松風竹陰畜此奚為終却之不受有餘當捨者謂惺世相無常當去我之貪癡念他人之貧乏有餘即應捨也不得辦精緻絛拂玩器等者絛是束縛身心拂為揮麈說法謂不識四大本空故辦精緻迷惑正念故學裝點不法之人倣其欵制擺飾玩器交結羣黨來往四衢誑惑世俗無所不至故曰裝點江湖取笑識者然江湖之流只有日下之勢以喻是人不能上進也不得著色服等者色謂紅黃紫緑及與白等乃至小領鑲鞋皆是俗飾非釋子所宜出家人壞色為衣以別緇素故梵網經云皆使壞色與道相應也不得不淨手搭衣者謂衣是如來淨服敬衣即敬如來也凡取鞋襪下衣及一切不淨物等皆當淨手凡上殿須束縛褲襪者謂大殿乃聖賢雲集之處當整肅而登束縛者恐下身有垢物遺於地故凡有佛菩薩所皆應束縛若放意自便則無敬畏之心也然西域有裙無褲故裙翻為內衣今文出者乃順此土之儀也阿含經云一比丘不扎下衣陰毛落地護法神捧送四十里外可不慎歟三思益不得閒走不得多言不得坐視大衆勞務避懶偷安不得閒走者恐妨禪誦故古人輕尺璧貴寸陰出家人受了檀越供養應當努力為道時刻不可放過豈可虗延歲月耶佛法如大海多學一分有一分受用況沙彌尚在初機道業未辦歲月如流那有工夫閒走也古德云閒時不至落空忙時不至逐物方見作用不得多言者恐防失誤故古云多言數窮不如守中古人之辭寡今人之辭多也不得坐視大衆勞務避懶偷安者經云衆僧事務當盡力為之所以諸佛菩薩從行門中出然所食既均而所務亦均庶不負百丈一日不作一日不食之誡也若坐視則無慚避懶則無福揚岐云上下偷安為法門大患四知因不得私取招提竹木花果蔬菜一切飲食及一切器物等招提此云四方僧物即常住物也一切顯非一種謂一竹一木一花一果及蔬菜飲食器皿等皆是大衆物也私取即犯盜罪若有所欲取當白知事人昔僧照禪師苦行禪定第一行法華三昧感觀音大士為說法要得無礙辨才又見普賢大士乘白象來放光證明曾用衆僧鹽一撮作齊飲以用無幾不以為意後行方等懺法忽見相起計三年增長至數十斛乃急賣衣買鹽償衆其相方滅又煬帝二年僧道明亡同房僧玄緒暮行野間忽見寺往投之遇道明不異平日見衆僧粥皆作血色舉體火然緒懼問之明曰此是地獄吾為取僧柴一束煮染色忘不賠償當一年然足受罪褰衣見膝下並焦黑因曰公幸為我買柴百束賠還常住并寫法華經一部可得免苦緒許之歸寺依言為辦重往尋寺寂無所見智者聞之孰不毛竪五慎禁不得談說朝廷公府政事得失及白衣家長短好惡凡自稱當舉二字法名不得云我及小僧紀綱法度曰政動作日用曰事俗人喜著白衣故曰白衣然王臣政事是國家之正法長短好惡乃俗人之是非言之皆亂道心亦招禍愆故不得也然張口如弓發言如箭忽然虎口遭傷始見峯頭太露當知牆壁有耳法令無親故經云不得論說國家政事評量優劣出軍行師攻伐勝負也凡自稱等句者前是聞呼答應此乃自稱其名謂身為法王之子名續祖家宗派故曰法名稱法名者是為釋子非俗士也如稱我者無乃太慢若云小僧無乃太卑然僧是佛祖慧命人天福田何其小耶縱對王侯亦稱法名為是齊沙門僧鐘見武帝稱貧道帝曰稱名亦無嫌帝問王儉曰先輩沙門對帝何稱正殿還坐否儉對曰漢魏佛法未興不見紀傳自後稍盛皆稱貧道亦聞預坐自唐肅宗敕僧尼朝會毋得稱臣故不言臣也言貧道者謂三乘聖人所證之道我于此道寡少故曰貧道也六守法不得因小事爭執若大事難忍者亦須心平氣和以理論辨不可則辭而去動氣發粗即非好僧也僧居六和忍辱第一設有參差權且寬耐日久自明故是非以不辨為解脫蓋天之道以不爭為善勝也永嘉云從他謗任他非把火燒空徒自疲我聞却似飲甘露銷鎔頓入不思議若以小事而便執定爭論者則小事亦成大矣若大事能忍者則大事便為小矣言大事者不過被人誣謗也然忍之一字說便容易行之實難須是有大力量方能降伏其心若力量稍弱則便被他飄入羅剎鬼國也心平氣和者雪堂曰氣勝志名為小人志勝氣名為端人志與氣齊名為得道聖賢凡人剛狠不受規諫氣使然也端正之士雖使為不善寧死不二志使然也故須平和筆餐云昔有與人相爭者怒甚奔訴王陽明先生王曰且去待汝心平氣和有好話與你說其人即去涵養數日復叩曰吾心平氣和願聞好話王曰心平氣和便是好話也其人謝去以理論辨者謂彼此心平則可理論也故經云慎無慍訟當推直于人引曲向己見有諍者兩說和合若不依者方便避之連城之璧不與瓦礫觸也若不依僧論觸惱大衆而去者故曰動氣發粗即非好僧也清規云有理無理並皆出院何也蓋僧當忍辱若執有理而爭者即是無明故同擯之息諍于未萌也大律云不忍辱人有五種過一凶惡增長二事後悔恨三多人不愛四惡聲流布五死墮惡道隨衆食第五二十五事分二初正儀分七初供施二田聞楗槌聲即當整衣服臨食呪願皆當恭敬出生飯不過七粒不過一寸饅頭不過指甲許多則為貪少則為慳其餘蔬菜豆腐不出凡出生安左掌中念偈云汝等鬼神衆我今施汝供此食遍十方一切鬼神共隨衆者謂出家之人應當事事隨衆也古云隨衆得解脫而有八義一聲板即赴不懈怠故二供養現成得省力故三作平等觀無人我故四息諸戲論存正念故五如法觀想深入理故六不偏衆食絶疑謗故七甘苦同受無揀擇故八起止威儀不放逸故若不隨衆則不解脫可知也聞楗槌聲即當整衣服者免得臨時倉忙之失也楗槌此云聲五分云隨有木瓦銅鐵鳴者皆號楗槌此乃集衆之方法不待言而自至也清規云聞楗槌聲想念偈云佛生迦毗羅成道摩竭陀說法波羅奈入滅拘尸那犍度云聞楗槌聲即當著衣持鉢猶如雁行行至齊堂隨次而坐勿令參差不如法也臨食呪願皆當恭敬者謂律中比丘受他請食默然進默然出諸居士皆譏嫌言我等食不知好與不好諸比丘白佛佛言從今食時應表宣施意故食前念供養唱僧跋及食後誦偈呪願也其所行之法皆當起恭敬心不得散心怠慢損德招愆出生飯不過七粒者謂以七粒之飯不多不少仗呪願力故能令諸鬼神等遍皆飽滿也切饅頭西域原無大師以此土而例出之漢時諸葛孔明征雲南孟獲永昌班師以此回至瀘水見四野障塞煙霧遍空冤氣結于是以麥作人頭祭河為始甲許一寸是其限也多則恐令受者起過少則反使施者招嫌故曰多則為貪少則為慳也其餘蔬菜豆腐不出者謂米等是噉食當出蔬果是嚼食則不必也智度論云凡受食時先供三寶次行大衆後施四生安左掌中右手撥著淨物上默念偈呪汝等鬼神衆我今施汝供者謂仗佛呪力直召其名而施法食也此食遍十方一切鬼神共者謂諸鬼神等各散十方而此呪食亦遍十方令彼等共餐法味皆得飽滿以見佛心平等也念唵穆力陵莎訶三遍鳴指三下二正念五觀凡欲食作五觀想一計功多少量彼來處二忖己德行全缺應供三防心離過貪等為宗四正事良藥為療形枯五為成道故方受此食正念思惟曰觀即照了之義也謂一念之心照了五法令正念受食也初觀此一鉢之飯皆是行人血汗檀信脂膏故曰計功多少量彼來處二自揣道行無虧則當受供若有所缺則不宜也故曰忖己德行全缺應供三一切煩惱皆從貪瞋癡起我於是中不應生著故曰防心離過貪等為宗四若非此食則氣力衰微故曰正事良藥為療形枯五為修三乘正因方受此食故曰為成道故方受此食也摩得勒伽論云若得食時口口作念若不如是便名虗消信施也廣如香乳記明三嫌食招過無呵食好惡不得以食私所與若摘與狗呵食好惡者謂受食之時嫌其粗細也然呵好則生貪呵惡則生瞋皆屬癡業所謂三心未盡水難消故遮止也古人粗衣遮寒糲食充饑為學道故若當大衆受食之時呵其美惡則損福不少或遇病緣不能食其粗糲者亦當存默不得以食私所與者謂物屬僧伽食無偏黨若順情私與則與盜同科若摘與狗者摘音惕手分與也謂受食之時正當虔誠作觀令施者生恭敬心衆食未竟即摘與狗是為非法律云有檀越誠敬設美饌供佛飯僧時有一犬擺腹搖尾作乞憐之狀比丘愍之分食餧狗檀信不悅白佛故制四代語防譏來益食不得言不用若已飽當以手讓却之不得爪頭使風屑落鄰鉢中不得含食語不得笑談雜話不得嚼食有聲增添曰益佛制受食至飽而後放鉢若行食者來益須者即以鉢托出若已飽當置鉢几上或行食者更益當以手讓却代語止之則謙讓之儀正合理也如出聲回者則檀越信施恐生嫌鄙又覺太粗復動衆念不得爪頭使風屑落鄰鉢中者謂自己受食尚且不宜何況同衆受食使風屑落其鉢中耶准律有三過一動他念二失威儀三膩手污鉢得罪不得含食語者一則語不明了二犯非威儀縱有人問當咽已方答如含食而語便是散心也儒家且有寢食之訓況釋子耶不得笑談雜話者溈山云不解忖思來處謂言法爾合供喫了聚頭喧喧但說人間雜話如心存五觀則無此過也不得嚼食有聲者行護云食時不得大攪及啜羮粥作聲衆中食訖不得漱口作聲凡嚼食須合唇吻餅果當細擘食之五權宜如制如挑牙以袖掩口食中或有蟲蟻宜密掩藏之莫令鄰單見生疑心當一坐食不得食訖離座更坐不得食訖以手指刮碗鉢食挑者揚也謂隨衆受食不可揚牙待食畢至僻處揚之若急欲揚者宜以衣袖掩口穢污之事不得向人如不掩者一則自失威儀二則令他起厭惡心縱在弟子面前亦當回護食中或有蟲蟻等句者夫行人造飯食非不欲以精潔者供奉其間或有蟲蟻誤入飲食之內見者當密藏之鄰單即比座也若令彼見或疑忌心生至於變吐不能復食則檀越不能得如意福不得離座更坐食者謂洗鉢起身恐食時已過也有正務則開不得以手指刮碗鉢食者謂手指刮碗鉢如同餓夫非是出家道品亦不得以舌䑛食六食儀應法凡食不得太速不得太遲行食未至不得生煩惱或有所需默然指授不得高聲大喚不得碗鉢作聲不得食畢先起太速則粗氣逼人太遲則慢延失候故須不緩不急次第而受行護云把鉢不可太高不得太低須平胸得所碗鉢要離膝巾不得安手置膝上清規云不得將口就食亦不得將食就口不得鉢中央挑飯不得大撓刮鉢中亦不得遺粒狼藉而食不得頰食食及縮鼻食等行食未至不得生煩惱者行食即益食人也若五觀存心時懷慚愧煩惱自然不生矣若一人煩惱四座為之不安則齊堂便成煩惱窟也古云呆呆四顧起貪心念食吞津咳嗽頻摝粥啜羮包滿口開單展鉢響諸鄰或有所需默然指授者需同須索也謂以指授令知彼為取也若高聲大喚則令大衆動念不得碗鉢作聲者若具儀受食碗鉢自然無聲碗鉢作聲因粗糙故一人粗糙已不堪聞多人復然而齊法竟不成矣又何怪於鄰房僧之不悲嘆耶不得食畢先起者謂入堂受食要從始至終食畢先起有始無終則違佛制輕慢大衆除有正務則開故溈山云碗鉢作聲食畢先起去就乖角僧體全無起坐忪諸動他心念律中因比丘食畢默然而去諸檀越皆譏言不知彼食足與不足比丘白佛佛言從今應為檀越說一䞋偈而去七順從惜福若違僧制聞白槌不得抗拒不服飯中有穀去皮食之白槌是舉罪之規律中凡有事先於大食小食上舉抗拒是抵觸不順既違僧制一切憑僧清規云犯重焚衣鉢應當集衆人山藤聊示恥驅擯出偏門如其不服生瞋違和即非好僧也古人聞善言則拜有告過則喜斯等聖賢氣象何不效之飯中有穀去皮食之謂勉其惜福也然命依食住道由食存一粟一穀皆從檀信施來不可輕視若有穀者去皮食之如其多者當聚在一處出時將施禽鳥不得賤棄也二補儀附不得見美味生貪心恣口食不得偏衆食美味者甘美之食也然美味人人所愛而我不愛者智也如見之叨餮貪心恣口食者害也而不知食之過患極重故恣貪無厭如賢愚經云一沙彌貪愛酪味死即作酪瓶中蟲一沙彌貪著龍宮香飯死後為龍欲奪龍宮殺諸龍屬為害非小是故於食當生厭離心不得貪也偏衆食者不共衆食也謂十方雲聚粒米同餐僧物偏衆准直成罪自物偏衆是無慚人僧未食不得先嘗除作食者無過昔唐登州文登縣郭行妻王氏生一女鶴喙將終自言酬先世嘗齊之報以此示人也禮拜第六凡十事分二初正儀分三初敬主護人禮拜不得占殿中央是住持位有人禮佛不得向彼人頭前徑過凡禮拜須清淨盥漱露頂跣足早起及三時粥飯當嚼楊枝若不如是潔淨禮便得罪中央者是主法之位雖前戒亦不得占況沙彌耶言住持者謂動靜不移曰住古今不失曰持乃弘揚正法之人即善知識也然佛法東漸四百餘載而達磨大師方至又八傳而至百丈在前惟以道相授受巖居穴處未有住持之名百丈禪師因緇素問道鱗集非崇其位則師法不尊而住持之名自此為始又住持者謂修戒定慧以為持法之資秉僧德行以為持法之具資具皆善可以持而住之也寶訓密庵傑曰住持有三莫事繁莫懼無事莫尋是非莫辨達此三者方可名為住持也中央之位豈偶然哉不得向彼頭前徑過者徑過直往也其義有二一恐妨禮佛正觀二恐足起塵𡋯觸彼頭面令他煩惱二具儀無染凡合掌不得十指參差不得中虗不得將指插鼻中須平胸高低得所不得非時禮拜如欲非時禮須待人靜時合掌而不合指故曰參差合指而不合掌故曰中虗指插鼻中太高落在胸下太低合在當胸故曰得所然參差中虗插鼻高低皆由心散怠慢儀不中節有失觀瞻也非時禮拜者除朝暮同衆禮拜之外若自禮則不合衆規違逆僧制故不得也待人靜時者則無礙于人不令動他心念也但私自禮佛雖是好事亦不得招搖做勢顯異惑衆三尊師重法師禮佛不得與師並禮當隨後遠拜師拜人不得與師同拜在師前不得與同類相禮在師前不得受人禮己手持經像不得為人作禮並拜者謂與師並肩齊拜也尊卑上下不可紊亂故不得也隨後謂在師之身後亦不宜逼近故曰遠也師拜人者謂凡師與人作禮非是前輩耆宿即是師長道友不得與師同拜者禮別尊卑故在師前不得與同類相禮者同類禮則失尊師之敬受人拜則失自卑之儀古德云佛前受人禮拜大不吉祥況沙彌年少正在學地當禮拜於人不得受人禮拜也己手持經像者經像乃人天所尊手持經像即佛在手凡遇尊長耆宿俱不應拜但云經像在手不敢禮拜若持之拜則顛倒也二補儀附凡禮拜須精誠作觀教列七種禮不可不知須精誠作觀者謂不雜餘念曰精真實致敬曰誠作觀者謂作能禮所禮性空寂之觀也西域禮拜褰衣露足膝先著地然後以肘按地兩掌承空以現接足之相也七種禮者天竺勒那三藏見此方拜佛不習禮儀故傳此七種之法雖然通云禮佛而有是非淺深之不同蓋欲人知我慢求名二種之非而歸身心等五種之正也一我慢禮謂身雖設拜無有敬心外覩似恭內懷我慢也二求名禮亦名唱和禮謂但要名譽詐現威儀雖云禮拜實無殷重心也唱和禮者口雖稱唱佛名心實馳求外境也三身心恭敬禮謂口稱佛號心存相好身業翹勤恭敬供養無異念也四發智清淨禮謂慧心明了達佛境界內外清淨虗通無礙禮一佛時即禮一切諸佛禮一切諸佛即禮一佛以諸佛法身體本融通故禮法禮僧亦復如是五遍入法界禮謂想自己身心等法從本以來不離法界諸佛不離我心我心不離諸佛性相平等本無增減今禮一佛即遍禮諸佛如一室中懸百千鏡鏡鏡皆現鏡無不照影無不現如是正觀則功歸法界德用無邊是名遍入法界禮六正觀修成禮謂攝心正念雖對佛身即禮自己佛身蓋由一切衆生本有覺性與佛平等謂隨性緣迷於己性妄造諸惡無始以來未曾將一燈一香一禮供養己身佛性若能返照本覺則解脫有期故維摩經云觀心實相觀佛亦然是名正觀修誠禮七實相平等禮謂前正觀中體用不二猶存有禮有觀自他兩異今此一禮無自無他凡聖體用不二若見佛可尊可敬見凡可卑可慢此心即成邪執故金剛經云是法平等無有高下能禮所禮其性空寂是名實相平等禮如上七種是非俱明禮拜之時先須深究故曰不可不知也聽法第七凡九事分二初正儀凡遇掛上堂牌宜早上堂莫待法鼓大攂整理衣服平視直進坐必端嚴不得亂語不得大咳唾聽者聆也謂法有助道之力故須聽也蓋諸佛心宗載於法藏雖則自性本通必要師承稟受是故講法講毗尼時必須諦聽忖思方能開心地道所謂此方真教體清淨在音聞欲取三摩提實以聞中入付法藏經云佛言一切衆生欲出生死海必假法船方得度脫法為清涼除煩惱熱法是妙藥能愈劇病法是衆生真善知識作大利益濟諸苦惱所以然者一切衆生志性無定隨所染習近善則善近惡則惡若近惡友便造惡業流轉生死無有邊際若近善友起諸敬心聽受妙法必能令離三塗苦惱由此功德受最勝樂成範云凡沙彌學心當如旱地涸池不厭多聞不棄寸陰若遇法師上座講說經論了義之法當虗心諦聽於說法者如父母本師想於所聞法如饑受食渴飲漿想凡遇掛上堂牌者謂上堂說法乃法門最尊之事聽法亦人生極大之緣掛牌是預告大衆之規學者知之當生歡喜心作難遭想法鼓者如來之信鼓也唐時武后信樂佛法以王禮供養賢首大師上座說法故曰法鼓若不早往法鼓大攂臨時倉忙奔走法堂大衆觀之不雅自己心中煩躁不入法理故宜早進也整理衣服者時至鳴鐘三下侍者傳爐至法座上復擊小鐘三下大衆更換七衣平視直進者謂衣整則儀肅平視則心端直進則不左右顧視也坐必端嚴者身業致敬不得亂語者口業無愆況法堂之中乃人天聚集凡聖交參非說話之時也不得大咳唾者有其三過一動衆二污地三獲罪非小詳如經律二補儀附凡聽法須聞而思思而修不得專記名言以資談柄不得未會稱會入耳出口年少沙彌戒力未固宜更學律不得早赴講筵聞思修者此是三慧缺一不可也若聞而不思如人耕田不下種子若思而不修如下種子不溉灌耘除終無結實所謂學而不思則罔思而不學則殆也三慧若立則三乘聖果自可獲矣專記名言者名言非至道真實之言也若言愈浮而道愈喪如人說食如數他寶實無益處故學道之人不可專記名相增長慢幢而失至真之道也談柄者謂談論把柄即麈尾也麈鹿中之王與虎鬪時羣鹿隨麈而走麈尾東向則羣鹿皆東麈尾西向則羣鹿皆西所以護羣鹿之命也上古大儒與諸弟子講論道學蓋取其意使諸弟子聽其麈揮也領悟佛法曰會未會稱會是自欺不實入耳出口無契悟機是欺他人古云君子之學入乎耳著乎心布於四肢形乎動靜小人之學入乎耳出乎口耳口之間四寸耳曷足以美七尺之軀耶戒力未固者謂才登戒品信力未堅尚不知沙彌之事云何習異學耶故宜先學戒律威儀講筵即講經法席處也若早赴者則恐心志無定腳跟未穩隨風倒柁以致撥無因果而招無間之重咎也習學經典第八十九事分二初正儀分三初學知次第宜先學律後學修多羅不得違越凡學一經須先白師經完更白別學某經時不失持云習受法專精曰學又覺也效也謂後覺者必效先覺之所為乃可以明善如不學則不知佛道也宜先學律者戒律是調伏身心之法也修多羅此翻云經經徑也是三乘聖人遊履之徑路也宜先學律如下種子以培其本然後學經溉灌其苗根本深厚枝葉敷榮則聖果可期矣如華嚴云如人學射先安其足後習其法亦如拮据之有基汲水之有源也若先學經如無種子而溉灌之種子既無何處求實是故須當次第知所先後則近道矣凡學一經須先白師者謂沙彌佛法未多識見未廣不知法之深淺學之次第白師後學則溫故知新日有進益也古云學道之人兩日工齊則一日虗度時光易過道業難成不可少懈也二敬法尊人不得口吹經上塵不得經案上包藏茶末雜物人閲經不得近彼案前經行凡經籍損壞宜速修補經典所在即如佛在經上有塵應以淨物拂之若口吹者有其二過一穢氣觸經二失尊敬心文殊問經云一切莊嚴供具以口吹灰者墮優鉢羅地獄傍報作風神王經案上包藏茶末雜物者輕經污桌也凡經桌以潔淨為主清早須當拂去塵灰塵灰尚且拂去何況雜物清規云私藏茶末取笑傍觀亦不得以世間文字一切外書及不淨器物并頭帽扇巾數珠等安在佛經律上人閲經不得近彼案前經行者謂凡看經必須澄靜思惟若行繞其前則分他心路動其所思即成過咎經籍損壞宜速修補者經籍即經典也乃聖賢之血脈亦吾人之父母若有損壞急宜修補父母有病豈可怠耶經云首軸脫落部帙失次紙墨破裂等若不修理皆得罪也三教以務本沙彌本業未成不得習學外書子史治世典章本業即本分之事也如世儒之習五經必先通於本經餘經次第習之若本經不通諸經皆成礙塞沙彌亦復如是十戒未淳威儀未具故不得習學餘法也子謂百家諸子史謂歷朝史籍謂凡有一代君臣必有一代之史所謂史者以記當時法不法得失之迹也録之以警後世取信將來故謂之信史也外書者如三皇五帝之典孔子姬旦之籍乃至四書五經教以齊家治國修身養性輔國利民故云治世典章由是治世語言故名為外內典者謂三乘聖教教令淨心除惑見自本性皆為出世之法故名內也佛藏經云當來比丘好讀外經於說法時莊校文辭令衆歡喜是諸人等為魔所惑覆障慧眼深貪利養猶如羣盲為誑所欺輔行云若為降伏外道故十二時中許一時習學外典二補儀分四初遮學僞似附不得揀應赴道場經習學不得習學僞造經典不得揀應赴道場經習學者謂如來所說甚深經典要人受持習學自利利他今云不得者過在揀字謂不得專為揀選應他赴請道場而習學也沙彌本業未成恐習氣現前為利忘戒不得習學僞造經典者謂以慌唐之言謬為佛說以誑愚夫也如血盆妙沙分珠救苦等經皆非佛說故經云當來世中多有惡鬼受生人間常懷惡心時起諍論各各求於名譽利養僞造經書及諸符呪自讚毀他令修學人不知所向盲於正眼失其正見是也二禁習外書不得習學命書相書醫書兵書卜筮書天文書地理書圖讖書乃至爐火黃白神奇鬼怪符水等書不得習學宣卷打偈不得習學外道書除智力有餘為欲知內外教深淺者可以涉躐然勿生習學想命書者謂子平五星陰陽七政等書談人壽夭窮通以求利故然出家人當培植佛祖慧命則無所不利也古云為善降之百祥為惡降之百殃然從何處算耶相書者謂麻衣柳莊等書觀其形貌神氣而談貧富貴賤以求利故然相從心轉福是修成又從何處相耶醫書者謂大小方脉內外醫書始自神農察草木寒溫之性辨君臣佐使之宜作藥方以療民疾後來多以求利故不許習若念病苦不為求利佛有開緣兵書者謂姜太公之六韜黃石公之三略孫武子十三篇等皆征伐作陳之書非釋子所應學也卜筮書者物原云伏羲龜卜神農蓍筮蓍草出羲文墓藂必滿百莖必長丈上覆青雲下守靈龜白虎通云天子蓍九尺諸侯七尺大夫五尺士三尺用之以占驗吉凶禍福預知其事古云禍福無門惟人自召何處筮耶晉臣顏含郭璞嘗欲與之筮含曰年在天位在人修己而天不與者命也守道而人不知者性也自有性命無勞蓍龜世儒尚不肯為況釋子者耶天文書者謂觀天之氣象預知時之吉凶變化之書以求利故非釋子所應為也地理書者謂郭璞葬經楊筠松地理大全黃石公八宅及周書等皆是堪與風水擇日之書以求利故亦非釋子所應習也圖讖書者圖謂河圖伏義時龍馬負圖而出讖者預讖國家來驗符合無差之書關係匪輕非出家者所應看也爐火黃白者乃神仙黃白之術鍊真經云丹砂煉之初返則成白銀二返而成黃金昔漢鍾離傳丹於呂洞賓丹成指石為金可以傳世呂問曰此丹成後畢竟如何鍾曰五百年後原還為石呂曰若使原還為石終當害世非真丹也遂乃廢鼎然洞賓廢鼎真丹成矣豈釋子不如俗土乎神鬼者有福而靈曰神無福而魅曰鬼又鬼者欺也謂欺人而取飲食故奇怪者謂降神拿鬼畫符噀水以治病圓光以顯事作如是術妖言惑衆人見怪奇而皆信之故曰神奇鬼怪符水等書沙彌宜孜孜學佛法不可效此以求利也宣卷打偈者即無為教外道傳有五部六冊一人宣偈衆皆和之故曰打偈沙彌是法王之子不可墮入此中外道書者謂心遊理外知見差殊故云外道共有九十五種由道行理外書亦是外故不得習也智度論云習學外典如以刀割泥泥無所成而刀自損矣善戒經云菩薩不讀誦如來正經讀誦世典文頌書疏者得罪除智力有餘者謂宗律一貫道德雙彰入佛入魔無不自在故曰有餘若有絲毫不了便無餘力也內外教如前釋深淺辨其優劣涉躐乃經過之別名然欲知教之深淺只宜暫時過目不可著在此中故曰勿生習學想也律中因舍利弗目犍連二尊者為破外道故處於高座教新學比丘及沙彌學外道書佛知故制後來新學比丘及沙彌與外道論義皆不能答外道輕笑佛問其故比丘沙彌答言為專心本業故如來又開三戒工世法不得習學詩詞不得著心學字求工但書寫端楷足矣詩志之所發於言也詞言之所吐於文也記云書算卜術俗典文頌皆是世法出家人腳跟未穩眨眼之時已過三五十年大事未明如喪考妣那有閒工夫學詩詞耶端楷者端即端正揩即楷書然端楷二字不易到手關係人品邪正壽命延促故此乃上谷王次仲所作足以宣文顯義也不必再求精巧𨽻篆草書出家人事事要真少有虗浮便是障道因緣也四尊崇正教不得污手執持經對經典如對佛不得戲笑不得案上狼藉卷帙不得高聲動衆不得借人經看不還及不加愛重以致損壞經典乃如來所說清淨妙法必須三業清淨方堪受持因果經云觸手請經當墮廁中蟲報阿難請戒律論云僧尼白衣若讀誦經律論等行語手執翻卷者依忉利天歲數受畜生報墮獐鹿中恆被摺脊苦痛難忍若無記戲言捉經律等亦招前報對經典如對佛者謂經是佛語故三世如來皆供養也千生罕遇萬劫難逢讀之縱不能解義誦之亦當種其善根故須特加尊敬何得戲笑耶律云慎無臥誦經典若才覺疲倦懈怠心生即當痛念人命呼吸發起精進如救頭然又豈可懈怠耶不得經案上狼藉卷帙者謂經卷編次成夾曰帙狼藉者以喻表顯也謂狼所食物腹少外多遍地撕開若經卷亂攤桌上參差不堪亦如狼之食物也古儒讀詩書未竟雖有急速必待卷束整齊然後起身恐損壞故何況佛法而不整肅耶不得高聲動衆者謂凡讀經律要知句逗聲法華梵了然若隨衆諷誦聲宜調和不得自恃若自習學聲須低小勿動衆念馬素禪師云舉佛音聲漫水流諷經行道鴈行遊瞻前顧後輕移步左右回旋半展眸叉手當胸如捧水立身頂上似安油威儀動靜常如此不枉人間作比丘不得借人經看不還等句者謂經法是三乘聖人之父母宜同加愛惜不得有彼此之分如有不敬及損壞者損壞得慢法罪借看故意不還即得盜罪經云借取與必分明無違日期以失信約入寺院第九凡七事分二初入門次第凡入寺門不得行中央須緣左右邊行緣左先左足緣右先右足寺者西國呼為僧伽藍摩此云衆園謂是衆僧所住之園也自周昭王甲寅二十四年四月八日如來生時此方皆見赤光貫日江河泛漲王問羣臣太史蘇由奏曰西方有聖人生焉千年之後法流此土王敕鐫石記之埋於南郊天祠之前後于穆王壬申五十三年二月十五日佛滅度時暴風忽起地震天陰白虹十二道直沖天上太史扈多曰西方聖人滅矣故後來孔子嘆曰我生何以晚泥洹何以早不見釋迦文心中常懊惱至東漢第二主孝明皇帝永平三年歲次庚申帝夢丈六金人項有日光飛入殿庭上問羣臣太史傅毅對曰臣聞西域有神號之為佛陛下所夢其必是乎至七年甲子帝敕郎中蔡愔中郎將秦景博士王遵等一十八人西尋佛法至印度國請迦葉摩騰竺法蘭用白馬䭾經并將畫釋迦佛像以永平十年丁卯至於洛陽權住鴻臚寺以此寺本禮四方遠國之邸舍也自後僧既漸多別創堂殿安之二僧移入新居以不忘其本故標寺號又因白馬䭾經故名白馬寺也稽古略云赤烏四年康居國三藏康僧會至吳營立茅茨設像行道國人初見沙門驚異之有司以聞吳主孫權曰是漢明帝所夢佛道之遺風也權問太傅闞澤曰漢明何年佛教入中國何緣不及東方澤曰永平年佛法初至計今赤烏四年則一百七十年矣永平十四年五嶽道士褚善信等乞與西僧粗法于是善信負妄慚而死凡中國人例不許出家無人流布加之罹亂歲深方至本國權曰孔子制術典訓教化來葉老莊修身自玩放浪山林何事佛為澤曰孔老二教法天制用不敢違天佛教諸天奉行不敢違佛以此言之優劣可見也遂詔至問狀會進曰如來大師化已千年然靈骨舍利神應無方昔阿育王奉之為八萬四千塔此其遺化也權以為誇己則曰舍利可得當為塔之苟其無驗國有常刑會請期七日無驗乃至二七無驗權曰趣烹會默念佛名真慈夫豈違我哉更請七日至五鼓不見眼中迸血忽聞鏘然有聲起視瓶中光明錯發黎明進之權與公卿聚觀嘆曰希世之瑞也乃為建塔造寺奉會居焉此是江南寺塔始也又僧史略云至後魏太武帝始光元年創立伽藍名為招提隋煬帝大業年中改為道場至唐復為寺也不得行中央者謂不得正中直進也儒云入不中門行不履閾若行中央則唐突無尊敬矣是故應須回護須緣左右邊行者緣向也僧祇云先下足跟後下足指從殿門右頰先舉左足而進事畢從左頰原舉左足而出如大衆齊集分左右序則不拘也二登殿如儀不得無故登大殿遊行不得無故登塔入殿塔當右繞不得左轉不得殿塔中洟唾繞塔或三匝七匝乃至十百須知遍數不得以笠杖等倚殿壁凡欲登殿者若非燒香供花禮佛持誦及作法等事餘皆不可如世帝王登殿論政文武官僚必待宣召而後敢進也漢霍光輔昭帝出入禁闥所履殿陛不失尺寸皆敬畏之至也況法王寶殿詎可無故遊行乎西國寺圖云入出之時悉轉面向佛若禮三寶當念體唯是一所謂覺法滿足名佛所覺之道名法學佛道者名僧則如一切凡聖體皆無二也但無故不得入不得無故登塔者謂塔是人天幢相無舍利佛像尚不宜登而況有耶若不為供養花幡香燈而入殿塔者皆得慢罪入殿塔當右繞者僧祗律云禮佛塔當右繞如日月星繞須彌山不得左轉如來降生周行七步亦自南而西也是故入殿塔當自南而西自西而東也又右繞者表承順之至故凡事承順則一切事無不成也文句記云左回偏僻是故為凶以表惡也右回便易是故為吉以表善也佛髮右旋凡人左旋故當從佛不得殿塔中洟唾者謂深明罪福故僧護經云在佛僧淨地洟唾污穢以是因緣入地獄中刀刖己鼻火燒受苦不息詳如經說繞塔或三匝七匝等者三匝表清淨三業供養三寶斷除三毒滅三惡道七匝表除七支罪得七覺支十匝表除十使得佛十力百匝表除百煩惱得百法門故曰須知遍數也旋繞之時當憶佛念佛則不落無記妄想二邊即得一心不亂一心不亂是為真正繞塔也不得以笠杖等倚殿壁者沙彌本無畜杖法或遠行及老病持之若見二師上座尊宿皆投杖笠于地然後問訊若為二師持杖師有顧問必抱杖然後答之呂氏春秋曰孔子弟子抱杖而問其父拄杖而問兄弟曳杖而問妻子蓋尊卑有分也若以杖倚殿壁即得輕慢之罪昔二十五祖婆舍斯多尊者七劫以前當證二果由以杖倚殿壁緣斯過慢遂失二果寶梁經云有一賢者面上有國王文相師見已嫁女與之後時賢者入寺杖倚寺壁生憍慢故失國王文墮大地獄可不慎哉行護云不得釘破牆壁不得門戶及牆上書字不得廊下吟咏不得著木屐及捉木屐靴入殿塔中感生馬蹄國報入禪堂隨衆第十十七事分二初正儀分三初護念興慈單上不得抖衣被作聲扇風使鄰單動念下牀默念偈云從朝寅旦直至暮一切衆生自回護若於足下喪身形願汝即時生淨土禪堂者謂攝心而不分散曰禪鍛鍊英賢之處曰堂不必局於禪教也如認真坐禪看教看律自然心不分散也惟在各人自重僧重則法重僧輕則法輕也笑翁和尚曰粥了和南飯後茶放參藥石莫喧譁入堂出戶清規合方見叢林有作家單上不得抖衣被作聲扇風者具招三過一自己粗躁二扇塵污人三令他動念下牀者前在單此下牀也默念心轉也若高聲者一則不成堂規二則尚未潄口故令默念也從朝寅旦直至暮一切衆生自回護者謂人與衆生形雖有異而性實無別人動生亦動人息生亦息然我雖無傷害之心而亦要自己先回護也若於足下喪身形願汝即時生淨土者謂適有誤傷仗此偈呪法力即時生安樂處也此總表息惡行慈之念廣如香乳記明二防非慎口不得大語高聲輕手揭簾須垂後手不得拖鞋作聲不得大咳嗽作聲不得鄰單交頭接耳講說世事禪堂乃勘驗龍蛇之所凡入堂中一切要依規矩若高聲大語傍若無人似乎狂態況一人大語衆人同之則一堂喧閙妨彼做工夫人則罪莫大焉沙門出言要謙恭柔軟方合清規輕手揭簾須垂後手者簾者簾也謂以障蔽簾恥也天子外屏諸侯內屏大夫以簾士以帷若重手揭簾不以手垂後襯者一恐擲下頓促簾壞故二且粗濁之聲動衆故若捲簾時面須向外必使兩頭平正放時手送至地不得拖鞋作聲者行護云凡著履屐先令腳跟著地勿使有聲不得大咳嗽作聲者謂無痰有聲曰咳有痰無聲曰嗽若不能忍當以衣袖掩口不得鄰單交頭接耳講說世事者論佛法尚不宜交頭接耳況世事耶此有三義一失威儀二忌嫌疑三忘正念三公私遵制或有道伴親情相看堂中不得久話相邀林下水邊乃可傾心談論若看經須端身澄心默玩不得出聲二板鳴即宜早進堂歸位默念偈云正身端坐當願衆生坐菩提座心無所著道伴親情相看者蓋天性至厚無有過於父母者今既辭親學道當以道為親也傾心談論者須是個人始可盡心與之較量若論世諦不啻污穢唇吻亦恐污穢林泉也古云高山流水深深意自有知音笑點頭慈受深禪師云若是舊時道伴遠地親情相引林下水邊方可傾心談論至於交關買賣引惹雜人盡非衲子所為若看經須澄心默玩者玩觀想也堂中看經當默識之心不散亂若形之於聲經義無從思之故澄心默會一則經義從此曉了二則智慧從此發生故不得高聲也二板鳴即宜早進堂者鐘板是百丈建立嘗負之塗中行持規矩不怠故叢林至今遵之二板者謂停二不停三二板既鳴即宜抽解進堂不過一茶之傾三板止靜禪堂掩門內不放出外不放入少遲使是門外漢也正身端坐者身儀也菩提座者即自覺本有空王之座也此座人人本具尚未曾覺故曰當願如蓮花不染故曰無著謂四相皆空如夢如幻如鏡中花如水中月若有所著便非菩提矣二補儀附不得穿堂直過上單下單俱當細行勿令鄰單動念不得單上寫文字除衆看經教時不得單上相聚擺茶夜坐雜話不得單上縫補衣被不得眠臥共鄰單說話動衆堂中大衆各有所司修觀坐禪持經看律穿堂直過涉于浮躁不惟自失且亂他心縱有事緣當沿前後而行針規云穿堂直過豈不厚顏尊殿閒行恐招薄福上單下單俱當細行者謂釋子本具三千威儀八萬細行凡所舉止先須慎心勿得粗浮動他心念不得單上寫文字者經典乃如來所說單上抄寫慢法招愆若和詩作偈其過尤甚除衆看經教時者謂堂中人多座少單上可也不得單上相聚擺茶夜坐雜話者此有三過一動他念二散己心三犯非時縱有非時之藥石亦不應夜坐雜談況己事未辦何得虗延也不得縫補衣被者謂大衆禪床非是縫補之處也一則招人雜話二則作塌禪床不得眠臥共鄰單說話者經云食則無語臥則無談坐則禪思起則諷誦戒行如此真佛弟子如眠臥共鄰單說話大衆嫌疑師長呵責如是為人終成廢物執作第十一十二事分二初正儀分三初遵敬僧物當惜衆僧物當隨知事者教令不得違戾凡洗菜當三易水凡有叢林必有大衆有大衆者必有普務有普務者必須大衆執作也當惜衆僧物者大律云護常住僧物者如護自己眼睛行護云有損費常住三寶等物當賠償之昔揚州白塔寺沙門道昶掌知僧物自任侵用忽有冥官數人白日入房曳昶下地欲斷其頭昶驚呌乞命官厲聲言合房資財並送還僧當放汝活昶叩頭言不敢違命即鳴鐘集衆盡捨衣物造像設齊冥官三日復至見昶一鉢一衲不言而去昶自是勉勵進修卒成明行當隨知事教令不得違戾者違是乖違不順戾乃很戾不服叢林執事量才能取凡有普務當善言而推大衆聞之即當速出則內外水乳也若聞似不聞違戾教令誤大衆事便為不法人也凡洗菜當三易水者威儀云先科去蟲蟻一却根二齊頭三不得青黃合然後水洗易換也本律云一次但去粗垢二次細垢未盡三次菜得淨也二水清食淨凡汲水洗淨手凡用水須諦視有蟲無蟲以密羅濾過方用若嚴冬不得早濾水須待日出凡燒竈不得燃腐薪凡作食不得帶爪甲垢汲水先淨手者誠心至切也以淨手故方堪以水供佛供僧也凡用水者用有二種一飲食二浣濯須諦視者不論河池井水悉皆有蟲形極微細故須諦視觀察不得就中洗手面及大小便以密羅濾過方用者此是聖賢護生行慈之要務故律云若行五里無囊不去濾羅有五種一密絹方羅二陰陽瓶三君持瓶此二皆以絹鞔口細繩繫頸沉放水中待滿牽出四酌水羅五角羅用絹方二磔許或繫瓶口或置碗上濾而用之須待日出者謂寒天早濾恐蟲凍死也不得燃腐薪者謂腐朽之木自然有蟲故不聽也經云亦不得燃生薪溼薪作食不得帶爪甲垢者律制不得畜爪甲長一麥即翦帶垢不淨作食得廁中鬼報寄歸傳云營供必先洗手潄口淨器不者所作祈請並無效驗古云作食不潔餧人人必瞋之神亦惡之穢食委棄均於暴殄譬喻經云有沙門作摩波利飯比丘分酪酥著手以手拭柱柱即破裂不可不慎三依教護生凡棄惡水不得當道不得高手揚潑當離地四五寸徐徐棄之凡掃地不得迎風掃不得聚灰土安門扇後洗內衣須拾去蟣虱方洗夏月用水盆了須覆若仰即蟲生惡水是洗器浣濯之水也謂不得當人行道處棄瀉故當離地四五寸不致揚潑也徐徐棄之不致污衣也凡掃地等句者迎風掃地塵𡋯人面非是有智之人聚灰土安門扇後其人有始無終後來結果可見經云掃地當令淨不得有迹有迹即時掃却百緣經云掃地得五種功德一自除心垢二除他心垢三去憍慢四調伏心五增長功德得生善處成實論云掃一閻浮提僧地不如掃佛地一掌洗內衣須拾去蟣虱者謂離傷生之過也小者名蟣大者名虱拾淨律無呵責夏月用水盆了須覆者謂盆仰則有餘水有水則蟲易生也凡洗上衣之盆不得洗足及下衣晒時竿上亦不得相觸含水噴法衣必先潄口二補儀附不得熱湯潑地上一切米蔬果等不得輕棄狼藉須加愛惜不得熱湯潑地上者傷生之故也亦不得以熱湯澆火令滅古云惡水高揚熱湯潑地微細昆蟲何處回避水火毒身如入鼎沸以此劇刑橫加無謂我福無增彼惡永記故云徐徐清涼如意一切米蔬果等不得輕棄狼藉者謂今生不惜物來世無受用況常住衆僧之物而不深加愛惜耶古云天倉五穀在二十八宿乃危星主之人以食為天故聖人務農重穀天子親耕勸農春夏祈穀于上帝而人不知天地養育之恩豈五穀可撒棄耶況釋子尤當念信施之恩更宜尊重入浴第十二凡十事分二初正儀分二初淨穢須知先以湯洗面從上至下徐徐洗之不得粗躁以湯水濺鄰人不得浴堂小遺佛制半月洗浴因耆婆童子所白謂比丘多食非浴不瘥故開病時後為作務遠行等又開先以湯洗面者謂面為一身最尊故凡入浴時先將下衣掛下竿已以浴巾圍好下身方脫上衣掛上竿上次以水洗淨然後入池默誦偈呪從上至下徐徐洗之沐浴之儀不廢也不得粗躁以湯水濺鄰人者濺音箋去聲激灑也謂當細行而浴不得粗躁使湯水激灑鄰人動他心念也不得浴堂小遺者小遺或云小行或云小解或云小淨或云小便然淨地尚不可遺況浴堂中耶蓋洗浴原為潔身小遺浴堂則求潔反污矣既污自身復污大衆則禮佛誦經一切皆成不淨莫大之罪也僧護經云比丘在淨地大小便利不擇處所以是因緣入地獄中作肉廁井火燒受苦不息二嫌疑當避不得共人語笑人天寶鑑云一沙彌入浴戲笑遂感沸湯地獄之報不得洗僻處凡有瘡癬宜在後浴或有可畏瘡尤宜𢌞避免刺人眼不得恣意久洗妨礙後人語笑乃放逸之根殊不知身垢未淨而心垢先生皆由不知慚愧故感此報也浴者各須自嚴浴堂警語云不得以水互相澆洗亦不得用水太費不得在內洗衣入不先師亦不得在上座前浴萬峯浴室銘云山峗路遠致其柴薪瀹釜然火效其勞勤一月數浴叢林罕聞沙彌戲笑沸湯澆淋洗心滌慮日新又新何以報德忽悟水因僻處者大小便處也謂先當洗淨入浴時不必再洗僻處以違從上至下之儀也然下身縱有熱痱及癢疥者亦不得先湯凡有瘡癬者十誦律云有比丘癩病求治藥師耆域告言汝可洗浴得瘥比丘答言佛未聽許入浴堂諸比丘白佛佛聽衆僧洗後浴之故曰宜在後浴也可畏瘡者如癰疽及一切惡瘡等自須回避或取水別洗免刺人眼或在最後方浴不然則損福招愆不得恣意久洗者謂當愛惜常住體諒大衆不得恣情縱意久洗妨礙後人也二補儀附脫衣著衣安詳自在浴前先洗淨須細行不得以洗淨水入浴釜湯泠熱依例擊梆不得大喚安詳自在者謂不得輕躁倉卒也浴前先洗淨者謂未浴之前先當如法洗淨已方可入池也前缺此法今故補之不得以洗淨水入浴釜者釜鍋也謂不得以洗淨穢水入于浴鍋也湯冷熱依例擊梆者謂當守常住之規不得高聲大喚以類俗人也古來浴堂設小板或小梆于內湯泠鳴兩下即是湯冷二字湯熱鳴三下即是不要燒三字如欲添水鳴一下圊頭聞之即會添減之意調和如法也其洗浴器具當安置潔淨如法而用者亦當如法也入廁第十三十六事分二初正儀分三初知時即行欲大小便即當行莫待內逼倉卒於竹竿土掛直裰摺令齊整以手巾或腰絛繫之一作記認二恐墮地須脫換鞋腳應是屩字不可淨鞋入廁緇門警訓云登廁之法律制委明蓋欲令其嚴潔身器以便親近聖賢也故洗淨洗手各有軌度倘未盡諸法則禮誦燒香執捉經卷一切皆為不淨矣欲大小便即當行者謂人之有身必假飲食滋養有飲食則輕氣上升重濁下墜故有大小便利是所不免者凡欲行時即須打點若等事急而行即有失儀之過故曰莫待內逼倉卒也僧祇律云應當知時欲行便往不得覆頭大小便及慌忙失錯竹竿上掛直裰等句者以見作事細心不致有所失也直裰相傳前輩見僧有偏衫而無裙或有裙而無偏衫故合二衣而為直裰也須脫換鞋屩者屩音覺草履也此從清規較證謂當脫去淨鞋換草履上廁也亦不得著觸履踐僧地及入殿堂禮誦獲罪非輕古云衩袒登溷草履遊山莫踐法堂回互耆舊二預覺存心至當三彈指使內人知不得迫促內人使出已止復當三彈指默念大小便時當願衆生棄貪瞋癡蠲除罪法不得低頭視下不得持草畫地不得努氣作聲不得隔壁共人說話不當唾壁三彈指者謂驚覺內人也然內人亦當作聲使知如內人不出自當避之或過餘處不得迫促內人者謂不得在彼嚮動逼迫內人出也已上登廁也復當三彈指者恐傷廁中啖穢之鬼故當先驚覺也譬喻經云有一沙門不彈指來大小便穢濺廁中鬼面厲鬼大嗔欲殺沙門沙門持戒鬼不得便默念大小便時當願衆生者謂菩薩以利生為念凡舉一念即願度生也棄貪嗔癡蠲除罪法者為此三毒穢污身心如縛罪法不得自在故喻如穢言我今棄穢如除罪法清淨無垢亦願衆生清淨無垢也不得低頭視下者謂不得視陰處也不得持草畫地者西俗以葦為廁草故愚夫不知廁上畫字畫壁遂成大咎若于廁上板壁作字則為造物所呵筆餐云明湖州潘道士道法高妙一日於廁上畫符天將忽至問所召何事無以應支曰門前樹為我移種屋後將曰小事何輕意召我遂以火筆點頭而去士後頭上膿水不乾凡有患瘡癤者乞士膿水抹之無不效驗不得努氣作聲者努用力也然除穢雖粗行若努力則喪氣也不得隔壁共人說話者文殊經云大小便時身口狀如木石不得有聲護持清淨身口故古云廁上共人語最下賤相不得唾壁者有其二過一行人打掃自己折福二人見生疑令鬼驚畏列異傳云南陽宋經伯夜行逢鬼問云鬼悉何所忌答言惟不喜人唾耳三事理無差逢人不得作禮宜側身避之不得沿路行繫衣帶便畢當淨澡手未澡不得持物洗手默念以水盥掌當願衆生得清淨手受持佛法唵主迦囉耶娑訶呪三遍褻衣作禮反成失儀側身避之是為正理不得沿路行繫衣帶者謂餘時脫衣繫帶尚不得沿路況入廁出身露體耶雖穢處回不可久停然亦必須繫就方走若沿路行繫則愴惶之狀難觀矣便畢者謂除穢事竟也不言洗淨而言澡手者文略也毗尼日用云若但小便時唯用水洗手一次即淨若是大便者去穢後洗手或用灰泥皂角如法洗之佛言洗淨之法有大利益凡以我為師者咸應洗淨若不如法洗淨不應繞塔行道不合禮佛誦經自不禮他亦不受他禮不應啖食不坐僧床不應入衆所持呪法皆無效驗未澡不得持物者謂手穢物亦穢也洗手默念以水盥掌當願衆生者自利利他也得清淨手受持佛法者事理雙彰也呪持七遍清規云按大藏瓔珞經等若登溷洗手不念此呪假使十恆河水洗至金剛地際亦不能淨廣如香乳記明二補儀附若小解亦要收起衣袖又不可著褊衫小解解放也其義出自禮記謂手容恭敬君子起居常自恭敬不敢散手掉臂惟至大小便時不得不暫解也然衣袖不能常洗凡小解時先須抄起宜在桶邊解不得向桶中直沖作聲使臭氣薰人亦不得共人語笑褊衫原非佛制乃此方所造竺道祖云魏時請僧入內供養宮人見僧褊袒右肩不以為善遂作褊衫施綴于左邊覆肩衣上而覆右肩因名褊衫今隱覆肩衣名通號兩袖者曰褊衫也睡臥第十四凡七事分二初正儀分二初身念如儀臥須右脅名吉祥睡不得仰臥覆臥及左脅臥右脅臥者佛之遺式也謂沙門臥法應如獅子王臥右脅著席纍足合口頭枕右手舒左手順身不捨念慧思惟三寶則惡夢不起心不顛倒故名吉祥睡也仰臥者尸寢也覆臥者偃臥也寶梁經云仰臥是修羅臥覆臥是餓鬼臥左脅是貪欲人臥右脅是出家人臥也然臥須安枕或曲肱而枕頭不得著席黃庭經云上有黃庭下有關元前有幽關後有命門若仰臥覆臥則命門與丹田之氣不伸故有亂夢顛倒之境也靈樞經云天不滿西北故右耳目不如左耳目聰明地不滿東南故左手足不如右手足強健故吉祥睡者虗左以實右也二尊卑須別不得與師同室同榻或得同室不得同榻亦不得與同事沙彌共榻凡掛鞋履小衣等不得過人頭面不得與師同室同榻者謂遵佛制故或同室者謂防梵行難故非難不得同事者謂同沙彌所施行事或同師受學者如僧護比丘見地獄中二沙彌眠臥相抱猛火燒身苦不休息比丘白佛何罪所致佛言迦葉佛時是二沙彌共一被褥中相抱眠臥以是因緣入地獄中火燒被褥相抱受苦至今不絶鞋履小衣是下身衣物過人頭面損福招愆故不得高掛也二補儀附不得脫裏衣臥不得睡床上笑語高聲不得聖像及法堂前𢹂溺器過志于道者則睡眠時少經行時多或勞倦至極暫臥少頃也所以古人圓木為枕而自警耳裏衣者不論上下但以近身所著為名也若脫臥者則放逸恣睡故不得脫也笑語高聲與前禪堂臥語儀無別惟異房中耳睡時語聲神鬼所瞋念佛持呪神鬼贊祐聖像者諸佛菩薩羅漢祖師等像法堂者是凡聖交參說法之地溺器周禮天宮曰太尉掌王燕服及褻器鄭司農曰褻溺器也名虎子亦名伏虎此言便利穢褻不淨之器不得在師長前𢹂過況聖像者耶圍爐第十五凡四事分二初避嫌不得交頭接耳說話不得彈垢膩火中不得烘焙鞋襪嚴冬向火皆為禦寒若交頭接耳則失威儀說話則廢正業亦為是非之本再彈垢膩火中及烘焙鞋襪令臭氣薰人動他心念者則損福不淺矣故律云向火不得以毛髮爪甲洟唾皮血餅果毒藥而著火中並皆得罪清規云不得炙鞋焙屩亦不得撥火飛灰塵坌人眼二輟已不得向火太久恐妨後人稍暖便宜歸位六和同住泠暖相同向火太久是不為衆故當知足也針規云淨髮圍爐禮宜謙讓律中佛言向火有五過失一令人無顏色二令人無氣力三令人眼暗四令多人閙集五多說俗事有損無益也在房中第十六凡六事二分初敬人更相問訊須知大小欲持燈火入預告房內知云火入欲滅燈火預問同房人更用燈否滅燈火不得口吹念誦不得高聲更互也問訊者發言訊問也謂當先問生年成臘若長于我者詢其興居安利否若少于我者詢其學業日進否故云須知大小也行護云若有得失言語即須乞彼歡喜不得經宿結其罪纍應互相讚美不得背相毀說互相譏誚持燈預告者免彼失儀倉卒故燈滅預問者取同房人之便不敢自便故滅燈火不得口吹者有其二義一燈上有微細蟲飛聚焰上以火為境界吾人肉眼不見若以口吹則墮焰中而死失慈悲心故二燈乃火神所司人之生也莫不仗此破暗開明成熟活命若以口吹則有穢氣不恭敬故亦不得以手扇風令滅當以燈筯却去殘炷徐隱水盞中須檢點火燭弗令失誤念誦不得高聲義如前悉二存念若有病人當慈始終看之有人睡不得打物作響及高聲語笑不得無故入他房院病者謂四大不調氣息喘迫身為苦本誰能免之出家五衆無所親倚故如來諄諄告曰若欲供養我者當供養病人復告諸比丘言看病須具五種德一知病人可食不可食二不惡賤病人便利洟唾三有慈愍心不為名利四能經理湯藥乃至瘥或終五能為病者說法令生歡喜故有慈心者能看病也始終者長遠道心也善生經佛說偈言人當瞻疾病問訊諸危厄善惡有報應如種果獲實世尊則為父經法則為母同學者兄弟因是而得度有人睡不得打物作響及高聲語笑者響物應聲也謂打物作響高聲語笑驚亂人寂失己細行古云彼方睡時當存愛敬凡有舉動心必沉靜笑語高聲擊物作響令彼不眠動彼瞋病疊障無明遠却真性不得無故入他房院者謂無有過經請益問候師承看病因緣及常住之事不可入也古云無故入他房院不是講白話定是喫疲茶愚者近之智者遠之學佛道者決不行也到尼寺第十七凡十事分二初正儀分二初遠嫌有異座方坐無異座不得坐不得為非時之說若還不得說其好醜尼者善見云女也不稱女而稱尼者以別世俗故又令世人信敬尊重故若還同世俗稱女者則人所輕薄不能生信敬也會正記云如來成道十四年後姨母大愛道與五百釋種女求度出家佛不聽許為滅正法五百年故大愛道等步涉足裂塵土坌身悲泣不去阿難為陳三請如來慈愍為彼制八敬法若能行者當度出家阿難依教傳宣大愛道等三答能持故聽出家律云由尼等能行八敬如來正法還得千年此比丘尼始也尼寺者亦是漢明帝焚經時佛法感應宮女發心出家建三寺安尼為始有異座方坐者異特設也謂非尼常坐之座故無異座不得坐者以見男女有別也不得為非時之說者謂非宜說法之時則不應為說也然說法之語不得非言日臨午後不得久住若還不得說其好醜者謂不得論其是非好惡及彼形貌長短也二除疑不得書疏往來及假借裁割洗浣等不得手為淨髮不得屏處共坐不得書疏往來等者謂書以往來達意疏以彼此陳情假借也裁割是縫補洗浣即漿洗衣服等者未盡之辭斯皆恐生漸染招人譏謗雖戒律冰清心境兩寂不若杜絶為美也不得手為淨髮者謂離塵脫俗品格要高出世法中僧體須重若親手為尼剃髮則尼坐僧立敗壞法門終成俗漢矣成範云亦不得把手教剃式不得入厨房教作飲食非師差使縱過尼寺門亦不得擅入不得屏處共坐者有其二義一漸生染心二令他疑謗二補儀附無二人不得單進不得彼此送禮不得囑託尼僧入豪貴家化緣及求念經懺等不得與尼僧結拜父母姊妹道友不得單進者謂遠他猜議故不得彼此送禮者謂絶情平等故不得囑託尼僧入豪貴家化緣等者謂叢林興旺雖賴檀門但出入往來要須尊重不得鑽刺謀求退息施主如果有道德高隆行業真實者則不謀而自至也如囑託豪強富貴之家化緣則被他看破若求念經懺則失自己清高自以為榮他則輕視是可忍也孰不可忍也而智者耻之達者未必信也不得與尼僧結拜父母姊妹道友者有其二義一則為世俗嫌疑二則重僧生死之果大非出家者所為也古云父母非親誰更親昧却真心拜婦人安得吹毛橫宇宙鄭風掃盡見天倫寒山云離親為出家出家反結拜世上雖有緣僧中却無賴一頂如來衣竟被他販賣出此敗家兒佛也無可奈至人家第十八二十一事分二初正儀分四初觀機逗教有異座當坐不宜雜坐人問經當知時慎勿為非時之說異座者上座也不宜雜坐者謂不得與俗人共相雜坐也當自別座而坐不得蹲坐箕坐交脛坐搖身坐搖足坐及數起數坐等人問經當知時者謂當觀前人根器宜聞何法或多或少不得過說也慎勿為非時之說者若白衣不信三寶不向禮足不喜見僧不願造福是非其人勿妄宣說當重法也儀則經云說法不當機他聞心不重命終受大苦大律云有五種人問法皆不應為說一試問二無疑問三不為悔所犯故問四不受語故問五詰難故問並不得答若前人實有好心不具前五意為欲生善滅惡者乃隨機方便好心為說若自解未明若于法有疑者則不得為說恐令前人有錯傳之失彼此得罪大經云若有受持讀誦書寫宣說非時非國不請而說輕心輕他自嘆隨處而說反滅佛法乃至令無量人死墮地獄則是衆生惡知識也然具信者說世間法即是佛法不信者說佛法即成世間法也二慎儀嚴制不得多笑主人設食雖非法會亦勿失儀軌無犯夜行不得空室內或屏處與女人共坐共語不得書疏往來等同前笑者皆由散心放逸故出家人到檀越處時須護僧體縱談佛法到暢快處發笑亦不得有聲不得多笑不得癡笑狂笑及無緣笑假事作樂等宜自珍重勿令他譏如來熙怡微笑必有發起因緣凡人秖笑也主人設食等句者謂施主誠心供養不論大小皆是福田若失儀軌則損他信施也然道人至處即是法會主人信心即是道場所施既信故受供宜誠也行護云若入俗家坐起須具威儀發言亦要慈善不得粗獷勿說世事當說法語增其善心當攝六根不令放逸無犯夜行者謂出則不宜太早入則不宜著夜如日出而作日入而息則無患也然道人家青天白日正大光明而行猶遭人撿點何況夜行耶不得空室內或屏處等句者謂非處非人則不應語何況坐耶坐則犯過如尼不得書疏往來等同前謂如前入尼寺之義無別也三具儀生信若詣俗省親當先入中堂禮佛或家堂聖像端莊問訊次父母眷屬等一一問訊不得向父母說師法嚴出家難寂寥淡薄艱辛苦屈等事宜為說佛法令生信增福詣俗省親者佛言世間恩重莫過父母若人左肩擔父右肩擔母乃至于肩上大小便洟唾盡於百年猶不能報須臾之恩汝等應當孝敬父母故有此儀也當先入中堂禮佛者謂白衣信心中堂多有供養佛菩薩像故問既然省親先禮佛者何義答辭親割愛出家父母即是檀越眷屬即是施主仗佛法而利親緣故先禮也家堂聖像端莊問訊者此謂香火神像只宜合掌低頭父母等當加訊問起居也不得向父母說師法嚴等句者謂省親之意當安慰其親以進道之言勸誘父母娛親于道而忘于憂也若說寂寥苦屈等事即令父母生姑息之心于三寶所不生敬仰之念遂長淪苦海非娛親也若說佛法則令彼生信重心增長福慧超越輪回是則度父母出于生死苦海也故禮記云為人子能引親至于道孝之至也故曰宜為說佛法令生信增福四攝念無違不得與親族小兒等久坐久立雜話戲笑亦不得問族中是非好惡若天晚作宿當獨處一榻多坐少臥一心念佛事訖即還不得留連親族小兒等句者謂詣俗專為省親母論親黨老少至親皆為檀越俱當恭敬若與久坐久立雜話戲笑則非出家道品問族是非好惡便非好心古云俗塵愛網無有了期已辭出家不願再見況復問事耶獨處一榻防梵行難故多坐少臥令生信敬故一心念佛離妄想心故事訖即還無留連故若論沙彌戒力未深道力未固不應俗舍住宿因為省親不能一言而別故當作宿也然亦不得與僕婢同床被席共宿等二補儀分二初驅邪顯正附不得左右邪視不得雜語若與女人語不得低聲密語不得多語不得詐現威儀假粧禪相求彼恭敬不得誑說佛法亂答他問自賣多聞求彼恭敬邪視者心不正也古云欲知其人觀其眸子凡眸子不正其心不端也雜語剽竊流俗之言如亂絲之絆荊棘絶無頭緒若梟鳥之呌荒丘且多怪響未有不厭聽者也有違正教故不許也不低聲密語者言無有私故不多語者發言合則故不得詐現威儀假粧禪相者謂沙門威儀本具禪相而詐現假粧邀名求敬故不許也溈山云平常習慣自然何用粧模作勢寒山云威儀貴本分詐現非真實禪相本無相無相豈粧得縱使粧得成難逃真鑑識如猿學打坐外像內心忒微微境風生嬉戲偷果食瞻彼高尚人澄定久深默又如在紅爐真金無變色不得誑說佛法者由不明故失意亂答言無宗緒欲求恭敬故自賣多聞然宗緒既無亂答他問不但令人輕慢尤恐果報難酬也二惡行遠離不得送盒禮效白衣往還不得管人家務不得雜坐酒席不得結拜白衣人作父母姊妹不得說僧中過失不得送盒禮效白衣往還者謂送往酬還乃俗家所作交結世情非釋子所為然在家應供養福田而出家者反去貢奉白衣何顛倒之若是耶況與者喜而不與者怨遂生誹謗故不宜也其受罪果報經從詳明不得管人家務者謂天性至親忍心割愛為求道故當屏除一切世緣猛力參學庶幾報恩有地若身雖出家與俗無異今日到某老爺家說事明日到某相公家攀緣自己本分事全不提起一朝老病相纏臥疾在床老爺相公多替你不得也不得雜坐酒席者梵網經中止酒舍尚且不得雜坐尤其不宜謂酒舍之中多猖狂雖不與之共飲萬一為彼輕薄污辱法門故不可也不得結拜白衣人作父母姊妹者輔行云捨所親棄恩愛居蘭若修三昧更結異姓為兄弟父母倒之甚也皆由出家初念不真而不自省不得說僧中過失者謂與俗人談論當以誠諦之語發其信心若說僧中過失者如以利刀斷其信根也然人非聖哲孰能無過迦葉起舞堯舜病諸自無慧目豈察他非僧德如海佛猶親讚若生誹謗自招苦報律云往白衣家有五過一數見女人二漸相附近三轉相親厚四漸生欲意五多犯重罪冥祥記云宋僧規為京兆張瑜請在家供養無疴忽暴死二日乃蘇曰被五人縛我去至一城監官執筆觀簿又一人朱衣玄冠來曰簿上無此人名監官曰殺鬼何以濫將人來乃鞭之頃有使者稱天帝喚道人即至帝曰汝是沙門何不勤業而為小鬼橫捕耶但命未盡今當還生宜勤精進勿遊履白衣家殺鬼取人亦多枉濫如汝比也語畢遂遣使送歸還至瑜家乞食第十九凡十事分二初正儀分二初出入知禁當與老成人俱若無人俱當知所可行處到人門戶宜審舉措不得失威儀家無男子不可入門乞食者謂衆食有盡乞則無窮也佛弟子受此無窮之食以修無盡之法也又有四義一福利羣生二折伏我慢三知身有苦四除去執著故佛制也當與老成人俱者謂持戒可信人也與此人行則不生過失矣所可行處者聖教論云乞食五處不可往一唱令家謂歌唱曲令但取歡娛能亂禪定故二淫女家謂行止不潔聲名不正障道根本故三沽酒家謂酒是起罪因緣能壞善法故四王宮謂內庭嚴禁之所非可干冒故五屠殺家謂殺心甚大見者傷慈無有信根故若無老成人俱當知離此五家是可行處也舉措者猶動靜也謂當觀檀越動靜若有供養當如法而受若無往第二家不得多立或有或無而舉置之儀不可失也家無男子不可入門者一則令他疑謗二恐防其失節故不可入也二坐說須珍若欲坐先當瞻視座席有刀兵不宜坐有寶物不宜坐有婦人衣被莊嚴等不宜坐欲說經當知所應說時不應說時不得說與我食令爾得福瞻視觀察也上言無男子不可入門此言雖有男子亦當觀察座處而坐也刀兵凶器也坐則恐有所傷或令彼生瞋怒故寶物坐一則恐生貪著二防失落招愆婦人衣被莊嚴等并宜回避免生譏議所應說時者或有信心男子老人能分別法義及好惡等語令增信敬故應說也不應說時者謂無如上等人在傍或戲笑問故不應說也說與我食令爾得福者自忖何德何行致他得福自讚求食故不可也二補儀附凡乞食不得哀求苦索不得廣談因果望彼多施多得勿生貪著少得勿生憂惱不得專向熟情施主家及熟情庵院處索食乞食乃佛祖行道之法式也自古相傳至尊至貴若哀求則自失僧體與丐者何殊苦索則令他生厭與冤家相似所以化導不行皆為此也不得廣談因果望彼多施者諸佛常法為彼說法然後施者佛即不受況有希望心而可受耶行護云不得邪命教化激發俗人令其惠施佛制乞食肅恭儀表日限七家次第行道離檐三尺空諸懷抱隨分納些毋論多少端默容靜說即顛倒而況廣談起諸貪惱如彼江湖說書取討辱我法門得罪非小乞士黽勉毋視輕眇多得勿生貪著少得勿生憂惱者謂一粥一飯粒米文錢雖曰現世福田實由昔緣種植多則不可著此生貪少則不可憂此為惱隨緣而受即為正命也熟情處索食者謂不知厭足也以不知厭故數向熟情自無慚恥故每索他食佛言畜生尚畏人乞何況人乎古云饑逢香飯固佳哉珍重應知內自裁縱使相邀疏禮節丈夫斷不受嗟來入聚落第二十十七事分二初正儀分三初事儀無失無切緣不得入不得馳行不得搖臂行不得數數傍視人物行聚落者衆集曰聚居處曰落謂衆人所共居處名聚落也切緣者為三寶常住省覲師長父母法門極大之事非為募緣及自己私務也如無此切要等事不得輕入況聚落聲色雜糅苟非道力堅固能不為之眩惑耶故寒山云後世出家子論情入骨癡本來求解脫卻是受驅馳終朝遊俗舍禮念作威儀博錢買酒喫翻成客作兒佛話經云比丘在聚身口精進諸佛咸憂比丘在山息事安臥諸佛皆喜馳行謂如馬奔走也搖臂謂垂手掉臂放縱之態也法苑云五蓋覆心禪門已閉六塵在念亂想常馳類如狂象之無鈎一似戲猿之在樹未見快行有好步也故舉足當不緩不急不輕不重安庠徐步如白鶴之在芝田青獅之行石窟雲入深林逐幽鳥而不驚舟行順水偕游魚而無礙有志之士幸深思之數數傍視者數數不間貌旁視左右觀看也道人行處直往直來左顧右盼使旁人驚訝行護云當視地七尺勿踏傷蟲蟻二正念不移不得共沙彌小兒談笑行不得與女人前後互隨行不得與尼僧前後互隨行不得與醉人狂人前後互隨行不得故視女人不得眼角旁看女人若共沙彌小兒談笑行一自己身心散亂二令見者不生信敬清規云不得把手共行說世諦是非不得與女人及尼僧前後互隨行者謂女尼出行易動市囂口業若僧影並雜不免疑議故當遠避不得與醉人狂人前後互隨行者謂恐有所損故若路遇者即當遠避或別道行其車馬惡獸及狂犬等亦宜回避不得故視女人者謂不得故看也智度論佛說偈云寧以赤銅宛轉眼中不以散心邪視女色眼角旁看者邪視也經云禁閉六情心無念淫口無言調跡不相尋無同船載道逢無談若持異物無察視之三心誠儀正或逢尊宿親識俱立下傍先意問訊或逢戲幻奇怪等俱不宜看惟端身正道而行凡遇水坑水缺不得跳越有路當繞行無路衆皆跳越則得非病緣及急事不得乘馬乃至戲心鞭䇿馳驟尊宿親識者謂出家知識耆舊在家尊長親情若路遇者皆當立道下傍低頭合掌問訊向往待彼前去然後乃行不得直道便過或逢戲幻奇怪等者或逢言非故往戲是調戲謂唱令歌曲及一切戲弄之事幻是幻術謂種種變現奇怪惑人心目等事此如行雲流水過而不停若路逢者不得住看惟端身正道而行者古賢行不由徑以見動必以正也邪路險道豈可行乎凡遇坑缺不得跳越者以見釋子之威儀也如無著比丘有一信心居士請齊并欲施一好衣途中遇一水坑著便躑度士念為躑度故衣減其半而比丘得他心通知居士意復見水坑再三故躑居士灰念減至無衣但留一食比丘前行見水坑不躑居士問故著曰我若再躑恐失食故居士驚駭知得道人請回供養得道之人尚且如是況凡夫耶有路當繞行者理也無路衆皆跳越則得者雖許跳越亦須自量可也乘馬馳驟者驟音騶走馬曰馳疾速曰驟大律聽老病者騎乘但不得乘母畜及女乘二補儀附凡遇官府不論大小俱宜回避遇鬬爭者亦遠避之不得住看不得回寺誇張所見城中華美之事官府不論大小俱宜回避者謂遵如來之制也若路逢時或避入人門首或端立簷下或拱立道傍待過方行鬬爭者無非揮拳攘臂往往帶纍旁觀看則失儀或招非禍大律云若看象馬牛羊乃至雞鬬及人口諍者得罪華美乃壞人心目之劫賊流轉生死之苦因古人目不接非禮之色口不談市井巷里之言出世之賓不染俗塵何足誇張惟當思念苦空無常無我始是釋子之所宜也市物第二十一凡五事分二初順直遠嫌無爭貴賤無坐女肆若為人所犯方便避之勿從求直起世經云閻浮提人所有市物或以錢寶或以穀帛或以衆寶欲界諸天如四王天三十三天皆有市易遊觀悅神但其物不同世人像法決疑經云未來世中一切俗人輕賤三寶正以比丘比丘尼不如法故身披法服經理塵緣或逢市肆販賣自活或復涉路商賈求利忘失正業古云好漢勿列行市也無爭貴賤者謂珠玉少而貴瓦礫多而賤故物之貴賤市主自有定價凡買者不可減與虧損彼利亦不宜過與浪費常住信施須順時價若抑揚其價勢必爭之往往因小失大故釋子不自列市但憑市價而營辦也無坐女肆者謂陳貨之店曰肆謂女人貿易之店不可坐也若坐者縱然玉潔無瑕亦難免市囂之口嘵嘵故不宜坐也古云防人之口甚于防川若為人所犯者犯是侵犯亦即還義直是價直求是謀求謂物在店貴賤未分經人還價則有定數故云侵犯若前人買物未成我又去索價即是謀求爭價便有是非縱物主所招我亦不買當往餘處故曰方便避之勿從求直謂回避前人及物主也二具信慎行已許甲物雖復更賤無捨彼取此令主有恨慎無保任致𠎝負事畢曰已甲初也天下以甲乙等編為次第謂已還第一家物價第二家物雖賤不得捨前貴而買後賤者令先物主起瞋恨心也世說若捨彼取此如殺父母而出家道念安在耶保任者謂見有與人借物不得從中作保也又任者自任謂他若不還我代還也愆者違背所期負者辜負沈沒自招殃纍凡與保任必多𠎝負怨謗寒山云世上一種人出性常多事終日傍街坊不離諸酒肆為他作保見替他說道理一朝有乖張過咎全歸你凡所施行不得自用第二十二十一事分二初正儀分二初務不自專出入行來當先白師作新法衣當先白師著新法衣當先白師剃頭當先白師疾病服藥當先白師作衆僧事當先白師欲有私具紙筆之輩當先白師若諷起經唄當先白師凡所施行不得自用者謂此身歸命於師已不為己有凡事皆聽師指揮不敢專主故尋常舉動皆當白師以盡孝行然自用下十一則皆略言之耳其間有可白不可白要在臨事斟酌南山事鈔云佛法增益廣大實由師資相攝互相敦遇財法兩濟日益月深行久得固皆賴於此矣出入白師者有二義一安慰義謂師知所出入故二請決義謂請命師可行不可行不至錯誤故若逞性自行萬一有誤而後白師悔之不及以是義故當先白師也作新法衣著新法衣者即縵衣也謂體色量製度應法故名法衣縱非法衣但是新者皆當白師師當察其來處及衣造製度如法不如法方與著也剃頭當先白師者惟恐以此為由笑談雜話妨廢正業故疾病服藥當先白師者謂藥不可亂投須知病之發起虗實之根及藥冷暖之性然後服也若不白師亂投藥石反增病故作衆僧事當先白師者謂常住大衆之事若不白師恐有差誤故欲有私具紙筆當先白師者謂恐有廢禪誦正務故諷起經唄當先白師者謂唄是梵音沙彌本業未成初起諷誦故當先白師也二慧借隨師若人以物慧施當先白師已然後受己物慧施人當先白師師聽然後與人從己假借當先白師師聽然後與己欲從人借物當先白師師聽得去白師聽不聽皆當作禮不聽不得有恨意若人以物慧施當先白師者謂當知可受不可受也若可受而不受則塞其施門絶其善道若不可受而受者或致禍患所關非小故當白師以免譏議後患之非也己物慧施人當先白師者謂知可與不可與而無私誼之非也人從己假借當先白師者謂常住之物十方公用不得擅與當與不當與白師無議也己欲從人借物皆當白師者謂當請命可不可也白師聽不聽皆當作禮者謂不可造次也不聽不得有恨意者以誡承順之命也二補儀附乃至大事或遊方或聽講或入衆或守山或興緣事皆當白師不得自用大事者非些小事也遊方謂參訪知識要指實高明聽講謂聽說聖教要解行相應入衆謂入大僧衆中要知威儀禮節守山謂守護山林竹木花果等不可擅動也興緣謂興建寺院裝塑等要知因果分明如上所言施行等事不得自用己情故曰皆當白師也然遊方原非沙彌之事沙彌只宜習學律儀適或逢緣故例於此參方第二十三凡五事分二初正儀遠行要假良朋古人心地未通不遠千里求師參方者謂參禮諸方善知識也欲為人上之人必須向大爐韛中千磨百煉淘汰一番方能出人頭地也古云欲向千人頭上過先從萬人足下行良朋者善友也謂人品端正言行可法故稱為良禮記云同類曰朋同志曰友順正論云善友者能為衆行之本故溈山云遠行要假良朋數數清於耳目所謂生我者父母成我者朋友也以友輔仁品藻人物故良朋有互相切磋之功琢成法器之用如渡大海帆柁相須歡豫經云賢友者是萬福之基現世免王之牢獄死則杜三途之門戶升天得道皆賢友之助也故捨緣銘云邪師惡友畏若狼虎善導良朋親如火母成範云擇友如雲巖道悟雪峰巖頭等方為真正良朋矣心地觀經云一切菩薩修聖道四種法要應當知親近善友為第一聽聞正法為第二如理思惟為第三如法修證為第四十方一切大聖主修是四法證菩提因果經云朋友有三要法一見有失輒相曉諫二見好事深生隨喜三在苦厄不相棄捨以是義故遠行要假良朋也古人者上古有德之人也謂古德心地未明訪尋知識不以千里為遠柢要求其具正眼者即便往之如雪峰禪師三登投子九上洞山是也成範云夫為法求師不無審別若未的見深識慎不可逐人風聲而輒擬重輕親疏也二補儀分二初為法忘情附年幼戒淺未許遠行如行不得與不良之輩同行須為尋師訪道決擇生死不宜觀山玩水惟圖遊歷廣遠誇示於人年幼謂血氣未定戒淺則恐無志力所以未許遠行然有不得不行之勢必擇良友為伴也不良者不修戒行之輩即惡友也惟恐漸染其氣故當謝絶也溈山云狎習惡者長惡知見曉夕造惡即日交報沒後沉淪一失人身萬劫不復法苑云華氏國王有白象能滅怨敵若人犯罪令象踏殺時象廄火焚移象近寺聞僧誦法句經偈云為善生天為惡入淵心便柔和起慈悲心後付罪人但以鼻舌䑛而去王見斯已召諸大臣臣曰此象近寺聞法故爾移近屠肆則其殘害更增後果其言當知一切衆生志性無定畜生尚爾何況人乎是故智者宜應覺知見惡須棄春秋正義云譬如薰是香草蕕是臭草薰蕕等分使之相扣雖積十年尚猶有臭氣香氣盡而臭氣存言善不能止惡而惡能消善也尋師訪道者欲求無上菩提非知識莫能開導故須尋師訪道也生死長途迷悟由己故自當決擇也觀山玩水何益身心誇示廣遠奚增道味若為生死之人又何暇於斯乎二入門方法所到之處歇放行李不得徑入殿堂一人看行李一人先進問訊取常住進止方可安頓行李入內行李或作行理通用或云裝包即行囊也人若遠行必有之耳以諸方所制不同規矩各異禮無一定事須見機故云取其常住進止方可以頓行李入內古云未晚先投宿入林聽暮鐘到門須辨主問訊必從容隨地可敷草何天非轉蓬屋梁今夜月聊以慰疏慵衣鉢名相第二十四凡九事分三初衣名相分三初五衣分二初相用五條衣梵語安陀會此云中宿衣亦云下衣亦云雜作衣凡寺中執勞服役路途出入往還當著此衣衣者依也謂依此以蔽寒暑也衣犍度云佛見諸比丘在路行多擔衣物作是念言可為諸比丘制衣多少不得過畜時佛初夜在露地坐著一衣至中夜覺寒即著第二衣至後夜復覺寒即著第三衣便安隱住佛告諸比丘聽諸弟子受持三衣不得過畜智論釋云白衣求樂故畜種種衣外道苦行故裸形無恥是故佛弟子捨二邊處中道少欲知足但畜三衣也五條者衣之相也僧祇律云佛在王舍城帝釋石窟前經行見稻田蛙畔分明語阿難曰過去諸佛衣相如是從今依此制作三衣過去諸佛弟子著如是衣未來諸佛弟子亦著是衣如我今日以刀割截成沙門衣不為怨賊所劫此是解脫服福田之衣四分律云三世如來並著此衣若有衆生起一惡心向三世諸佛辟支羅漢及著染衣人獲罪無量所以者何壞色之衣是賢聖之標式故若能發心敬染衣人獲福無量中宿者謂近身住故下衣者謂在七衣之下故雜作衣者謂凡作一切輕務皆應著故執勞服役者謂執大衆之勞故路途出入當著者以顯沙門之相故二偈呪善哉解脫服無上福田衣我今頂戴受世世不捨離唵悉陀耶娑婆訶三遍善哉讚美之辭謂讚衣之功德不可思議也解粘去縛故曰解脫謂生死煩惱由斯解脫也無上者薩婆多論云此衣九十五種外道悉不知名惟佛世尊示此未曾有法故曰無上也福田者謂檀越種福佛弟子為現田文衣相故曰福田頂戴者謂知衣有如上功德故當頂之於首戴之於肩表尊重之至也我由信心敬戴之至故得成佛世世不捨離者謂非但今生如是尊敬守持願世世生生不捨離也願既如是以見衣鉢不可離也然大小乘律如來無不諄誡呪誦三遍此謂時常著用偈呪如是若捨故受新當依律文二七衣分二初相用七條衣梵語多羅僧此云上著衣亦云入衆衣凡禮佛修懺誦經坐禪赴齊聽講布薩自恣當著此衣上著衣者謂在五衣之上故入衆衣者謂入衆時披著故布薩此云長淨自恣謂自身有過恣任僧舉如上等事當著此衣也二偈呪善哉解脫服無上福田衣我今頂戴受世世常得披唵度波度波娑婆訶三遍常得披者即不捨離之意也餘義如前高僧傳云唐貞觀五年安養寺慧光法師弟子其母貧窶內無小衣來入子房取故袈裟作之而著與諸鄰婦同聚言笑忽覺腳熱漸上至腰須臾雷震擲鄰婦百步之外土泥兩耳悶絶經日方得蘇醒所用衣者遂被震死火燒焦踡題背上曰由用法衣不如法故其子收殯受再震出乃露骸林下方終消散是知受持法服慧及三歸之龍信不虗矣三大衣分二初相用二十五條衣梵語僧伽黎此云合亦云重亦云雜碎衣凡入王宮升座說法聚落乞食當著此衣又此衣九品下品九條十一條十三條中品十五條十七條十九條上品二十一條二十三條二十五條大衣者衣中之王也在五七二衣之上故稱為大此云合亦云重者謂割截而後重合成也雜碎衣者謂剪碎縫成條相多故升座著者尊重於法故乞食著者令生敬仰故九品者大衣之相也長多短少者表聖增凡減也戒壇經云五條衣斷貪身業也七條衣斷瞋口業也大衣斷癡意業也故華嚴經云著袈裟者捨離三毒清淨三業也二偈呪善哉解脫服無上福田衣我今頂戴受廣度諸羣迷唵摩訶迦波波吒悉帝娑婆訶三遍前二偈是自利此一偈乃是利他也諸佛已悟故稱大覺衆生尚迷故曰羣迷謂披著此衣直下擔荷如來慧命而化利羣生也故論云有五義故披著此衣謂遮障寒暑除無慚愧聚落乞食在道行生善威儀清淨故此之三衣原是比丘法服今欲令沙彌預知名相殊勝故附於末百一羯磨云求寂之徒縵條是服今時末世不諳律文皆令沙彌披著五條七條割截之衣甚至在家男女亦使披著深為罪濫神洲之地久扇斯風違佛亂法律有大呵此是唐三藏義淨律師親遊西域觀五天竺境及諸部律文並無沙彌披著比丘割截之衣特此垂示以發千古之述既云此成非法為師者不可不知為弟子者又不可不慎也二鉢名相分二初標名梵語鉢多羅此云應量器謂體色量三俱應法故鉢者是半梵語略去多羅二字十誦律云鉢是恆沙諸佛之標幟而非廊廟之器用不得盛雜物不得惡用及洗手當敬之如目此皆如來諄諄誡訓凡受持者應當珍惜保重五分云鉢是出家人器少欲知足非俗人所宜僧祗律云如來令諸比丘以鉢而受食者有異外道故外道縫葉為器拱手而食非是僧相福田之狀故佛制之二釋義體用鐵瓦二物色以藥煙熏治量則分上中下體用鐵瓦二物者四分律云佛在蘇摩國遊行見彼國中泥土細潤不惜兜羅綿手取泥自作鉢坯以為後式授與陶師燒成此鉢寶色光澤圓滿美好佛聽受持當知此鉢為佛祖授受之法器至尊至貴也鐵鉢者律中因世尊按行諸比丘房舍見有比丘曲肱而臥愁憂不樂如來知而故問汝安樂否比丘答言世尊我老邁粗行振手失鉢墮地破之故所不樂佛言從今聽老病比丘受持鐵鉢當知瓦鉢為上鉢鐵鉢是開緣但不得為恣情放逸故意受持鐵鉢安心粗躁也善見律云三乘聖人皆執持瓦鉢乞食資生其餘雜寶銅鑞木石等鉢皆不聽用藥煙熏治者以麻子杏仁搗碎塗其內外以竹煙熏作鳩鴿項色及孔色所熏者何謂盛飯不餿不染垢膩若論西土瓦鉢亦要熏之由其彼國羮飯皆一鉢而食恐其油膩不淨多引蟲蟻然此方惟盛其飯則瓦鉢不必熏也至於彩畫及琉璃等色是外道式皆不得用上中下者若准唐斗上鉢一斗中鉢七升半下鉢五升雖分三種佛令隨其分量故三具名相分二初標名梵語尼師擅此云坐具亦云隨足衣坐具者謂敷之而坐故隨足衣者謂敷之襯足故又云同氈席之形名為敷具同衾被之形名為臥具事鈔云佛言為身為衣為臥具故制畜之為身者恐坐地有所損故為衣者恐無籍三衣易壞故為臥具者恐身不淨污僧床榻故長佛二磔手半廣佛二磔手僧祇律云如來一磔手二尺四寸此約小尺若准大尺可二尺許不得作三衣不得淨施及取薪草盛物雜用唯得敷坐若道行至坐處取坐之十誦律云新者二重故者四重不應受單者離宿突吉羅四分律云佛在僧伽藍遍行諸房見故坐具狼藉因教諸比丘當取故者縱廣一磔手貼新者上用壞色故五分云應貼四角今云四天王者訛也毗尼日用云根本律并寄歸傳中不聽禮拜用以敷展西域五天竺國罕其見聞此方禮拜展用不知傳起何時如遵聖制不用為正若論為衣展禮無妨祥明於斯學者隨便二偈呪臥具尼師壇長養心苗性展開登聖地奉持如來命唵檀波檀波娑婆訶三遍臥具尼師壇者華梵雙彰也戒壇經云尼師壇如塔之基受戒之身表五分法身之塔也良由五分法身從戒長養正定智慧由戒滋生故曰長養心苗性也然正定智慧既能長養展此坐具而迷雲豁開直見本源心地故曰展開登聖地既見本源心地亦當與一切衆生開心地道故曰奉持如來命也如香乳記廣明以上威儀若故作者犯應懺突吉羅以故作故又犯非威儀突吉羅若不故作但犯突吉羅罪然此條章雖云二十四門實則三千威儀八萬細行皆基於此能住持正法建立僧倫願我同志共相守護毗尼久住正法永昌也跋夫法不自弘必藉人而弘法人無自立要因法以立人故世出世間咸重於法然法未有不學而能弘者也余於甲辰年上華山求戒為病不果逮丙午春方得圓具因思戒法難聞是以矢志操持專精律學質雖不敏心念無移溽暑祁寒未嘗有懈自甲子春住持昭慶以來每懷先老和尚創立法門洪功碩德雖人人共知恐日久漸晦故於毗尼切要著香乳以記之菩薩楚網疏解繁多學人泣歧故會初津以指之比丘羯磨布在律文臨事難討故敘儀式以佐之尼衆求具二部同授世所少聞故集軌範以傳之沙彌要略文簡義深初心罔諳故詳義以明之斯皆繼述先老和尚未發之事也其言雖不支直顯事相然義理無違開明心性俚閲者見之因文會意嚴護威儀吾願足矣若云流益將來未敢望也時康熙四十七年冬分第一白半月布薩書玉閣筆識事義內懷師子之德梵語僧伽彼此云師子大師子吼小師子聞悉皆勇健百獸潛藏佛師子吼諸菩薩聞增長神力羣魔怖散為佛弟子學佛威儀故云內懷師子之德外現象王之威梵語伽耶此云象象王回顧舉身皆轉如來大人若有所觀身心俱回所以人天敬仰羣魔驚惶故云外現象王之威馬勝梵名頞如來初度五人之一也菜菽梵名目犍連姓也白雲諱守端衡陽葛氏子得法於楊岐方會禪師南下十二世雪嶠諱圓信得法於幻有傳禪師濟下三十世百丈百丈山名唐憲宗諡大智禪師諱懷海福州長樂王氏子得法於馬祖道一禪師南下二世凡作務身先於衆主事密藏作具師曰我無德業一日不食笑嵓金臺世族弱冠分家悟後隱京師柳巷罕接見人塢波毬多此云大護吒利國人姓首陀十七出家二十證果化道證果最多每度一人以一籌置於石室其室高二十餘尺廣三十餘尺四寸細籌充滿其中跏趺而逝以室內籌用焚師軀五部一曇無德此云法密法名四分二薩婆多此云一切有法名十誦三迦葉遺此云重空觀法名解脫四彌沙塞此云不著有無觀法名五分五婆蹉富羅此云犢子律本不來共五部儱音壟侗音通儱侗未成器之人也顢音瞞頇許干切音憨大面貌因循無所作為也波離此云上首以其持律為衆紀綱故名永嘉諱玄覺號真覺大師六祖傍出著證道歌永嘉集溫州人志公金陵東陽朱氏之婦上巳日聞兒啼鷹窠中梯樹得之舉以為子七歲依鍾山僧儉禪師出家羅什具云鳩摩羅什婆此云童壽祖印度人七歲出家日誦千偈義旨亦通七佛以來譯經師也常啼梵名薩陀波崙為求法故憂愁啼哭七日七夜故號常啼世尊捨身昔菩薩入山修道時帝釋欲往試之化為夜叉口說半偈云諸行無常是生滅法求說後之半偈夜叉曰我腹饑餓何暇為說問欲得何食答曰吾所食者人血肉耳曰願為說之捨身供養即敷座請說夜叉曰生滅滅已寂滅為樂菩薩以偈遍書於山石之間登樹捨身夜叉以手接之作禮而去慈受諱懷深壽春夏氏子得法於長蘆崇信禪師青下十三世仙陀婆梵語也具鹽水馬器四義惟智臣乃能辨識如王食時呼仙陀婆即奉鹽洗時呼奉水作時呼奉器出時呼奉馬弟子侍師亦如智臣故云即應之月堂諱道昌湖州寶溪吳氏子得法於妙湛思慧禪師青下十四世黃龍諱慧南信州章氏子得法於石霜楚圓禪師南下十一世真淨諱克文陝州閿鄉鄭氏子得法於黃龍慧南禪師南下十二世雲門諱文偃嘉興張氏子得法於雪峰義存禪師青下六世始立雲門宗香林諱澄遠依雲門十八年為侍者仲尼姓孔名丘父叔梁紇母顏氏佛滅後四百載魯襄公二十二年庚戌十一月庚子生於魯昌平鄉陬邑哀公十六年壬戌四月己丑卒年七十三歲大鵬如香乳記明鷦鷯小鳥巢於葦苕繫之以髮騰躍不過數仞翱翔蓬蒿之間此亦飛之至也以比小人無大志也敬獼猴為帝釋過去世中有一癡人不識獼猴入一大林見獼猴羣叢聚一處是人曾聞有忉利天便謂是忉利諸天即出樹林還本聚落多人中作如是言汝等曾見忉利天不衆人答言未即時語言吾先已見汝欲見不皆言欲見即將大衆詣彼林中指諸獼猴汝等觀此忉利諸天衆人皆言非忉利天此是獼猴汝癡故不識獼猴而言忉利諸天妄召我等以喻不識人也宗瓦礫為明珠涅槃經云是諸人等春陽之月乘船游戲失琉璃寶即共入水競捉瓦石謂琉璃珠都非真寶是珠故在水中猶如仰觀虗空月形超然獨遠非衆人所執此喻不識法也深則厲淺則揭音契褰裳涉水也由膝以下為揭由膝以上為涉由帶以上為厲如玄沙雪峰之輩雪峰義存禪師泉州南安曾氏子玄沙師備禪師福州閩懸謝氏子初兄事雪峰既而師承之入室咨決罔替晨昏因閲楞嚴發明心地由是應機敏捷至與雪峰徵詰亦當仁不讓峰曰備頭陀再來人也五分法身謂戒定慧解脫解脫知見也
