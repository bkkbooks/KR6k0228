front:
  text: 敘沙彌律儀者明事之典也雲棲要略者顯理之書也事即戒相威儀理即無作戒心事無理不明理無事不顯事理一如戒心明矣蓋如來大慈説是戒經使出家者無為無欲清淨自守但經律深奧義廣難明故大師乘願而來刪繁取要略而解之以世間法釋出世間法以出世間法顯世間法其間少研罪相多於勸持者意謂沙彌初入道門未便預聞篇聚也吾本師見月老和尚中興止作觀其要略文理優暢感發初機故傳戒三十餘年凡受戒者必令深思熟讀使其威儀庠序知所施行乃與登壇受具是以此書盛行於世也然大師以春秋之才而解戒相用禮記之法而輯威儀若非窮究經律博通傳史者則不能識其源委也余數十年來恆以為念因此朝夕黽勉遍搜內外諸書析義消文積成上下兩卷名曰述義謂述其要略之大義也後之覽者倘因跬步而登山由初津而入海即達如來境界事理宛然則知一切治世語言文字皆與實相不相違背也時康熙戊子年桂月吉旦毗陵佛菴玉道者題於西湖昭慶之法乳堂凡例沙彌十支戒相是五篇三聚之基二十四門威儀乃三千八萬之本必須清淨守持以為八德之要凡受戒者不可忽也前之十戒次第已分後之威儀條章先列自不庸科然其間解法事有差殊有直釋戒相者有以世法比量者有顯果報者有立誓願者及諸威儀亦有不同處若非科釋難以標指故今逐節加科庶使未瞻全文則先知大意也戒相威儀及與題目俱書頂格解方則低一格科釋又低一格皆用大字述義則書小字雙行一則敬重律儀二則解述分明其威儀中雖以數事合為一科然每事下仍用圈以別開述義復用角而標出眉目清楚庶無混濫釋此解文原為顯發其中本意故經依經述律以律明適遇古德針誡之言亦録數語以為助顯所引外書亦用世典釋之並非臆見胸談沙彌律儀事不同於比丘故其中所結輕重開遮大槩而已況且人心不古聞開則切記於心見遮則視為故紙若使預知恐成障道因緣茲不繁贅此隨律威儀猶儒門之小學也初心小衆皆宜習學行持琢磨有漸則道器易成庶無躐等之過也從來科式有懸科有貼科若懸有二科三科必一一書完再標初科貼文今皆從簡如子科分三即將初科貼起更不纍書是為一法每科用甲乙等字標定使閲者知其母子分明祖孫不混脈絡貫通以便檢討此集流通既久翻刻自多其文句不無遺漏筆畫未免差訛如摴蒲誤作樗蒲絛誤作縧屩誤作腳今皆校證如涉道話有益身心等文亦並録入庶無遺誤此述義當與香乳記合看蓋其中文句有與日用同者如聞鐘出生及三匙五觀等偈義皆從略但指香乳記詳明故不重釋去聖時遙人多好勝以禪教律三字橫在胸中各執所見殊不知禪教律皆從如來一鼻孔出佛祖何嘗畫為三橛耶故此述義一槩從公別無偏執
